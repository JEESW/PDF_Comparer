<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Visual Compare Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --white: #ffffff;
      --gray-50: #f8f9fb;
      --gray-100: #f0f2f5;
      --gray-200: #e4e7ed;
      --gray-300: #cdd2db;
      --gray-400: #9aa1b0;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --red-100: #fee2e2;
      --red-700: #b91c1c;
      --green-100: #dcfce7;
      --green-700: #15803d;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.06);
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --toolbar-h: 56px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background: var(--gray-50);
      color: var(--gray-900);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .toolbar {
      height: var(--toolbar-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 30;
      flex-wrap: nowrap;
      box-shadow: var(--shadow-xs);
    }

    .toolbar>div:not(.summary) {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--gray-400);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toolbar select,
    .toolbar button {
      height: 32px;
    }

    .toolbar select {
      padding: 0 8px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--gray-700);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow-xs);
      flex-shrink: 0;
    }

    .toolbar button {
      padding: 0 12px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--gray-700);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      box-shadow: var(--shadow-xs);
    }

    .toolbar button:hover {
      background: var(--gray-50);
      border-color: var(--gray-300);
      color: var(--gray-900);
    }

    .toolbar button:active {
      background: var(--gray-100);
      transform: translateY(1px);
      box-shadow: none;
    }

    #compareBtn {
      background: var(--blue-600);
      border-color: var(--blue-700);
      color: var(--white);
      box-shadow: var(--shadow-sm);
    }

    #compareBtn:hover {
      background: var(--blue-700);
      border-color: var(--blue-700);
      color: var(--white);
    }

    .toolbar .summary {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gray-400);
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: calc(100vh - var(--toolbar-h));
    }

    .sidebar {
      background: var(--white);
      overflow: auto;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--gray-200);
      border-radius: 2px;
    }

    .sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--gray-400);
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 2;
      border-bottom: 1px solid var(--gray-100);
    }

    .note {
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.55;
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--gray-100);
    }

    .thumb-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px;
    }

    .thumb-item {
      border: 1px solid var(--gray-100);
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .thumb-item:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
      box-shadow: var(--shadow-xs);
    }

    .thumb-item.active {
      border-color: var(--blue-300);
      background: var(--blue-50);
      box-shadow: 0 0 0 3px var(--blue-100);
    }

    .thumb-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 6px;
    }

    .thumb-meta {
      font-size: 11px;
      color: var(--gray-400);
      line-height: 1.6;
      white-space: pre-line;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge.same {
      background: var(--green-100);
      color: var(--green-700);
    }

    .badge.changed {
      background: var(--red-100);
      color: var(--red-700);
    }

    .badge.inserted,
    .badge.deleted {
      background: var(--red-100);
      color: var(--red-700);
    }

    .empty {
      font-size: 13px;
      color: var(--gray-400);
      padding: 20px 6px;
      text-align: center;
      line-height: 1.6;
    }

    .main {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    .pdf-pane {
      width: 50%;
      overflow: auto;
      border-right: 1px solid var(--gray-200);
      background: var(--gray-100);
      padding: 20px 16px;
    }

    .pdf-pane:last-child {
      border-right: none;
    }

    .pdf-pane::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .pdf-pane::-webkit-scrollbar-track {
      background: transparent;
    }

    .pdf-pane::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 3px;
    }

    .pdf-pane::-webkit-scrollbar-thumb:hover {
      background: var(--blue-400);
    }

    .page-wrap {
      position: relative;
      margin: 0 auto 20px;
      width: fit-content;
      background: var(--white);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .page-wrap:hover {
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      border-color: var(--gray-300);
    }

    .page-label {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gray-400);
      padding: 7px 12px;
    }

    .page-body {
      position: relative;
      overflow: hidden;
      background: white;
    }

    .page-stage {
      position: absolute;
      left: 0;
      top: 0;
      background: white;
      transform-origin: top left;
    }

    canvas {
      display: block;
      background: white;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .diff-box {
      position: absolute;
      border-radius: 3px;
      border: 1.5px solid rgba(239, 68, 68, 0.80);
      background: rgba(239, 68, 68, 0.08);
      transition: 0.2s ease;
    }

    .diff-box.current {
      border-color: rgba(37, 99, 235, 0.95) !important;
      background: rgba(59, 130, 246, 0.18) !important;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .diff-box.flash {
      animation: flashBox 0.9s ease-in-out 2;
    }

    @keyframes flashBox {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.03)
      }

      100% {
        transform: scale(1)
      }
    }

    .page-status {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 3;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--white);
      background: rgba(31, 41, 55, 0.75);
      padding: 3px 8px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .missing-stage {
      background: linear-gradient(180deg, #fafafa, #f4f4f5);
    }

    .missing-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: var(--gray-500);
      font-size: 14px;
      padding: 20px;
      line-height: 1.6;
    }

    .missing-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 8px;
    }

    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.50);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    #loadingOverlay.visible {
      display: flex;
    }

    .ld-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 16px rgba(0, 0, 0, 0.10);
      padding: 28px 32px 24px;
      min-width: 400px;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: ldSlideIn 0.2s ease-out;
    }

    @keyframes ldSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .ld-header {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .ld-spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--blue-100);
      border-top-color: var(--blue-600);
      border-radius: 50%;
      flex-shrink: 0;
      animation: ldSpin 0.75s linear infinite;
    }

    @keyframes ldSpin {
      to {
        transform: rotate(360deg)
      }
    }

    .ld-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .ld-cancel {
      margin-left: auto;
      font-size: 12px;
      color: var(--gray-400);
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.12s;
    }

    .ld-cancel:hover {
      color: var(--red-700);
      border-color: var(--red-700);
      background: var(--red-100);
    }

    .ld-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
    }

    .ld-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--gray-300);
      transition: color 0.2s;
      line-height: 1.4;
    }

    .ld-step.active {
      color: var(--gray-900);
      font-weight: 600;
    }

    .ld-step.done {
      color: var(--green-700);
    }

    .ld-step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--gray-200);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.2s;
      background: var(--white);
    }

    .ld-step.active .ld-step-icon {
      border-color: var(--blue-600);
      background: var(--blue-600);
      animation: ldPulseRing 1.2s ease-in-out infinite;
    }

    @keyframes ldPulseRing {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.35)
      }

      50% {
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0)
      }
    }

    .ld-step.active .ld-step-icon::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      animation: ldDot 1s ease-in-out infinite;
    }

    @keyframes ldDot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7)
      }
    }

    .ld-step.done .ld-step-icon {
      border-color: var(--green-700);
      background: var(--green-700);
    }

    .ld-step.done .ld-step-icon::after {
      content: '✓';
      color: white;
      font-size: 11px;
      line-height: 1;
    }

    .ld-step-label {
      flex: 1;
    }

    .ld-step-sub {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 400;
      margin-top: 1px;
    }

    .ld-step.active .ld-step-sub {
      color: var(--blue-600);
      font-weight: 500;
    }

    .ld-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ld-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray-400);
      font-family: var(--font-mono);
    }

    .ld-bar-bg {
      height: 5px;
      background: var(--gray-100);
      border-radius: 999px;
      overflow: hidden;
    }

    .ld-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue-600), var(--blue-400));
      border-radius: 999px;
      transition: width 0.35s ease;
      width: 0%;
    }

    .ld-log {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gray-400);
      background: var(--gray-50);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      min-height: 28px;
      line-height: 1.5;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <div id="loadingOverlay">
    <div class="ld-card">
      <div class="ld-header">
        <div class="ld-spinner"></div>
        <div class="ld-title">PDF 비교 중...</div>
        <button class="ld-cancel" id="ldCancelBtn">✕ 취소</button>
      </div>
      <div class="ld-steps">
        <div class="ld-step" id="ldStep0">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>좌측 PDF 시그니처 생성</div>
            <div class="ld-step-sub" id="ldStep0sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep1">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>우측 PDF 시그니처 생성</div>
            <div class="ld-step-sub" id="ldStep1sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep2">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>페이지 순서 정렬 분석</div>
            <div class="ld-step-sub" id="ldStep2sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep3">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>페이지 렌더링 &amp; 차이점 검출</div>
            <div class="ld-step-sub" id="ldStep3sub">대기 중...</div>
          </div>
        </div>
      </div>
      <div class="ld-progress-wrap">
        <div class="ld-progress-labels">
          <span id="ldProgressLabel">준비 중...</span>
          <span id="ldProgressPct">0%</span>
        </div>
        <div class="ld-bar-bg">
          <div class="ld-bar-fill" id="ldBarFill"></div>
        </div>
      </div>
      <div class="ld-log" id="ldLog">잠시만 기다려 주세요.</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="file" id="file1" accept="application/pdf" />
    <input type="file" id="file2" accept="application/pdf" />
    <select id="compareMode" title="비교 모드">
      <option value="default">Default</option>
      <option value="pixel">Pixel Only</option>
      <option value="text">Text Only</option>
    </select>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="prevBtn">이전 변경</button>
    <button id="nextBtn">다음 변경</button>
    <button id="compareBtn">다시 비교</button>
    <div class="summary" id="summaryText">PDF 2개를 선택하세요.</div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h2>변경 페이지 목록</h2>
      <div class="note">
        전체 페이지를 한 번에 렌더링하고 비교합니다.<br>
        목록에는 변경이 감지된 페이지만 표시됩니다.<br>
        항목을 클릭하면 해당 페이지로 이동합니다.
      </div>
      <div id="thumbList" class="thumb-list">
        <div class="empty">비교 후 변경된 페이지 목록이 표시됩니다.</div>
      </div>
    </aside>
    <div class="main">
      <div id="pdf1" class="pdf-pane"></div>
      <div id="pdf2" class="pdf-pane"></div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    var ldOverlay = document.getElementById("loadingOverlay");
    var ldBarFill = document.getElementById("ldBarFill");
    var ldLog = document.getElementById("ldLog");
    var ldProgLabel = document.getElementById("ldProgressLabel");
    var ldProgPct = document.getElementById("ldProgressPct");
    var ldCancelBtn = document.getElementById("ldCancelBtn");
    var STEP_WEIGHTS = [25, 25, 5, 45];
    var ldCurrentStep = -1, ldStepProgress = 0;

    function ldShow() {
      ldCurrentStep = -1;
      ldStepProgress = 0;
      ldBarFill.style.width = "0%";
      ldLog.textContent = "초기화 중...";
      ldProgLabel.textContent = "준비 중...";
      ldProgPct.textContent = "0%";
      [0, 1, 2, 3].forEach(function (i) {
        document.getElementById("ldStep" + i).classList.remove("active", "done");
        document.getElementById("ldStep" + i + "sub").textContent = "대기 중...";
      });
      ldOverlay.classList.add("visible");
    }

    function ldHide() {
      ldOverlay.classList.remove("visible");
    }

    function ldActivateStep(idx, sub) {
      if (ldCurrentStep >= 0 && ldCurrentStep < idx) {
        for (var s = ldCurrentStep; s < idx; s++) {
          var p = document.getElementById("ldStep" + s);
          if (p) {
            p.classList.remove("active");
            p.classList.add("done");
          }
        }
      }
      ldCurrentStep = idx;
      ldStepProgress = 0;
      var el = document.getElementById("ldStep" + idx);
      if (el) {
        el.classList.remove("done");
        el.classList.add("active");
      }
      if (sub) {
        ldUpdateSub(idx, sub);
      }
      ldRefreshBar();
    }

    function ldUpdateSub(idx, text) {
      var s = document.getElementById("ldStep" + idx + "sub");
      if (s) {
        s.textContent = text;
      }
    }

    function ldSetStepProgress(r) {
      ldStepProgress = Math.max(0, Math.min(1, r));
      ldRefreshBar();
    }

    function ldRefreshBar() {
      var done = 0;
      for (var s = 0; s < ldCurrentStep; s++) {
        done += STEP_WEIGHTS[s];
      }
      var cur = ldCurrentStep >= 0 ? STEP_WEIGHTS[ldCurrentStep] * ldStepProgress : 0;
      var total = Math.round(done + cur);
      ldBarFill.style.width = total + "%";
      ldProgPct.textContent = total + "%";
    }

    function ldSetLog(text) {
      ldLog.textContent = text;
      ldProgLabel.textContent = text;
    }

    var pdfDoc1 = null, pdfDoc2 = null;
    var renderScale = 1.15;
    var viewScale = 1.0;
    var dpr = window.devicePixelRatio || 1;
    var pageViews1 = [], pageViews2 = [];
    var alignmentRows = [];
    var leftRowIndexByPageNo = {}, rightRowIndexByPageNo = {};
    var diffEntries = [];
    var currentDiffIndex = -1;
    var renderGeneration = 0;
    var syncLock = false;
    var navLockUntil = 0;

    var globalTextLines1 = [];
    var globalTextLines2 = [];

    var file1El = document.getElementById("file1");
    var file2El = document.getElementById("file2");
    var pdf1El = document.getElementById("pdf1");
    var pdf2El = document.getElementById("pdf2");
    var thumbListEl = document.getElementById("thumbList");
    var summaryTextEl = document.getElementById("summaryText");
    var compareModeEl = document.getElementById("compareMode");
    var compareMode = "default";

    file1El.addEventListener("change", loadPDF1);
    file2El.addEventListener("change", loadPDF2);
    compareModeEl.addEventListener("change", function () {
      compareMode = compareModeEl.value;
    });
    document.getElementById("zoomInBtn").addEventListener("click", function () {
      viewScale = Math.min(viewScale + 0.15, 3);
      applyViewScale();
    });
    document.getElementById("zoomOutBtn").addEventListener("click", function () {
      viewScale = Math.max(viewScale - 0.15, 0.5);
      applyViewScale();
    });
    document.getElementById("prevBtn").addEventListener("click", goToPrevDiff);
    document.getElementById("nextBtn").addEventListener("click", goToNextDiff);
    document.getElementById("compareBtn").addEventListener("click", rerenderIfReady);
    ldCancelBtn.addEventListener("click", function () {
      renderGeneration++;
      ldHide();
      summaryTextEl.textContent = "비교가 취소되었습니다.";
    });

    async function loadPDF1(e) {
      var file = e.target.files[0];
      if (!file) {
        return;
      }
      pdfDoc1 = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      rerenderIfReady();
    }

    async function loadPDF2(e) {
      var file = e.target.files[0];
      if (!file) {
        return;
      }
      pdfDoc2 = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      rerenderIfReady();
    }

    async function rerenderIfReady() {
      if (!pdfDoc1 || !pdfDoc2) {
        summaryTextEl.textContent = "PDF 2개를 선택하세요.";
        return;
      }
      await renderAll();
    }

    function applyViewScale() {
      pageViews1.concat(pageViews2).forEach(applyScaleToPageView);
      if (currentDiffIndex >= 0 && currentDiffIndex < diffEntries.length) {
        highlightCurrent();
      }
      updateZoomSummary();
    }

    function applyScaleToPageView(pv) {
      if (!pv || !pv.pageBody || !pv.stage) {
        return;
      }
      pv.pageBody.style.width = Math.max(1, Math.round(pv.baseWidth * viewScale)) + "px";
      pv.pageBody.style.height = Math.max(1, Math.round(pv.baseHeight * viewScale)) + "px";
      pv.stage.style.width = pv.baseWidth + "px";
      pv.stage.style.height = pv.baseHeight + "px";
      pv.stage.style.transform = "scale(" + viewScale + ")";
    }

    function updateZoomSummary() {
      var z = " / 줌 " + Math.round(viewScale * 100) + "%";
      var m = " / " + compareModeEl.options[compareModeEl.selectedIndex].text;
      if (compareMode === "text" && (pageViews1.length || pageViews2.length)) {
        summaryTextEl.textContent = "좌측 " + pageViews1.length + "p / 우측 " + pageViews2.length
          + "p / 변경 블록 " + diffEntries.length + "건" + m + z;
        return;
      }
      if (!alignmentRows.length) {
        summaryTextEl.textContent = "PDF 2개를 선택하세요." + z;
        return;
      }
      var changedRows = new Set(diffEntries.map(function (d) {
        return d.rowIndex;
      }));
      var insertedCount = diffEntries.filter(function (d) {
        return d.kind === "insert";
      }).length;
      var deletedCount = diffEntries.filter(function (d) {
        return d.kind === "delete";
      }).length;
      var changedCount = diffEntries.filter(function (d) {
        return d.kind === "change";
      }).length;
      summaryTextEl.textContent = "정렬 행 " + alignmentRows.length + "개 / 변경 " + changedCount + " / 삽입 "
        + insertedCount + " / 삭제 " + deletedCount + " / 변경 위치 " + changedRows.size + "개" + m + z;
    }

    async function renderAll() {
      renderGeneration++;
      var myGen = renderGeneration;

      pdf1El.innerHTML = "";
      pdf2El.innerHTML = "";
      thumbListEl.innerHTML = "";
      summaryTextEl.textContent = "준비 중...";
      pageViews1 = [];
      pageViews2 = [];
      alignmentRows = [];
      leftRowIndexByPageNo = {};
      rightRowIndexByPageNo = {};
      diffEntries = [];
      currentDiffIndex = -1;
      globalTextLines1 = [];
      globalTextLines2 = [];

      ldShow();

      try {
        if (compareMode === "text") {
          await renderAll_TextOnly(myGen);
          return;
        }

        ldActivateStep(0, "0 / " + pdfDoc1.numPages + " 페이지");
        var leftSignatures = await buildAllPageSignatures(pdfDoc1, myGen, "좌측");
        if (myGen !== renderGeneration) {
          ldHide();
          return;
        }

        ldActivateStep(1, "0 / " + pdfDoc2.numPages + " 페이지");
        var rightSignatures = await buildAllPageSignatures(pdfDoc2, myGen, "우측");
        if (myGen !== renderGeneration) {
          ldHide();
          return;
        }

        ldActivateStep(2, "정렬 계산 중...");

        ldSetLog(
          "페이지 순서 정렬 계산 중... (" + leftSignatures.length + " × " + rightSignatures.length + ")");
        summaryTextEl.textContent = "페이지 정렬 계산 중...";
        alignmentRows = await alignPageSequences(leftSignatures, rightSignatures);

        if (myGen !== renderGeneration) {
          ldHide();
          return;
        }

        var _ins = alignmentRows.filter(function (r) {
          return r.type === "insert";
        }).length;
        var _del = alignmentRows.filter(function (r) {
          return r.type === "delete";
        }).length;
        var _mat = alignmentRows.filter(function (r) {
          return r.type === "match";
        }).length;
        ldUpdateSub(2, "매칭 " + _mat + " / 삽입 " + _ins + " / 삭제 " + _del);
        ldSetStepProgress(1);

        summaryTextEl.textContent = "페이지 껍데기 생성 중...";
        ldSetLog("페이지 레이아웃 구성 중...");
        for (var ri = 0; ri < alignmentRows.length; ri++) {
          var row = alignmentRows[ri];
          var lv = null, rv = null;
          if (row.leftPageNo != null) {
            var lm = await getPageMeta(pdfDoc1, row.leftPageNo);
            lv = createPageShell(pdf1El, row.leftPageNo, "좌측", lm.width, lm.height, ri);
            leftRowIndexByPageNo[row.leftPageNo] = ri;
          } else {
            var rm2 = await getPageMeta(pdfDoc2, row.rightPageNo);
            lv = createMissingPageShell(pdf1El, "좌측 PDF - 없음", rm2.width, rm2.height, "insert", ri);
          }
          if (row.rightPageNo != null) {
            var rm = await getPageMeta(pdfDoc2, row.rightPageNo);
            rv = createPageShell(pdf2El, row.rightPageNo, "우측", rm.width, rm.height, ri);
            rightRowIndexByPageNo[row.rightPageNo] = ri;
          } else {
            var lm2 = await getPageMeta(pdfDoc1, row.leftPageNo);
            rv = createMissingPageShell(pdf2El, "우측 PDF - 없음", lm2.width, lm2.height, "delete", ri);
          }
          pageViews1.push(lv);
          pageViews2.push(rv);
        }
        applyViewScale();

        ldActivateStep(3, "0 / " + alignmentRows.length + " 행 처리 중");
        summaryTextEl.textContent = "렌더링/비교 중...";

        var totalRows = alignmentRows.length;

        for (var i = 0; i < totalRows; i++) {
          if (myGen !== renderGeneration) {
            ldHide();
            return;
          }
          var row = alignmentRows[i];
          var left = pageViews1[i], right = pageViews2[i];
          ldSetStepProgress(i / totalRows);
          var pl = (i + 1) + " / " + totalRows;
          if (row.type === "match") {
            ldUpdateSub(3, pl + " — 좌 " + row.leftPageNo + " ↔ 우 " + row.rightPageNo);
            ldSetLog("p" + row.leftPageNo + " ↔ p" + row.rightPageNo + " diff 검출 중...");
            await Promise.all(
              [ensureRendered(pdfDoc1, left, myGen), ensureRendered(pdfDoc2, right, myGen)]);
            await maybeCompareAlignedRow(i, myGen);
          } else if (row.type === "insert") {
            ldUpdateSub(3, pl + " — 우측 p" + row.rightPageNo + " 삽입");
            await ensureRendered(pdfDoc2, right, myGen);
            markInsertedRow(i);
          } else {
            ldUpdateSub(3, pl + " — 좌측 p" + row.leftPageNo + " 삭제");
            await ensureRendered(pdfDoc1, left, myGen);
            markDeletedRow(i);
          }
          summaryTextEl.textContent = "정렬 행 " + (i + 1) + " / " + totalRows + " 처리 완료 / 현재 변경 "
            + diffEntries.length + "건";
        }

        buildChangedThumbList();
        ldSetStepProgress(1);
        ldHide();
        updateZoomSummary();

      } catch (err) {
        console.error("renderAll error:", err);
        ldSetLog("❌ 오류: " + (err && err.message ? err.message : String(err)));
        summaryTextEl.textContent = "오류: " + (err && err.message ? err.message : String(err));
      }
    }

    async function renderAll_TextOnly(myGen) {
      var n = pdfDoc1.numPages;
      var m = pdfDoc2.numPages;

      // Step 0: 좌측 페이지 셸 생성 + 렌더
      ldActivateStep(0, "0 / " + n + " 페이지");
      for (var p = 1; p <= n; p++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldUpdateSub(0, p + " / " + n);
        ldSetStepProgress((p - 1) / n);
        ldSetLog("좌측 PDF 렌더링 중... p" + p + " / " + n);
        summaryTextEl.textContent = "좌측 PDF 렌더링 중... " + p + " / " + n;
        var lm = await getPageMeta(pdfDoc1, p);
        var lv = createPageShell(pdf1El, p, "좌측", lm.width, lm.height, p - 1);
        leftRowIndexByPageNo[p] = p - 1;
        pageViews1.push(lv);
      }
      ldUpdateSub(0, "완료 (" + n + " 페이지)");
      ldSetStepProgress(1);

      // Step 1: 우측 페이지 셸 생성 + 렌더
      ldActivateStep(1, "0 / " + m + " 페이지");
      for (var p = 1; p <= m; p++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldUpdateSub(1, p + " / " + m);
        ldSetStepProgress((p - 1) / m);
        ldSetLog("우측 PDF 렌더링 중... p" + p + " / " + m);
        summaryTextEl.textContent = "우측 PDF 렌더링 중... " + p + " / " + m;
        var rm = await getPageMeta(pdfDoc2, p);
        var rv = createPageShell(pdf2El, p, "우측", rm.width, rm.height, p - 1);
        rightRowIndexByPageNo[p] = p - 1;
        pageViews2.push(rv);
      }
      ldUpdateSub(1, "완료 (" + m + " 페이지)");
      ldSetStepProgress(1);

      applyViewScale();

      // Step 2: 정렬 건너뜀
      ldActivateStep(2, "텍스트 전용 - 정렬 건너뜀");
      ldUpdateSub(2, "전체 텍스트 Myers diff 적용");
      alignmentRows = [];
      ldSetStepProgress(1);

      // Step 3: 렌더링 + 텍스트 추출 + Myers diff
      ldActivateStep(3, "0 / " + (n + m) + " 페이지 렌더링");
      var total = n + m;
      for (var i = 0; i < n; i++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldSetStepProgress(i / total);
        ldSetLog("좌측 p" + (i + 1) + " 렌더링...");
        ldUpdateSub(3, (i + 1) + " / " + total + " 페이지");
        await ensureRendered(pdfDoc1, pageViews1[i], myGen);
      }
      for (var i = 0; i < m; i++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldSetStepProgress((n + i) / total);
        ldSetLog("우측 p" + (i + 1) + " 렌더링...");
        ldUpdateSub(3, (n + i + 1) + " / " + total + " 페이지");
        await ensureRendered(pdfDoc2, pageViews2[i], myGen);
      }

      if (myGen !== renderGeneration) { ldHide(); return; }

      globalTextLines1 = collectAllTextLines(pageViews1);
      globalTextLines2 = collectAllTextLines(pageViews2);

      ldSetLog("Myers diff 계산 중... " + globalTextLines1.length + " vs " + globalTextLines2.length + " 줄");
      summaryTextEl.textContent = "Myers diff 계산 중...";
      await yieldToBrowser();

      if (myGen !== renderGeneration) { ldHide(); return; }

      var diffOps = computeHistogramDiff(globalTextLines1, globalTextLines2);
      buildTextOnlyDiffEntries(diffOps);

      buildChangedThumbList();
      ldSetStepProgress(1);
      ldHide();
      updateZoomSummary();
    }

    function buildTextOnlyDiffEntries(diffOps) {
      // Group consecutive non-equal ops into change blocks
      var blocks = [];
      var cur = null;
      for (var i = 0; i < diffOps.length; i++) {
        var op = diffOps[i];
        if (op.op === "=") {
          if (cur) { blocks.push(cur); cur = null; }
        } else {
          if (!cur) cur = { leftLines: [], rightLines: [] };
          if (op.op === "-") cur.leftLines.push(op.leftEntry);
          else if (op.op === "+") cur.rightLines.push(op.rightEntry);
        }
      }
      if (cur) blocks.push(cur);

      for (var bi = 0; bi < blocks.length; bi++) {
        var block = blocks[bi];
        var diffId = "text-d" + bi;

        // Group lines by page
        var leftByPage = {}, rightByPage = {};
        block.leftLines.forEach(function (entry) {
          var pg = entry.pageNo;
          if (!leftByPage[pg]) leftByPage[pg] = [];
          leftByPage[pg].push(entry.line);
        });
        block.rightLines.forEach(function (entry) {
          var pg = entry.pageNo;
          if (!rightByPage[pg]) rightByPage[pg] = [];
          rightByPage[pg].push(entry.line);
        });

        var leftPageNos = Object.keys(leftByPage).map(Number).sort(function (a, b) { return a - b; });
        var rightPageNos = Object.keys(rightByPage).map(Number).sort(function (a, b) { return a - b; });

        var primaryLeftPageNo = leftPageNos[0] || null;
        var primaryRightPageNo = rightPageNos[0] || null;

        // Draw boxes on each affected left page
        var firstLeftRect = null;
        leftPageNos.forEach(function (pg) {
          var pv = pageViews1[pg - 1];
          if (!pv || !pv.overlay) return;
          var rects = mergeNearbyRects(leftByPage[pg].map(function (ln) {
            return expandRectCss(ln, 4, pv.width, pv.height);
          }), 8);
          rects.forEach(function (r) { drawDiffBox(pv.overlay, r, diffId, "change"); });
          if (pg === primaryLeftPageNo && rects.length) firstLeftRect = rects[0];
        });

        // Draw boxes on each affected right page
        var firstRightRect = null;
        rightPageNos.forEach(function (pg) {
          var pv = pageViews2[pg - 1];
          if (!pv || !pv.overlay) return;
          var rects = mergeNearbyRects(rightByPage[pg].map(function (ln) {
            return expandRectCss(ln, 4, pv.width, pv.height);
          }), 8);
          rects.forEach(function (r) { drawDiffBox(pv.overlay, r, diffId, "change"); });
          if (pg === primaryRightPageNo && rects.length) firstRightRect = rects[0];
        });

        // Determine scroll targets (rowIndex = left view index, rightRowIndex = right view index)
        var leftRowIdx = primaryLeftPageNo != null ? primaryLeftPageNo - 1 : null;
        var rightRowIdx = primaryRightPageNo != null ? primaryRightPageNo - 1 : null;
        if (leftRowIdx === null) leftRowIdx = rightRowIdx != null ? Math.min(rightRowIdx, pageViews1.length - 1) : 0;
        if (rightRowIdx === null) rightRowIdx = leftRowIdx != null ? Math.min(leftRowIdx, pageViews2.length - 1) : 0;

        diffEntries.push({
          id: diffId,
          kind: "change",
          rowIndex: leftRowIdx,
          rightRowIndex: rightRowIdx,
          pageNo: primaryLeftPageNo || primaryRightPageNo,
          leftPageNo: primaryLeftPageNo,
          rightPageNo: primaryRightPageNo,
          leftRect: firstLeftRect,
          rightRect: firstRightRect,
          label: "변경 " + (primaryLeftPageNo ? "좌 p" + primaryLeftPageNo : "") + (primaryRightPageNo ? " ↔ 우 p" + primaryRightPageNo : "")
        });
      }
    }

    async function extractAllTextLines(pdfDoc, myGen, label, totalRows) {
      var result = [];
      var total = pdfDoc.numPages;
      for (var p = 1; p <= total; p++) {
        if (myGen !== renderGeneration) {
          return result;
        }
        ldSetLog(label + " PDF 텍스트+렌더 중... p" + p + " / " + total);
        var page = await pdfDoc.getPage(p);
        var viewport = page.getViewport({ scale: renderScale });

        var canvas = document.createElement("canvas");
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        var ctx = canvas.getContext("2d", { alpha: false });
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        await page.render({ canvasContext: ctx, viewport: viewport }).promise;

        var tc = await page.getTextContent();
        var lines = extractTextLines(tc, viewport);

        var rowIdx = (label === "좌측") ? leftRowIndexByPageNo[p] : rightRowIndexByPageNo[p];
        if (rowIdx !== undefined) {
          var pv = (label === "좌측") ? pageViews1[rowIdx] : pageViews2[rowIdx];
          if (pv) {
            if (!pv.canvas) {
              pv.stage.insertBefore(canvas, pv.overlay);
            } else {
              pv.canvas.replaceWith(canvas);
            }
            pv.canvas = canvas;
            pv.viewport = viewport;
            pv.textLines = lines;
            pv.isRendered = true;
            pv.status.textContent = "ready";
          }
        }

        lines.forEach(function (ln) {
          result.push({ pageNo: p, line: ln });
        });
        try {
          page.cleanup();
        } catch (e) {
        }
      }
      return result;
    }

    function computeLineDiff(leftEntries, rightEntries) {
      var n = leftEntries.length, m = rightEntries.length;

      function key(entry) {
        return normalizeTextForCompare(entry.line.text);
      }

      var dp = new Array(m + 1).fill(0);

      var table = Array.from({ length: n + 1 }, function () {
        return new Array(m + 1).fill(0);
      });

      for (var i = 1; i <= n; i++) {
        for (var j = 1; j <= m; j++) {
          if (key(leftEntries[i - 1]) === key(rightEntries[j - 1])) {
            table[i][j] = table[i - 1][j - 1] + 1;
          } else {
            table[i][j] = Math.max(table[i - 1][j], table[i][j - 1]);
          }
        }
      }

      var ops = [];
      var ii = n, jj = m;
      while (ii > 0 || jj > 0) {
        if (ii > 0 && jj > 0 && key(leftEntries[ii - 1]) === key(rightEntries[jj - 1])) {
          ops.push({ op: "=", leftEntry: leftEntries[ii - 1], rightEntry: rightEntries[jj - 1] });
          ii--;
          jj--;
        } else if (jj > 0 && (ii === 0 || table[ii][jj - 1] >= table[ii - 1][jj])) {
          ops.push({ op: "+", leftEntry: null, rightEntry: rightEntries[jj - 1] });
          jj--;
        } else {
          ops.push({ op: "-", leftEntry: leftEntries[ii - 1], rightEntry: null });
          ii--;
        }
      }
      ops.reverse();
      return ops;
    }

    function computeHistogramDiff(leftEntries, rightEntries) {
      var a = leftEntries, b = rightEntries;
      var result = [];

      function key(entry) {
        return normalizeTextForCompare(entry.line.text);
      }

      function recurse(lLo, lHi, rLo, rHi, depth) {
        // 공통 접두사 제거
        while (lLo < lHi && rLo < rHi && key(a[lLo]) === key(b[rLo])) {
          result.push({ op: "=", leftEntry: a[lLo], rightEntry: b[rLo] });
          lLo++; rLo++;
        }

        // 공통 접미사 저장 (나중에 붙임)
        var suffix = [];
        while (lHi > lLo && rHi > rLo && key(a[lHi - 1]) === key(b[rHi - 1])) {
          lHi--; rHi--;
          suffix.push({ op: "=", leftEntry: a[lHi], rightEntry: b[rHi] });
        }

        function flushSuffix() {
          for (var s = suffix.length - 1; s >= 0; s--) result.push(suffix[s]);
        }

        // 기저 조건
        if (lLo >= lHi) {
          for (var i = rLo; i < rHi; i++) result.push({ op: "+", leftEntry: null, rightEntry: b[i] });
          flushSuffix(); return;
        }
        if (rLo >= rHi) {
          for (var i = lLo; i < lHi; i++) result.push({ op: "-", leftEntry: a[i], rightEntry: null });
          flushSuffix(); return;
        }

        // 좌측 구간 히스토그램 빌드
        var hist = {};
        for (var i = lLo; i < lHi; i++) {
          var k = key(a[i]);
          hist[k] = (hist[k] || 0) + 1;
        }

        // 양쪽 공통 줄 중 가장 드문 빈도 탐색
        var minCount = Infinity;
        for (var j = rLo; j < rHi; j++) {
          var k = key(b[j]);
          if (hist[k] !== undefined && hist[k] < minCount) minCount = hist[k];
        }

        // 공통 줄 없거나 퇴화 케이스: 전부 삭제+삽입으로 처리
        var regionSize = (lHi - lLo) + (rHi - rLo);
        if (minCount === Infinity || depth > 100 || (minCount > 8 && regionSize > 200)) {
          for (var i = lLo; i < lHi; i++) result.push({ op: "-", leftEntry: a[i], rightEntry: null });
          for (var j = rLo; j < rHi; j++) result.push({ op: "+", leftEntry: null, rightEntry: b[j] });
          flushSuffix(); return;
        }

        // 가장 드문 줄 중 앵커 후보 탐색 — 앞뒤 스네이크 길이가 최대인 쌍 선택
        var bestLi = -1, bestRj = -1, bestScore = -1;
        for (var j = rLo; j < rHi; j++) {
          var rk = key(b[j]);
          if (hist[rk] !== minCount) continue;
          for (var i = lLo; i < lHi; i++) {
            if (key(a[i]) !== rk) continue;
            var sb = 0, ib = i - 1, jb = j - 1;
            while (ib >= lLo && jb >= rLo && key(a[ib]) === key(b[jb])) { sb++; ib--; jb--; }
            var sa = 0, ia = i + 1, ja = j + 1;
            while (ia < lHi && ja < rHi && key(a[ia]) === key(b[ja])) { sa++; ia++; ja++; }
            if (sb + sa > bestScore) { bestScore = sb + sa; bestLi = i; bestRj = j; }
          }
        }

        if (bestLi < 0) {
          // 앵커 없음: 폴백
          for (var i = lLo; i < lHi; i++) result.push({ op: "-", leftEntry: a[i], rightEntry: null });
          for (var j = rLo; j < rHi; j++) result.push({ op: "+", leftEntry: null, rightEntry: b[j] });
        } else {
          // 앵커 기준으로 앞뒤 재귀
          recurse(lLo, bestLi, rLo, bestRj, depth + 1);
          result.push({ op: "=", leftEntry: a[bestLi], rightEntry: b[bestRj] });
          recurse(bestLi + 1, lHi, bestRj + 1, rHi, depth + 1);
        }
        flushSuffix();
      }

      recurse(0, a.length, 0, b.length, 0);
      return result;
    }

    async function maybeCompareAlignedRow(rowIndex, generation) {

    async function detectDiffRects_Default(leftView, rightView, generation) {
      var canvas1 = leftView.canvas, canvas2 = rightView.canvas;
      var cssWidth = leftView.width, cssHeight = leftView.height;
      var w = canvas1.width, h = canvas1.height;
      var sampledCanvas2 = canvas2;
      if (canvas2.width !== w || canvas2.height !== h) {
        sampledCanvas2 = document.createElement("canvas");
        sampledCanvas2.width = w;
        sampledCanvas2.height = h;
        sampledCanvas2.getContext("2d").drawImage(canvas2, 0, 0, w, h);
      }
      var img1 = canvas1.getContext("2d").getImageData(0, 0, w, h).data;
      var img2 = sampledCanvas2.getContext("2d").getImageData(0, 0, w, h).data;
      var matchResult = matchTextLines(leftView, rightView);
      var ignoreMask = buildIgnoreMask(matchResult, leftView, rightView, img1, img2, w, h);
      var gridSize = Math.max(4, Math.round(6 * dpr));
      var cols = Math.ceil(w / gridSize),
        rows = Math.ceil(h / gridSize);
      var cells = Array.from({ length: rows }, function () {
        return Array(cols).fill(0);
      });
      var rgbThresh = 20,
        CHUNK = 24;
      for (var gy = 0; gy < rows; gy++) {
        if (gy % CHUNK === 0) {
          if (generation !== undefined && generation !== renderGeneration) {
            return {
              rects: [],
              meta: {}
            };
          }
          await yieldToBrowser();
        }
        for (var gx = 0; gx < cols; gx++) {
          var diffCount = 0,
            samples = 0;
          var sx = gx * gridSize,
            sy = gy * gridSize;
          var ex = Math.min(sx + gridSize, w),
            ey = Math.min(sy + gridSize, h);
          for (var py = sy; py < ey; py++) {
            for (var px = sx; px < ex; px++) {
              var idx = py * w + px;
              if (ignoreMask[idx]) {
                continue;
              }
              var p = idx * 4;
              var dr = img1[p] - img2[p],
                dg = img1[p + 1] - img2[p + 1],
                db = img1[p + 2] - img2[p + 2];
              if (dr * dr + dg * dg + db * db > rgbThresh * rgbThresh) {
                diffCount++;
              }
              samples++;
            }
          }
          if (samples && diffCount / samples > 0.04) {
            cells[gy][gx] = 1;
          }
        }
      }
      var textRectsPx = buildTextDiffRectsPxCached(matchResult, leftView, rightView);
      var textBgRectsPx = buildTextBgDiffRectsCached(matchResult, leftView, rightView, img1, img2, w,
        h);
      for (var i = 0; i < textRectsPx.length; i++) {
        stampRectToCells(textRectsPx[i], cells, gridSize, cols, rows);
      }
      for (var j = 0; j < textBgRectsPx.length; j++) {
        stampRectToCells(textBgRectsPx[j], cells, gridSize, cols, rows);
      }
      var minSize = gridSize * 2;
      var rectsPx = connectedComponentsToRects(cells, gridSize, w, h)
        .filter(function (r) {
          return r.w > minSize && r.h > minSize;
        })
        .map(function (r) {
          return expandRect(r, 4 * dpr, w, h);
        });
      var merged = mergeNearbyRects(rectsPx, 20 * dpr);
      var scaleX = cssWidth / w,
        scaleY = cssHeight / h;
      return {
        rects: merged.map(function (r) {
          var cr = { x: r.x * scaleX, y: r.y * scaleY, w: r.w * scaleX, h: r.h * scaleY };
          return { left: cr, right: cr };
        }),
        meta: {
          ignoredTextBlocks: matchResult.matched.length,
          textDiffBlocks: textRectsPx.length,
          textBgDiffBlocks: textBgRectsPx.length,
          isImageHeavy: isImageHeavyPage(leftView, rightView),
          mode: "default"
        }
      };
    }

        .map(function (r) {

    async function detectDiffRects_TextOnly(leftView, rightView, generation) {
      await yieldToBrowser();
      if (generation !== undefined && generation !== renderGeneration) {
        return { rects: [], meta: {} };
      }

      if (!globalTextLines1.length || !globalTextLines2.length) {
        globalTextLines1 = collectAllTextLines(pageViews1);
        globalTextLines2 = collectAllTextLines(pageViews2);
      }

      var diffOps = computeLineDiff(globalTextLines1, globalTextLines2);

      var lDiffs = [], rDiffs = [];
      diffOps.forEach(function (op) {
        if ((op.op === "-" || op.op === "~") && op.leftEntry && op.leftEntry.pageNo
          === leftView.pageNo) {
          lDiffs.push(op.leftEntry.line);
        }
        if ((op.op === "+" || op.op === "~") && op.rightEntry && op.rightEntry.pageNo
          === rightView.pageNo) {
          rDiffs.push(op.rightEntry.line);
        }
      });

      if (lDiffs.length === 0 && rDiffs.length === 0) {
        return { rects: [], meta: { mode: "text" } };
      }

      var lRects = mergeNearbyRects(lDiffs.map(function (ln) {
        return expandRectCss(ln, 4, leftView.width, leftView.height);
      }), 8);
      var rRects = mergeNearbyRects(rDiffs.map(function (ln) {
        return expandRectCss(ln, 4, rightView.width, rightView.height);
      }), 8);

      var pairCount = Math.max(lRects.length, rRects.length);
      var rects = [];
      for (var i = 0; i < pairCount; i++) {
        rects.push({
          left: lRects[i] || rRects[i],
          right: rRects[i] || lRects[i]
        });
      }

      return {
        rects: rects,
        meta: {
          ignoredTextBlocks: 0,
          textDiffBlocks: rects.length,
          textBgDiffBlocks: 0,
          isImageHeavy: false,
          mode: "text"
        }
      };
    }

    function collectAllTextLines(pageViews) {
      var result = [];
      for (var i = 0; i < pageViews.length; i++) {
        var pv = pageViews[i];
        if (!pv || pv.isMissing || !pv.textLines) {
          continue;
        }
        pv.textLines.forEach(function (ln) {
          result.push({ pageNo: pv.pageNo, line: ln });
        });
      }
      return result;
    }

    async function buildAllPageSignatures(pdfDoc, generation, sideLabel) {
      var total = pdfDoc.numPages,

    async function buildPageSignature(pdfDoc, pageNo) {
      var page;
      try {
        page = await pdfDoc.getPage(pageNo);
      } catch (e) {
        return {
          pageNo: pageNo,
          width: 595,
          height: 842,
          text: "",
          textLength: 0,
          imageFingerprint: []
        };
      }
      var viewport = page.getViewport({ scale: 1.0 });
      var normalizedText = "", textLength = 0;
      try {
        var tc = await page.getTextContent();
        var rawText = (tc.items || []).map(function (it) {
          return (it.str || "").trim();
        }).filter(Boolean).join(" ");
        normalizedText = normalizeTextForCompare(rawText);
        textLength = normalizedText.length;
      } catch (e) {
      }
      var imageFingerprint = [];
      try {
        var ts = 0.12, tv = page.getViewport({ scale: ts });
        var tc2 = document.createElement("canvas");
        tc2.width = Math.max(16, Math.floor(tv.width));
        tc2.height = Math.max(16, Math.floor(tv.height));
        var tctx = tc2.getContext("2d", { alpha: false });
        await page.render({ canvasContext: tctx, viewport: tv }).promise;
        var id = tctx.getImageData(0, 0, tc2.width, tc2.height).data;
        imageFingerprint = buildImageFingerprint(id, tc2.width, tc2.height, 16, 16);
      } catch (e) {
      }
      try {
        page.cleanup();
      } catch (e) {
      }
      return {
        pageNo: pageNo,
        width: Math.round(viewport.width),
        height: Math.round(viewport.height),
        text: normalizedText,
        textLength: textLength,
        imageFingerprint: imageFingerprint
      };
    }

    function buildImageFingerprint(data, width, height, cols, rows) {
      var cellW = width / cols,
        cellH = height / rows,
        values = [];
      for (var gy = 0; gy < rows; gy++) {
        for (var gx = 0; gx < cols; gx++) {
          var sx = Math.floor(gx * cellW),
            sy = Math.floor(gy * cellH);
          var ex = Math.min(width, Math.floor((gx + 1) * cellW)),
            ey = Math.min(height, Math.floor((gy + 1) * cellH));
          var sL = 0, sR = 0, sG = 0, sB = 0,
            cnt = 0;
          for (var y = sy; y < ey; y++) {
            for (var x = sx; x < ex; x++) {
              var p = (y * width + x) * 4,
                r = data[p], g = data[p + 1], b = data[p + 2];
              sL += 0.299 * r + 0.587 * g + 0.114 * b;
              sR += r;
              sG += g;
              sB += b;
              cnt++;
            }
          }
          if (cnt) {
            values.push(sL / cnt, sR / cnt, sG / cnt, sB / cnt);
          } else {
            values.push(255, 255, 255, 255);
          }
        }
      }
      return values;
    }

    function imageFingerprintSimilarity(a, b) {
      if (!a || !b || !a.length || !b.length || a.length !== b.length) {
        return 0;
      }
      var d = 0;
      for (var i = 0; i < a.length; i++) {
        d += Math.abs(a[i] - b[i]);
      }
      return Math.max(0, 1 - (d / a.length) / 255);
    }

    function pageSimilarity(sA, sB) {
      if (!sA || !sB) {
        return 0;
      }
      var ts = textSimilarity(sA.text, sB.text),
        is = imageFingerprintSimilarity(sA.imageFingerprint, sB.imageFingerprint);
      var hA = sA.textLength > 20,
        hB = sB.textLength > 20;
      var score = (hA && hB) ? ts * 0.55 + is * 0.45 : ts * 0.20 + is * 0.80;
      var sp = 0;
      if (Math.abs(sA.width - sB.width) > 10 || Math.abs(sA.height - sB.height) > 10) {
        sp += 0.08;
      }
      sp += Math.abs(sA.textLength - sB.textLength)
        / Math.max(1, Math.max(sA.textLength, sB.textLength)) * 0.12;
      return Math.max(0, score - sp - Math.abs(sA.pageNo - sB.pageNo) * 0.008);
    }

    async function alignPageSequences(leftSigs, rightSigs) {
      var n = leftSigs.length,
        m = rightSigs.length,
        gapPenalty = 0.43,
        CHUNK = 8;
      var dp = Array.from({ length: n + 1 }, function () {
        return Array(m + 1).fill(0);
      });
      var path = Array.from({ length: n + 1 }, function () {
        return Array(m + 1).fill(null);
      });
      for (var i = 1; i <= n; i++) {
        dp[i][0] = dp[i - 1][0] - gapPenalty;
        path[i][0] = "up";
      }
      for (var j = 1; j <= m; j++) {
        dp[0][j] = dp[0][j - 1] - gapPenalty;
        path[0][j] = "left";
      }
      for (var y = 1; y <= n; y++) {
        if (y % CHUNK === 0) {
          ldSetStepProgress(y / n);
          ldUpdateSub(2, "DP 계산 중... " + y + " / " + n);
          ldSetLog("정렬 계산 중... " + y + " / " + n);
          await yieldToBrowser();
        }
        for (var x = 1; x <= m; x++) {
          var sim = pageSimilarity(leftSigs[y - 1], rightSigs[x - 1]);
          var diag = dp[y - 1][x - 1] + sim,
            up = dp[y - 1][x] - gapPenalty,
            left = dp[y][x - 1] - gapPenalty;
          var best = diag,
            dir = "diag";
          if (up > best) {
            best = up;
            dir = "up";
          }
          if (left > best) {
            best = left;
            dir = "left";
          }
          dp[y][x] = best;
          path[y][x] = dir;
        }
      }
      var result = [],
        i2 = n, j2 = m,
        thr = 0.70;
      while (i2 > 0 || j2 > 0) {
        var d2 = path[i2][j2];
        if (i2 > 0 && j2 > 0 && d2 === "diag") {
          var ls = leftSigs[i2 - 1],
            rs = rightSigs[j2 - 1],
            s2 = pageSimilarity(ls, rs);
          if (s2 >= thr) {
            result.push(
              { type: "match", leftPageNo: ls.pageNo, rightPageNo: rs.pageNo, similarity: s2 });
          } else {
            result.push({ type: "insert", leftPageNo: null, rightPageNo: rs.pageNo, similarity: 0 });
            result.push({ type: "delete", leftPageNo: ls.pageNo, rightPageNo: null, similarity: 0 });
          }
          i2--;
          j2--;
        } else if (i2 > 0 && (j2 === 0 || d2 === "up")) {
          result.push({
            type: "delete",
            leftPageNo: leftSigs[i2 - 1].pageNo,
            rightPageNo: null,
            similarity: 0
          });
          i2--;
        } else {
          result.push({
            type: "insert",
            leftPageNo: null,
            rightPageNo: rightSigs[j2 - 1].pageNo,
            similarity: 0
          });
          j2--;
        }
      }
      result.reverse();
      return result;
    }

    async function ensureRendered(pdfDoc, pageView, generation) {
      if (generation !== renderGeneration) {
        return;
      }

        return;

      pageView.renderToken++;
      var token = pageView.renderToken;

      var viewport = page.getViewport({ scale: renderScale });
      if (generation !== renderGeneration || token !== pageView.renderToken) {

          return ay - by;
        }
        var ax = a.leftRect ? a.leftRect.x : (a.rightRect ? a.rightRect.x : 0);
        var bx = b.leftRect ? b.leftRect.x : (b.rightRect ? b.rightRect.x : 0);
        return ax - bx;
      });
    }

    function drawDiffBox(overlay, rect, diffId, kind) {
      var box = document.createElement("div");
      box.className = "diff-box";
      if (kind === "insert") {
        box.classList.add("insert-box");
      }
      if (kind === "delete") {
        box.classList.add("delete-box");
      }
      box.dataset.diffId = diffId;
      box.style.left = rect.x + "px";
      box.style.top = rect.y + "px";
      box.style.width = rect.w + "px";
      box.style.height = rect.h + "px";
      overlay.appendChild(box);
    }

    function buildChangedThumbList() {
      thumbListEl.innerHTML = "";
      if (!diffEntries.length) {
        thumbListEl.innerHTML = '<div class="empty">변경된 페이지가 없습니다.</div>';
        return;
      }
      if (compareMode === "text") {
        buildChangedThumbList_TextOnly();
        return;
      }
      var uniqueRows = Array.from(new Set(diffEntries.map(function (d) {
        return d.rowIndex;
      }))).sort(function (a, b) {
        return a - b;
      });
      for (var i = 0; i < uniqueRows.length; i++) {
        (function (rowIndex) {
          var row = alignmentRows[rowIndex];
          var rowDiffs = diffEntries.filter(function (d) {
            return d.rowIndex === rowIndex;
          });
          var primary = rowDiffs[0], leftMeta = pageViews1[rowIndex] ? pageViews1[rowIndex].meta : {};
          var kind = primary ? primary.kind : "change";
          var item = document.createElement("div");
          item.className = "thumb-item";
          item.dataset.rowIndex = rowIndex;
          var titleDiv = document.createElement("div");
          titleDiv.className = "thumb-title";
          if (kind === "insert") {
            titleDiv.textContent = "삽입 - 우측 페이지 " + row.rightPageNo;
          } else if (kind === "delete") {
            titleDiv.textContent = "삭제 - 좌측 페이지 " + row.leftPageNo;
          } else {
            titleDiv.textContent = "비교 - 좌 " + row.leftPageNo + " ↔ 우 " + row.rightPageNo
              + (leftMeta.isImageHeavy ? " 🖼" : "");
          }
          var metaDiv = document.createElement("div");
          metaDiv.className = "thumb-meta";
          var modeLabel = leftMeta.mode === "text" ? "[텍스트 전용] "
            : leftMeta.mode === "pixel" ? "[픽셀 전용] "
              : "";
          if (kind === "insert") {
            metaDiv.textContent = "새 버전에만 존재하는 페이지입니다.\n우측 페이지 번호: "
              + row.rightPageNo;
          } else if (kind === "delete") {
            metaDiv.textContent = "구 버전에만 존재하는 페이지입니다.\n좌측 페이지 번호: "
              + row.leftPageNo;
          } else {
            metaDiv.textContent = modeLabel + "변경 " + rowDiffs.length + "건\n동일 텍스트 무시 "
              + (leftMeta.ignoredTextBlocks || 0) + "줄 / 텍스트 변경 " + (leftMeta.textDiffBlocks || 0)
              + "건 / 배경색 변경 " + (leftMeta.textBgDiffBlocks || 0) + "건";
          }
          var badge = document.createElement("span");
          badge.className = "badge " + (kind === "change" ? "changed"
            : kind === "insert" ? "inserted" : "deleted");
          badge.textContent = kind === "change" ? "changed"
            : kind === "insert" ? "inserted" : "deleted";
          item.appendChild(titleDiv);
          item.appendChild(metaDiv);
          item.appendChild(badge);
          item.addEventListener("click", function () {
            var fi = diffEntries.findIndex(function (d) {
              return d.rowIndex === rowIndex;
            });
            if (fi >= 0) {
              goToDiff(fi);
            } else {
              scrollToRow(rowIndex);
              highlightThumbOnly(rowIndex);
            }
          });
          thumbListEl.appendChild(item);
        })(uniqueRows[i]);
      }
    }

    function buildChangedThumbList_TextOnly() {
      // Group by left page (rowIndex)
      var uniqueLeftRows = Array.from(new Set(diffEntries.map(function (d) {
        return d.rowIndex;
      }))).sort(function (a, b) { return a - b; });

      for (var i = 0; i < uniqueLeftRows.length; i++) {
        (function (rowIndex) {
          var rowDiffs = diffEntries.filter(function (d) { return d.rowIndex === rowIndex; });
          var fi = diffEntries.findIndex(function (d) { return d.rowIndex === rowIndex; });
          var leftPageNo = rowIndex + 1;
          var rightPageNos = Array.from(new Set(
            rowDiffs.map(function (d) { return d.rightPageNo; }).filter(function (p) { return p != null; })
          )).sort(function (a, b) { return a - b; });

          var item = document.createElement("div");
          item.className = "thumb-item";
          item.dataset.rowIndex = rowIndex;

          var titleDiv = document.createElement("div");
          titleDiv.className = "thumb-title";
          titleDiv.textContent = "[텍스트 전용] 좌 p" + leftPageNo
            + (rightPageNos.length ? " ↔ 우 p" + rightPageNos.join(", p") : "");

          var metaDiv = document.createElement("div");
          metaDiv.className = "thumb-meta";
          metaDiv.textContent = "변경 블록 " + rowDiffs.length + "건 / Myers diff";

          var badge = document.createElement("span");
          badge.className = "badge changed";
          badge.textContent = "changed";

          item.appendChild(titleDiv);
          item.appendChild(metaDiv);
          item.appendChild(badge);
          item.addEventListener("click", function () {
            if (fi >= 0) goToDiff(fi);
          });
          thumbListEl.appendChild(item);
        })(uniqueLeftRows[i]);
      }
    }

    function updatePageStatusBadge(pv, diffCount, kind) {
      if (!pv || !pv.status) {
        return;
      }
      if (kind === "insert") {
        pv.status.textContent = pv.isMissing ? "insert gap" : "inserted";
        return;
      }
      if (kind === "delete") {
        pv.status.textContent = pv.isMissing ? "delete gap" : "deleted";
        return;
      }
      pv.status.textContent = diffCount > 0 ? ("changed " + diffCount) : "same";
    }

    function scrollToRow(rowIndex, smooth) {
      smooth = smooth !== false;
      var left = pageViews1[rowIndex], right = pageViews2[rowIndex];
      if (!left || !right) {
        return;
      }
      navLockUntil = performance.now() + 500;
      pdf1El.scrollTo(
        { top: Math.max(0, left.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto" });
      pdf2El.scrollTo(
        { top: Math.max(0, right.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto" });
    }

    function getScrollTopForRect(pageWrap, rect, container) {
      var rectTop = rect ? (rect.y * viewScale) : 0;
      var targetTop = pageWrap.offsetTop + rectTop - container.clientHeight * 0.35;
      return Math.max(0,
        Math.min(targetTop, Math.max(0, container.scrollHeight - container.clientHeight)));
    }

    async function goToDiff(index, smooth) {
      smooth = smooth !== false;
      if (!diffEntries.length) {
        return;
      }
      if (index < 0) {
        index = diffEntries.length - 1;
      }
      if (index >= diffEntries.length) {
        index = 0;
      }
      currentDiffIndex = index;
      var entry = diffEntries[index];
      highlightCurrent();
      var lv = pageViews1[entry.rowIndex];
      var rv = pageViews2[entry.rightRowIndex !== undefined ? entry.rightRowIndex : entry.rowIndex];
      if (!lv || !rv) {
        return;
      }
      navLockUntil = performance.now() + 500;
      pdf1El.scrollTo({
        top: getScrollTopForRect(lv.pageWrap, entry.leftRect, pdf1El),
        behavior: smooth ? "smooth" : "auto"
      });
      pdf2El.scrollTo({
        top: getScrollTopForRect(rv.pageWrap, entry.rightRect, pdf2El),
        behavior: smooth ? "smooth" : "auto"
      });
      flashCurrent(entry.id);
    }

    function goToNextDiff() {
      if (diffEntries.length) {
        goToDiff(currentDiffIndex + 1);
      }
    }

    function goToPrevDiff() {
      if (diffEntries.length) {
        goToDiff(currentDiffIndex - 1);
      }
    }

    function flashCurrent(diffId) {
      document.querySelectorAll('.diff-box[data-diff-id="' + diffId + '"]').forEach(function (el) {
        el.classList.remove("flash");
        void el.offsetWidth;
        el.classList.add("flash");
        setTimeout(function () {
          el.classList.remove("flash");
        }, 1000);
      });
    }

    function highlightThumbOnly(rowIndex) {
      document.querySelectorAll(".thumb-item.active").forEach(function (el) {
        el.classList.remove("active");
      });
      var item = thumbListEl.querySelector('.thumb-item[data-row-index="' + rowIndex + '"]');
      if (item) {
        item.classList.add("active");
        item.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    function highlightCurrent() {
      document.querySelectorAll(".diff-box.current").forEach(function (el) {
        el.classList.remove("current");
      });
      document.querySelectorAll(".thumb-item.active").forEach(function (el) {
        el.classList.remove("active");
      });
      if (currentDiffIndex < 0 || currentDiffIndex >= diffEntries.length) {
        return;
      }
      var cur = diffEntries[currentDiffIndex];
      document.querySelectorAll('.diff-box[data-diff-id="' + cur.id + '"]').forEach(function (el) {
        el.classList.add("current");
      });
      var item = thumbListEl.querySelector('.thumb-item[data-row-index="' + cur.rowIndex + '"]');
      if (item) {
        item.classList.add("active");
        item.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    pdf1El.addEventListener("scroll", function () {
      syncScroll(pdf1El, pdf2El);
    });
    pdf2El.addEventListener("scroll", function () {
      syncScroll(pdf2El, pdf1El);
    });

    function syncScroll(src, tgt) {
      if (compareMode === "text") {
        return;
      }
      if (syncLock || performance.now() < navLockUntil) {
        return;
      }
      syncLock = true;
      var sy = Math.max(1, src.scrollHeight - src.clientHeight);
      var ty = Math.max(1, tgt.scrollHeight - tgt.clientHeight);
      tgt.scrollTop = (src.scrollTop / sy) * ty;
      var sx2 = Math.max(1, src.scrollWidth - src.clientWidth);
      var tx2 = Math.max(1, tgt.scrollWidth - tgt.clientWidth);
      tgt.scrollLeft = (src.scrollLeft / sx2) * tx2;
      requestAnimationFrame(function () {
        syncLock = false;
      });
    }
  </script>
</body>

</html>
