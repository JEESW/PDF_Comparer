<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PDF Visual Compare Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --white: #ffffff;
            --gray-50: #f8f9fb;
            --gray-100: #f0f2f5;
            --gray-200: #e4e7ed;
            --gray-300: #cdd2db;
            --gray-400: #9aa1b0;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-900: #111827;
            --blue-50: #eff6ff;
            --blue-100: #dbeafe;
            --blue-200: #bfdbfe;
            --blue-300: #93c5fd;
            --blue-400: #60a5fa;
            --blue-500: #3b82f6;
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --red-100: #fee2e2;
            --red-700: #b91c1c;
            --green-100: #dcfce7;
            --green-700: #15803d;
            --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.06);
            --radius-sm: 5px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            --toolbar-h: 56px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-ui);
            background: var(--gray-50);
            color: var(--gray-900);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .toolbar {
            height: var(--toolbar-h);
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 30;
            flex-wrap: nowrap;
            box-shadow: var(--shadow-xs);
        }

        .toolbar > div:not(.summary) {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--gray-400);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .toolbar select, .toolbar button {
            height: 32px;
        }

        .toolbar button {
            padding: 0 12px;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            background: var(--white);
            color: var(--gray-700);
            font-family: var(--font-ui);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.12s;
            box-shadow: var(--shadow-xs);
        }

        .toolbar button:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            color: var(--gray-900);
        }

        .toolbar button:active {
            background: var(--gray-100);
            transform: translateY(1px);
            box-shadow: none;
        }

        #compareBtn {
            background: var(--blue-600);
            border-color: var(--blue-700);
            color: var(--white);
            box-shadow: var(--shadow-sm);
        }

        #compareBtn:hover {
            background: var(--blue-700);
            border-color: var(--blue-700);
            color: var(--white);
        }

        .toolbar .summary {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--gray-400);
            letter-spacing: -0.01em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .layout {
            display: grid;
            grid-template-columns: 272px 1fr;
            height: calc(100vh - var(--toolbar-h));
        }

        .sidebar {
            background: var(--white);
            overflow: auto;
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--gray-200);
            border-radius: 2px;
        }

        .sidebar h2 {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: var(--gray-400);
            padding: 16px 16px 12px;
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 2;
            border-bottom: 1px solid var(--gray-100);
        }

        .note {
            font-size: 12px;
            color: var(--gray-400);
            line-height: 1.55;
            padding: 10px 16px 8px;
            border-bottom: 1px solid var(--gray-100);
        }

        .thumb-list {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 10px;
        }

        .thumb-item {
            border: 1px solid var(--gray-100);
            background: var(--white);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.12s ease;
        }

        .thumb-item:hover {
            border-color: var(--gray-300);
            background: var(--gray-50);
            box-shadow: var(--shadow-xs);
        }

        .thumb-item.active {
            border-color: var(--blue-300);
            background: var(--blue-50);
            box-shadow: 0 0 0 3px var(--blue-100);
        }

        .thumb-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .thumb-meta {
            font-size: 11px;
            color: var(--gray-400);
            line-height: 1.6;
            white-space: pre-line;
        }

        .badge {
            display: inline-block;
            margin-top: 6px;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge.same {
            background: var(--green-100);
            color: var(--green-700);
        }

        .badge.changed {
            background: var(--red-100);
            color: var(--red-700);
        }

        .badge.inserted, .badge.deleted {
            background: var(--red-100);
            color: var(--red-700);
        }

        .empty {
            font-size: 13px;
            color: var(--gray-400);
            padding: 20px 6px;
            text-align: center;
            line-height: 1.6;
        }

        .main {
            display: flex;
            height: 100%;
            overflow: hidden;
        }

        .pdf-pane {
            width: 50%;
            overflow: auto;
            border-right: 1px solid var(--gray-200);
            background: var(--gray-100);
            padding: 20px 16px;
        }

        .pdf-pane:last-child {
            border-right: none;
        }

        .pdf-pane::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .pdf-pane::-webkit-scrollbar-track {
            background: transparent;
        }

        .pdf-pane::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 3px;
        }

        .pdf-pane::-webkit-scrollbar-thumb:hover {
            background: var(--blue-400);
        }

        .page-wrap {
            position: relative;
            margin: 0 auto 20px;
            width: fit-content;
            background: var(--white);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: box-shadow 0.2s, border-color 0.2s;
        }

        .page-wrap:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
            border-color: var(--gray-300);
        }

        .page-label {
            background: var(--white);
            border-bottom: 1px solid var(--gray-100);
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gray-400);
            padding: 7px 12px;
        }

        .page-body {
            position: relative;
            overflow: hidden;
            background: white;
        }

        .page-stage {
            position: absolute;
            left: 0;
            top: 0;
            background: white;
            transform-origin: top left;
        }

        canvas {
            display: block;
            background: white;
        }

        .overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .diff-box {
            position: absolute;
            border-radius: 3px;
            border: 1.5px solid rgba(239, 68, 68, 0.80);
            background: rgba(239, 68, 68, 0.08);
            transition: 0.2s ease;
        }

        .diff-box.current {
            border-color: rgba(37, 99, 235, 0.95) !important;
            background: rgba(59, 130, 246, 0.18) !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }

        .diff-box.flash {
            animation: flashBox 0.9s ease-in-out 2;
        }

        @keyframes flashBox {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }

        .page-status {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 3;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 500;
            color: var(--white);
            background: rgba(31, 41, 55, 0.75);
            padding: 3px 8px;
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        .missing-stage {
            background: linear-gradient(180deg, #fafafa, #f4f4f5);
        }

        .missing-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: var(--gray-500);
            font-size: 14px;
            padding: 20px;
            line-height: 1.6;
        }

        .missing-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-700);
            margin-bottom: 8px;
        }

        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(15, 23, 42, 0.50);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        #loadingOverlay.visible {
            display: flex;
        }

        .ld-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 16px rgba(0, 0, 0, 0.10);
            padding: 28px 32px 24px;
            min-width: 400px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            animation: ldSlideIn 0.2s ease-out;
        }

        @keyframes ldSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .ld-header {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .ld-spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid var(--blue-100);
            border-top-color: var(--blue-600);
            border-radius: 50%;
            flex-shrink: 0;
            animation: ldSpin 0.75s linear infinite;
        }

        @keyframes ldSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .ld-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .ld-cancel {
            margin-left: auto;
            font-size: 12px;
            color: var(--gray-400);
            background: none;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            padding: 3px 10px;
            cursor: pointer;
            font-family: var(--font-ui);
            transition: all 0.12s;
        }

        .ld-cancel:hover {
            color: var(--red-700);
            border-color: var(--red-700);
            background: var(--red-100);
        }

        .ld-steps {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px 0;
        }

        .ld-step {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--gray-300);
            transition: color 0.2s;
            line-height: 1.4;
        }

        .ld-step.active {
            color: var(--gray-900);
            font-weight: 600;
        }

        .ld-step.done {
            color: var(--green-700);
        }

        .ld-step-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--gray-200);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            transition: all 0.2s;
            background: var(--white);
        }

        .ld-step.active .ld-step-icon {
            border-color: var(--blue-600);
            background: var(--blue-600);
            animation: ldPulseRing 1.2s ease-in-out infinite;
        }

        @keyframes ldPulseRing {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.35);
            }
            50% {
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0);
            }
        }

        .ld-step.active .ld-step-icon::after {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: white;
            animation: ldDot 1s ease-in-out infinite;
        }

        @keyframes ldDot {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }

        .ld-step.done .ld-step-icon {
            border-color: var(--green-700);
            background: var(--green-700);
        }

        .ld-step.done .ld-step-icon::after {
            content: '✓';
            color: white;
            font-size: 11px;
            line-height: 1;
        }

        .ld-step-label {
            flex: 1;
        }

        .ld-step-sub {
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 400;
            margin-top: 1px;
        }

        .ld-step.active .ld-step-sub {
            color: var(--blue-600);
            font-weight: 500;
        }

        .ld-progress-wrap {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .ld-progress-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--gray-400);
            font-family: var(--font-mono);
        }

        .ld-bar-bg {
            height: 5px;
            background: var(--gray-100);
            border-radius: 999px;
            overflow: hidden;
        }

        .ld-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue-600), var(--blue-400));
            border-radius: 999px;
            transition: width 0.35s ease;
            width: 0%;
        }

        .ld-log {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--gray-400);
            background: var(--gray-50);
            border: 1px solid var(--gray-100);
            border-radius: var(--radius-sm);
            padding: 7px 11px;
            min-height: 28px;
            line-height: 1.5;
            word-break: break-all;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="ld-card">
        <div class="ld-header">
            <div class="ld-spinner"></div>
            <div class="ld-title">PDF 비교 중...</div>
            <button class="ld-cancel" id="ldCancelBtn">✕ 취소</button>
        </div>
        <div class="ld-steps">
            <div class="ld-step" id="ldStep0">
                <div class="ld-step-icon"></div>
                <div class="ld-step-label">
                    <div>좌측 PDF 시그니처 생성</div>
                    <div class="ld-step-sub" id="ldStep0sub">대기 중...</div>
                </div>
            </div>
            <div class="ld-step" id="ldStep1">
                <div class="ld-step-icon"></div>
                <div class="ld-step-label">
                    <div>우측 PDF 시그니처 생성</div>
                    <div class="ld-step-sub" id="ldStep1sub">대기 중...</div>
                </div>
            </div>
            <div class="ld-step" id="ldStep2">
                <div class="ld-step-icon"></div>
                <div class="ld-step-label">
                    <div>페이지 순서 정렬 분석</div>
                    <div class="ld-step-sub" id="ldStep2sub">대기 중...</div>
                </div>
            </div>
            <div class="ld-step" id="ldStep3">
                <div class="ld-step-icon"></div>
                <div class="ld-step-label">
                    <div>페이지 렌더링 &amp; 차이점 검출</div>
                    <div class="ld-step-sub" id="ldStep3sub">대기 중...</div>
                </div>
            </div>
        </div>
        <div class="ld-progress-wrap">
            <div class="ld-progress-labels">
                <span id="ldProgressLabel">준비 중...</span>
                <span id="ldProgressPct">0%</span>
            </div>
            <div class="ld-bar-bg">
                <div class="ld-bar-fill" id="ldBarFill"></div>
            </div>
        </div>
        <div class="ld-log" id="ldLog">잠시만 기다려 주세요.</div>
    </div>
</div>

<div class="toolbar">
    <input type="file" id="file1" accept="application/pdf"/>
    <input type="file" id="file2" accept="application/pdf"/>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="prevBtn">이전 변경</button>
    <button id="nextBtn">다음 변경</button>
    <button id="compareBtn">다시 비교</button>
    <div class="summary" id="summaryText">PDF 2개를 선택하세요.</div>
</div>

<div class="layout">
    <aside class="sidebar">
        <h2>변경 페이지 목록</h2>
        <div class="note">
            전체 페이지를 한 번에 렌더링하고 비교합니다.<br>
            목록에는 변경이 감지된 페이지만 표시됩니다.<br>
            항목을 클릭하면 해당 페이지로 이동합니다.
        </div>
        <div id="thumbList" class="thumb-list">
            <div class="empty">비교 후 변경된 페이지 목록이 표시됩니다.</div>
        </div>
    </aside>
    <div class="main">
        <div id="pdf1" class="pdf-pane"></div>
        <div id="pdf2" class="pdf-pane"></div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    var ldOverlay = document.getElementById("loadingOverlay");
    var ldBarFill = document.getElementById("ldBarFill");
    var ldLog = document.getElementById("ldLog");
    var ldProgLabel = document.getElementById("ldProgressLabel");
    var ldProgPct = document.getElementById("ldProgressPct");
    var ldCancelBtn = document.getElementById("ldCancelBtn");

    var STEP_WEIGHTS = [25, 25, 5, 45];
    var ldCurrentStep = -1;
    var ldStepProgress = 0;

    function ldShow() {
        ldCurrentStep = -1;
        ldStepProgress = 0;
        ldBarFill.style.width = "0%";
        ldLog.textContent = "초기화 중...";
        ldProgLabel.textContent = "준비 중...";
        ldProgPct.textContent = "0%";
        [0, 1, 2, 3].forEach(function (i) {
            var el = document.getElementById("ldStep" + i);
            el.classList.remove("active", "done");
            document.getElementById("ldStep" + i + "sub").textContent = "대기 중...";
        });
        ldOverlay.classList.add("visible");
    }

    function ldHide() {
        ldOverlay.classList.remove("visible");
    }

    function ldActivateStep(stepIndex, subText) {
        if (ldCurrentStep >= 0 && ldCurrentStep < stepIndex) {
            for (var s = ldCurrentStep; s < stepIndex; s++) {
                var prev = document.getElementById("ldStep" + s);
                if (prev) {
                    prev.classList.remove("active");
                    prev.classList.add("done");
                }
            }
        }
        ldCurrentStep = stepIndex;
        ldStepProgress = 0;
        var el = document.getElementById("ldStep" + stepIndex);
        if (el) {
            el.classList.remove("done");
            el.classList.add("active");
        }
        if (subText) ldUpdateSub(stepIndex, subText);
        ldRefreshBar();
    }

    function ldUpdateSub(stepIndex, text) {
        var sub = document.getElementById("ldStep" + stepIndex + "sub");
        if (sub) sub.textContent = text;
    }

    function ldSetStepProgress(ratio) {
        ldStepProgress = Math.max(0, Math.min(1, ratio));
        ldRefreshBar();
    }

    function ldRefreshBar() {
        var done = 0;
        for (var s = 0; s < ldCurrentStep; s++) done += STEP_WEIGHTS[s];
        var current = ldCurrentStep >= 0 ? STEP_WEIGHTS[ldCurrentStep] * ldStepProgress : 0;
        var total = Math.round(done + current);
        ldBarFill.style.width = total + "%";
        ldProgPct.textContent = total + "%";
    }

    function ldSetLog(text) {
        ldLog.textContent = text;
        ldProgLabel.textContent = text;
    }

    var pdfDoc1 = null, pdfDoc2 = null;
    var renderScale = 1.15;
    var viewScale = 1.0;
    var dpr = window.devicePixelRatio || 1;
    var pageViews1 = [], pageViews2 = [];
    var alignmentRows = [];
    var leftRowIndexByPageNo = {}, rightRowIndexByPageNo = {};
    var diffEntries = [];
    var currentDiffIndex = -1;
    var renderGeneration = 0;
    var syncLock = false;
    var navLockUntil = 0;

    var file1El = document.getElementById("file1");
    var file2El = document.getElementById("file2");
    var pdf1El = document.getElementById("pdf1");
    var pdf2El = document.getElementById("pdf2");
    var thumbListEl = document.getElementById("thumbList");
    var summaryTextEl = document.getElementById("summaryText");

    file1El.addEventListener("change", loadPDF1);
    file2El.addEventListener("change", loadPDF2);
    document.getElementById("zoomInBtn").addEventListener("click", function () {
        viewScale = Math.min(viewScale + 0.15, 3);
        applyViewScale();
    });
    document.getElementById("zoomOutBtn").addEventListener("click", function () {
        viewScale = Math.max(viewScale - 0.15, 0.5);
        applyViewScale();
    });

    ldCancelBtn.addEventListener("click", function () {

    async function loadPDF1(e) {

    async function rerenderIfReady() {

    function applyViewScale() {
        var all = pageViews1.concat(pageViews2);
        for (var i = 0; i < all.length; i++) applyScaleToPageView(all[i]);
        if (currentDiffIndex >= 0 && currentDiffIndex < diffEntries.length) highlightCurrent();
        updateZoomSummary();

    function updateZoomSummary() {
        var zoomText = " / 줌 " + Math.round(viewScale * 100) + "%";
        if (!alignmentRows.length) {
            summaryTextEl.textContent = "PDF 2개를 선택하세요." + zoomText;

        }).length;
        var deletedCount = diffEntries.filter(function (d) {

        }).length;

            "정렬 행 " + alignmentRows.length + "개 / 변경 " + changedCount +
            " / 삽입 " + insertedCount + " / 삭제 " + deletedCount +
            " / 변경 위치 " + changedRows.size + "개" + zoomText;
    }

    function applyScaleToPageView(pageView) {
        if (!pageView || !pageView.pageBody || !pageView.stage) return;
        var scaledW = Math.max(1, Math.round(pageView.baseWidth * viewScale));
        var scaledH = Math.max(1, Math.round(pageView.baseHeight * viewScale));
        pageView.pageBody.style.width = scaledW + "px";
        pageView.pageBody.style.height = scaledH + "px";
        pageView.stage.style.width = pageView.baseWidth + "px";
        pageView.stage.style.height = pageView.baseHeight + "px";
        pageView.stage.style.transform = "scale(" + viewScale + ")";
    }

    async function renderAll() {
        renderGeneration++;
        var myGeneration = renderGeneration;

        pdf1El.innerHTML = "";
        pdf2El.innerHTML = "";
        thumbListEl.innerHTML = "";
        summaryTextEl.textContent = "페이지 정렬 준비 중...";
        pageViews1 = [];
        pageViews2 = [];
        alignmentRows = [];
        leftRowIndexByPageNo = {};
        rightRowIndexByPageNo = {};
        diffEntries = [];
        currentDiffIndex = -1;

        ldShow();

        try {
            ldActivateStep(0, "0 / " + pdfDoc1.numPages + " 페이지");
            var leftSignatures = await buildAllPageSignatures(pdfDoc1, myGeneration, "좌측");
            if (myGeneration !== renderGeneration) {
                ldHide();
                return;
            }

            ldActivateStep(1, "0 / " + pdfDoc2.numPages + " 페이지");
            var rightSignatures = await buildAllPageSignatures(pdfDoc2, myGeneration, "우측");
            if (myGeneration !== renderGeneration) {
                ldHide();
                return;
            }

            ldActivateStep(2, "DP 행렬 계산 중...");
            ldSetLog("페이지 순서 정렬 계산 중... (" + leftSignatures.length + " × " + rightSignatures.length + ")");
            summaryTextEl.textContent = "페이지 정렬 계산 중...";
            alignmentRows = alignPageSequences(leftSignatures, rightSignatures);
            if (myGeneration !== renderGeneration) {
                ldHide();
                return;
            }

            var _ins = alignmentRows.filter(function (r) {
                return r.type === "insert";
            }).length;
            var _del = alignmentRows.filter(function (r) {
                return r.type === "delete";
            }).length;
            var _mat = alignmentRows.filter(function (r) {
                return r.type === "match";
            }).length;
            ldUpdateSub(2, "매칭 " + _mat + " / 삽입 " + _ins + " / 삭제 " + _del);
            ldSetStepProgress(1);

            summaryTextEl.textContent = "페이지 껍데기 생성 중...";
            ldSetLog("페이지 레이아웃 구성 중...");

            for (var rowIndex = 0; rowIndex < alignmentRows.length; rowIndex++) {
                var row = alignmentRows[rowIndex];
                var leftView = null, rightView = null;

                if (row.leftPageNo != null) {
                    var lm = await getPageMeta(pdfDoc1, row.leftPageNo);
                    leftView = createPageShell(pdf1El, row.leftPageNo, "좌측", lm.width, lm.height, rowIndex);
                    leftRowIndexByPageNo[row.leftPageNo] = rowIndex;
                } else {
                    var rm2 = await getPageMeta(pdfDoc2, row.rightPageNo);
                    leftView = createMissingPageShell(pdf1El, "좌측 PDF - 없음", rm2.width, rm2.height, "insert", rowIndex);
                }
                if (row.rightPageNo != null) {
                    var rm = await getPageMeta(pdfDoc2, row.rightPageNo);
                    rightView = createPageShell(pdf2El, row.rightPageNo, "우측", rm.width, rm.height, rowIndex);
                    rightRowIndexByPageNo[row.rightPageNo] = rowIndex;
                } else {
                    var lm2 = await getPageMeta(pdfDoc1, row.leftPageNo);
                    rightView = createMissingPageShell(pdf2El, "우측 PDF - 없음", lm2.width, lm2.height, "delete", rowIndex);
                }

                pageViews1.push(leftView);
                pageViews2.push(rightView);
            }

            applyViewScale();

            ldActivateStep(3, "0 / " + alignmentRows.length + " 행 처리 중");
            summaryTextEl.textContent = "정렬된 페이지 렌더링/비교 중...";

            var totalRows = alignmentRows.length;
            for (var i = 0; i < totalRows; i++) {
                if (myGeneration !== renderGeneration) {
                    ldHide();
                    return;
                }

                var row = alignmentRows[i];
                var left = pageViews1[i];
                var right = pageViews2[i];

                ldSetStepProgress(i / totalRows);

                var pLabel = (i + 1) + " / " + totalRows;
                if (row.type === "match") {
                    ldUpdateSub(3, pLabel + " — 좌 " + row.leftPageNo + " ↔ 우 " + row.rightPageNo + " (픽셀 diff 검출)");
                    ldSetLog("p" + row.leftPageNo + " ↔ p" + row.rightPageNo + "  유사도 " + (row.similarity * 100).toFixed(1) + "% → 픽셀 diff 검출 중...");
                } else if (row.type === "insert") {
                    ldUpdateSub(3, pLabel + " — 우측 p" + row.rightPageNo + " 삽입");
                    ldSetLog("우측 페이지 " + row.rightPageNo + " 삽입 감지");
                } else {
                    ldUpdateSub(3, pLabel + " — 좌측 p" + row.leftPageNo + " 삭제");
                    ldSetLog("좌측 페이지 " + row.leftPageNo + " 삭제 감지");
                }

                if (row.type === "match") {
                    await Promise.all([ensureRendered(pdfDoc1, left, myGeneration), ensureRendered(pdfDoc2, right, myGeneration)]);
                    await maybeCompareAlignedRow(i, myGeneration);
                } else if (row.type === "insert") {
                    await ensureRendered(pdfDoc2, right, myGeneration);
                    markInsertedRow(i);
                } else if (row.type === "delete") {
                    await ensureRendered(pdfDoc1, left, myGeneration);
                    markDeletedRow(i);
                }

                summaryTextEl.textContent = "정렬 행 " + (i + 1) + " / " + totalRows + " 처리 완료 / 현재 변경 " + diffEntries.length + "건";
            }

            buildChangedThumbList();
            ldSetStepProgress(1);
            ldHide();
            updateZoomSummary();
        } catch (err) {
            console.error("renderAll error:", err);
            ldSetLog("❌ 오류 발생: " + (err && err.message ? err.message : String(err)));
            ldUpdateSub(0, "오류 발생 — 취소하고 다시 시도하세요");
            summaryTextEl.textContent = "비교 중 오류가 발생했습니다: " + (err && err.message ? err.message : String(err));
        }
    }

    async function buildAllPageSignatures(pdfDoc, generation, sideLabel) {
        var total = pdfDoc.numPages;
        var result = [];
        var stepIndex = sideLabel === "좌측" ? 0 : 1;

        for (var p = 1; p <= total; p++) {
            if (generation !== renderGeneration) return result;
            summaryTextEl.textContent = sideLabel + " PDF 시그니처 생성 중... " + p + " / " + total;
            ldUpdateSub(stepIndex, p + " / " + total + " 페이지");
            ldSetLog(sideLabel + " PDF 시그니처 생성 중... " + p + " / " + total);
            ldSetStepProgress((p - 1) / total);
            result.push(await buildPageSignature(pdfDoc, p));
        }
        ldUpdateSub(stepIndex, "완료 (" + total + " 페이지)");
        return result;
    }

    async function buildPageSignature(pdfDoc, pageNo) {
        var page;
        try {
            page = await pdfDoc.getPage(pageNo);
        } catch (e) {
            console.error("getPage failed p" + pageNo, e);
            ldSetLog("⚠ p" + pageNo + " getPage 실패: " + e.message);
            return {pageNo: pageNo, width: 595, height: 842, text: "", textLength: 0, imageFingerprint: []};
        }

        var viewport = page.getViewport({scale: 1.0});

        var normalizedText = "", textLength = 0;
        try {
            ldSetLog("  p" + pageNo + " 텍스트 추출 중...");
            var textContent = await page.getTextContent();
            var rawText = (textContent.items || []).map(function (item) {
                return (item.str || "").trim();
            }).filter(Boolean).join(" ");
            normalizedText = normalizeTextForCompare(rawText);
            textLength = normalizedText.length;
        } catch (e) {
            console.warn("getTextContent failed p" + pageNo, e);
            ldSetLog("⚠ p" + pageNo + " 텍스트 추출 실패: " + e.message);
        }

        var imageFingerprint = [];
        try {
            ldSetLog("  p" + pageNo + " 썸네일 렌더 중...");
            var thumbScale = 0.12;
            var thumbViewport = page.getViewport({scale: thumbScale});
            var thumbCanvas = document.createElement("canvas");
            thumbCanvas.width = Math.max(16, Math.floor(thumbViewport.width));
            thumbCanvas.height = Math.max(16, Math.floor(thumbViewport.height));
            var thumbCtx = thumbCanvas.getContext("2d", {alpha: false});
            await page.render({canvasContext: thumbCtx, viewport: thumbViewport}).promise;
            var imageData = thumbCtx.getImageData(0, 0, thumbCanvas.width, thumbCanvas.height).data;
            imageFingerprint = buildImageFingerprint(imageData, thumbCanvas.width, thumbCanvas.height, 16, 16);
        } catch (e) {
            console.warn("thumbnail render failed p" + pageNo, e);
            ldSetLog("⚠ p" + pageNo + " 썸네일 렌더 실패: " + e.message);
        }

        try {
            page.cleanup();
        } catch (e) {
        }
        return {pageNo: pageNo, width: Math.round(viewport.width), height: Math.round(viewport.height), text: normalizedText, textLength: textLength, imageFingerprint: imageFingerprint};
    }

    // Stores [luma, R, G, B] per cell so color-only changes (e.g. red highlight) alter the fingerprint
    function buildImageFingerprint(data, width, height, cols, rows) {
        var cellW = width / cols, cellH = height / rows;
        var values = [];
        for (var gy = 0; gy < rows; gy++) {
            for (var gx = 0; gx < cols; gx++) {
                var startX = Math.floor(gx * cellW), startY = Math.floor(gy * cellH);
                var endX = Math.min(width, Math.floor((gx + 1) * cellW)), endY = Math.min(height, Math.floor((gy + 1) * cellH));
                var sumL = 0, sumR = 0, sumG = 0, sumB = 0, count = 0;
                for (var y = startY; y < endY; y++) {
                    for (var x = startX; x < endX; x++) {
                        var p = (y * width + x) * 4;
                        var r = data[p], g = data[p + 1], b = data[p + 2];
                        sumL += 0.299 * r + 0.587 * g + 0.114 * b;
                        sumR += r;
                        sumG += g;
                        sumB += b;
                        count++;
                    }
                }
                if (count) {
                    values.push(sumL / count, sumR / count, sumG / count, sumB / count);
                } else {
                    values.push(255, 255, 255, 255);
                }
            }
        }
        return values;
    }

    function imageFingerprintSimilarity(a, b) {
        if (!a || !b || !a.length || !b.length || a.length !== b.length) return 0;
        var diffSum = 0;
        for (var i = 0; i < a.length; i++) diffSum += Math.abs(a[i] - b[i]);
        return Math.max(0, 1 - (diffSum / a.length) / 255);
    }

    function pageSimilarity(sigA, sigB) {
        if (!sigA || !sigB) return 0;
        var textSim = textSimilarity(sigA.text, sigB.text);
        var imgSim = imageFingerprintSimilarity(sigA.imageFingerprint, sigB.imageFingerprint);
        var hasTextA = sigA.textLength > 20, hasTextB = sigB.textLength > 20;
        // Use more balanced weights — pure text similarity is unreliable when PDFs share boilerplate text
        var score = (hasTextA && hasTextB) ? textSim * 0.55 + imgSim * 0.45 : textSim * 0.20 + imgSim * 0.80;
        var sizePenalty = 0;
        if (Math.abs(sigA.width - sigB.width) > 10 || Math.abs(sigA.height - sigB.height) > 10) sizePenalty += 0.08;
        sizePenalty += Math.abs(sigA.textLength - sigB.textLength) / Math.max(1, Math.max(sigA.textLength, sigB.textLength)) * 0.12;
        var pageDistancePenalty = Math.abs(sigA.pageNo - sigB.pageNo) * 0.008;
        return Math.max(0, score - sizePenalty - pageDistancePenalty);
    }

    function alignPageSequences(leftSigs, rightSigs) {
        var n = leftSigs.length, m = rightSigs.length;
        var gapPenalty = 0.43;
        var dp = Array.from({length: n + 1}, function () {
            return Array(m + 1).fill(0);
        });
        var path = Array.from({length: n + 1}, function () {
            return Array(m + 1).fill(null);
        });
        for (var i = 1; i <= n; i++) {
            dp[i][0] = dp[i - 1][0] - gapPenalty;
            path[i][0] = "up";
        }
        for (var j = 1; j <= m; j++) {
            dp[0][j] = dp[0][j - 1] - gapPenalty;
            path[0][j] = "left";
        }
        for (var y = 1; y <= n; y++) {
            for (var x = 1; x <= m; x++) {
                var sim = pageSimilarity(leftSigs[y - 1], rightSigs[x - 1]);
                var diag = dp[y - 1][x - 1] + sim, up = dp[y - 1][x] - gapPenalty, left = dp[y][x - 1] - gapPenalty;
                var best = diag, dir = "diag";
                if (up > best) {
                    best = up;
                    dir = "up";
                }
                if (left > best) {
                    best = left;
                    dir = "left";
                }
                dp[y][x] = best;
                path[y][x] = dir;
            }
        }
        var result = [], i2 = n, j2 = m, matchThreshold = 0.70;
        while (i2 > 0 || j2 > 0) {
            var dir2 = path[i2][j2];
            if (i2 > 0 && j2 > 0 && dir2 === "diag") {
                var ls = leftSigs[i2 - 1], rs = rightSigs[j2 - 1];
                var s2 = pageSimilarity(ls, rs);
                if (s2 >= matchThreshold) {
                    result.push({type: "match", leftPageNo: ls.pageNo, rightPageNo: rs.pageNo, similarity: s2});
                } else {
                    result.push({type: "insert", leftPageNo: null, rightPageNo: rs.pageNo, similarity: 0});
                    result.push({type: "delete", leftPageNo: ls.pageNo, rightPageNo: null, similarity: 0});
                }
                i2--;
                j2--;
            } else if (i2 > 0 && (j2 === 0 || dir2 === "up")) {
                result.push({type: "delete", leftPageNo: leftSigs[i2 - 1].pageNo, rightPageNo: null, similarity: 0});
                i2--;
            } else {
                result.push({type: "insert", leftPageNo: null, rightPageNo: rightSigs[j2 - 1].pageNo, similarity: 0});
                j2--;
            }
        }
        result.reverse();
        return result;
    }

    async function getPageMeta(pdf, pageNo) {
        var page = await pdf.getPage(pageNo);
        var viewport = page.getViewport({scale: renderScale});
        return {width: viewport.width, height: viewport.height};
    }

    function createPageShell(container, pageNo, sideLabel, width, height, rowIndex) {
        var pageWrap = document.createElement("div");
        pageWrap.className = "page-wrap";
        pageWrap.dataset.rowIndex = rowIndex;
        var label = document.createElement("div");
        label.className = "page-label";
        label.textContent = sideLabel + " PDF - 페이지 " + pageNo;
        var pageBody = document.createElement("div");
        pageBody.className = "page-body";
        var stage = document.createElement("div");
        stage.className = "page-stage";
        stage.style.width = width + "px";
        stage.style.height = height + "px";
        var overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.style.width = width + "px";
        overlay.style.height = height + "px";

        status.textContent = "pending";
        stage.appendChild(overlay);
        stage.appendChild(status);
        pageBody.appendChild(stage);
        pageWrap.appendChild(label);
        pageWrap.appendChild(pageBody);
        container.appendChild(pageWrap);
        var view = {
            pageNo: pageNo, rowIndex: rowIndex, width: width, height: height, baseWidth: width, baseHeight: height,
            pageWrap: pageWrap, pageBody: pageBody, stage: stage, overlay: overlay, status: status,

    }

    function createMissingPageShell(container, labelText, width, height, missingType, rowIndex) {
        var pageWrap = document.createElement("div");
        pageWrap.className = "page-wrap";
        pageWrap.dataset.rowIndex = rowIndex;
        var label = document.createElement("div");
        label.className = "page-label";
        label.textContent = labelText;
        var pageBody = document.createElement("div");
        pageBody.className = "page-body";
        var stage = document.createElement("div");
        stage.className = "page-stage missing-stage";
        stage.style.width = width + "px";
        stage.style.height = height + "px";
        var inner = document.createElement("div");
        inner.className = "missing-content";
        inner.innerHTML = '<div class="missing-title">' + (missingType === "insert" ? "이 위치에는 기존 페이지가 없습니다" : "이 위치에는 새 버전 페이지가 없습니다") + '</div><div>' + (missingType === "insert" ? "우측 PDF에 새 페이지가 삽입되었습니다." : "좌측 PDF의 페이지가 삭제되었습니다.") + '</div>';
        var overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.style.width = width + "px";
        overlay.style.height = height + "px";
        var status = document.createElement("div");
        status.className = "page-status";
        status.textContent = missingType;
        stage.appendChild(inner);
        stage.appendChild(overlay);
        stage.appendChild(status);
        pageBody.appendChild(stage);
        pageWrap.appendChild(label);
        pageWrap.appendChild(pageBody);
        container.appendChild(pageWrap);
        var view = {
            pageNo: null, rowIndex: rowIndex, width: width, height: height, baseWidth: width, baseHeight: height,
            pageWrap: pageWrap, pageBody: pageBody, stage: stage, overlay: overlay, status: status,
            canvas: null, viewport: null, textLines: [], contentBounds: null,
            isRendered: true, isCompared: true, renderToken: 0, meta: {}, isMissing: true, missingType: missingType
        };
        applyScaleToPageView(view);
        return view;
    }

    async function ensureRendered(pdfDoc, pageView, generation) {
        if (generation !== renderGeneration) return;
        if (!pageView || pageView.isMissing || pageView.isRendered) return;
        pageView.renderToken++;
        var token = pageView.renderToken;
        pageView.status.textContent = "rendering";
        var page = await pdfDoc.getPage(pageView.pageNo);
        var viewport = page.getViewport({scale: renderScale});
        if (generation !== renderGeneration || token !== pageView.renderToken) return;
        var canvas = document.createElement("canvas");
        canvas.style.width = viewport.width + "px";
        canvas.style.height = viewport.height + "px";
        canvas.width = Math.floor(viewport.width * dpr);
        canvas.height = Math.floor(viewport.height * dpr);
        var ctx = canvas.getContext("2d", {alpha: false});
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        await page.render({canvasContext: ctx, viewport: viewport}).promise;
        var textContent = await page.getTextContent();
        var textLines = extractTextLines(textContent, viewport);
        var contentBounds = detectCanvasContentBounds(canvas, textLines);
        if (generation !== renderGeneration || token !== pageView.renderToken) return;
        if (!pageView.canvas) pageView.stage.insertBefore(canvas, pageView.overlay);
        else pageView.canvas.replaceWith(canvas);
        pageView.canvas = canvas;
        pageView.viewport = viewport;
        pageView.textLines = textLines;
        pageView.contentBounds = contentBounds;
        pageView.isRendered = true;
        pageView.status.textContent = "ready";
    }

    async function maybeCompareAlignedRow(rowIndex, generation) {
        if (generation !== renderGeneration) return;
        var left = pageViews1[rowIndex], right = pageViews2[rowIndex], row = alignmentRows[rowIndex];
        if (!left || !right || !row) return;
        if (row.type !== "match") return;
        if (!left.isRendered || !right.isRendered) return;
        if (left.isCompared && right.isCompared) return;

        clearPageDiffBoxes(left.overlay);
        clearPageDiffBoxes(right.overlay);
        removeDiffEntriesForRow(rowIndex);

        var result = await detectDiffRects(left, right, generation);
        if (generation !== renderGeneration) return;

        result.rects.forEach(function (rect, idx) {
            var diffId = "r" + rowIndex + "-d" + (idx + 1);
            drawDiffBox(left.overlay, rect.left, diffId, "change");
            drawDiffBox(right.overlay, rect.right, diffId, "change");
            diffEntries.push({
                id: diffId, kind: "change", rowIndex: rowIndex,
                pageNo: left.pageNo, leftPageNo: left.pageNo, rightPageNo: right.pageNo,
                leftRect: rect.left, rightRect: rect.right,
                label: "좌 " + left.pageNo + " ↔ 우 " + right.pageNo
            });
        });

        left.isCompared = true;
        right.isCompared = true;
        left.meta = result.meta;
        right.meta = result.meta;
        updatePageStatusBadge(left, result.rects.length, "change");
        updatePageStatusBadge(right, result.rects.length, "change");
        sortDiffEntries();
    }

    function markInsertedRow(rowIndex) {
        var right = pageViews2[rowIndex], left = pageViews1[rowIndex], row = alignmentRows[rowIndex];
        if (!right || !row) return;
        clearPageDiffBoxes(right.overlay);
        clearPageDiffBoxes(left.overlay);
        removeDiffEntriesForRow(rowIndex);
        var diffId = "ins-r" + rowIndex;
        var rect = {x: 0, y: 0, w: right.width, h: right.height};
        drawDiffBox(right.overlay, rect, diffId, "insert");

            var a = leftLines[i], bestIdx = -1, bestScore = Infinity;
            for (var j = 0; j < rightLines.length; j++) {
                if (usedRight.has(j)) continue;
                var b = rightLines[j];
                var sim = textSimilarity(a.text, b.text);
                var yGap = Math.abs((a.y + a.h / 2) - (b.y + b.h / 2));
                var xGap = Math.abs(a.x - b.x);

                // Must be similar text OR same-ish position with decent similarity
                if (sim < 0.96 && !(sim >= 0.85 && yGap <= yTol * 2)) continue;
                if (xGap > xTol) continue;

                var score = (1 - sim) * 100 + (yGap / pageH) * 80 + (xGap / xTol) * 4;
                if (score < bestScore) {
                    bestScore = score;
                    bestIdx = j;
                }
            }
            if (bestIdx >= 0) {
                usedRight.add(bestIdx);
                matched.push({
                    left: leftLines[i], right: rightLines[bestIdx],
                    similarity: textSimilarity(leftLines[i].text, rightLines[bestIdx].text)
                });
            } else {
                unmatchedLeft.push(leftLines[i]);
            }
        }
        for (var k = 0; k < rightLines.length; k++) {
            if (!usedRight.has(k)) unmatchedRight.push(rightLines[k]);
        }
        return {matched: matched, unmatchedLeft: unmatchedLeft, unmatchedRight: unmatchedRight};
    }


    function expandRect(rect, padding, maxW, maxH) {
        var x = Math.max(0, rect.x - padding), y = Math.max(0, rect.y - padding);
        return {x: x, y: y, w: Math.min(maxW, rect.x + rect.w + padding) - x, h: Math.min(maxH, rect.y + rect.h + padding) - y};
    }

    function clearPageDiffBoxes(overlay) {
        overlay.querySelectorAll(".diff-box").forEach(function (el) {
            el.remove();
        });
    }

    function removeDiffEntriesForRow(rowIndex) {
        diffEntries = diffEntries.filter(function (d) {
            return d.rowIndex !== rowIndex;
        });
    }

    function sortDiffEntries() {
        diffEntries.sort(function (a, b) {
            if (a.rowIndex !== b.rowIndex) return a.rowIndex - b.rowIndex;
            var ay = a.leftRect ? a.leftRect.y : (a.rightRect ? a.rightRect.y : 0);
            var by = b.leftRect ? b.leftRect.y : (b.rightRect ? b.rightRect.y : 0);
            if (ay !== by) return ay - by;
            var ax = a.leftRect ? a.leftRect.x : (a.rightRect ? a.rightRect.x : 0);
            var bx = b.leftRect ? b.leftRect.x : (b.rightRect ? b.rightRect.x : 0);
            return ax - bx;
        });
    }

    function drawDiffBox(overlay, rect, diffId, kind) {
        var box = document.createElement("div");
        box.className = "diff-box";
        if (kind === "insert") box.classList.add("insert-box");
        if (kind === "delete") box.classList.add("delete-box");
        box.dataset.diffId = diffId;
        box.style.left = rect.x + "px";
        box.style.top = rect.y + "px";
        box.style.width = rect.w + "px";
        box.style.height = rect.h + "px";
        overlay.appendChild(box);
    }

    function buildChangedThumbList() {
        thumbListEl.innerHTML = "";
        var uniqueRows = Array.from(new Set(diffEntries.map(function (d) {
            return d.rowIndex;
        }))).sort(function (a, b) {
            return a - b;
        });
        if (!uniqueRows.length) {
            thumbListEl.innerHTML = '<div class="empty">변경된 페이지가 없습니다.</div>';
            return;
        }

        for (var i = 0; i < uniqueRows.length; i++) {
            (function (rowIndex) {
                var row = alignmentRows[rowIndex];
                var rowDiffs = diffEntries.filter(function (d) {
                    return d.rowIndex === rowIndex;
                });
                var primary = rowDiffs[0];
                var leftMeta = pageViews1[rowIndex] ? pageViews1[rowIndex].meta : {};
                var kind = primary ? primary.kind : "change";

                var item = document.createElement("div");
                item.className = "thumb-item";
                item.dataset.rowIndex = rowIndex;
                var titleDiv = document.createElement("div");
                titleDiv.className = "thumb-title";
                if (kind === "insert") titleDiv.textContent = "삽입 - 우측 페이지 " + row.rightPageNo;
                else if (kind === "delete") titleDiv.textContent = "삭제 - 좌측 페이지 " + row.leftPageNo;
                else titleDiv.textContent = "비교 - 좌 " + row.leftPageNo + " ↔ 우 " + row.rightPageNo + (leftMeta.isImageHeavy ? " 🖼" : "");

                var metaDiv = document.createElement("div");
                metaDiv.className = "thumb-meta";
                if (kind === "insert") metaDiv.textContent = "새 버전에만 존재하는 페이지입니다.\n우측 페이지 번호: " + row.rightPageNo;
                else if (kind === "delete") metaDiv.textContent = "구 버전에만 존재하는 페이지입니다.\n좌측 페이지 번호: " + row.leftPageNo;
                else metaDiv.textContent = "변경 " + rowDiffs.length + "건\n동일 텍스트 무시 " + (leftMeta.ignoredTextBlocks || 0) + "줄 / 텍스트 변경 " + (leftMeta.textDiffBlocks || 0) + "건 / 텍스트 배경색 변경 " + (leftMeta.textBgDiffBlocks || 0) + "건";

                var badge = document.createElement("span");
                badge.className = "badge " + (kind === "change" ? "changed" : (kind === "insert" ? "inserted" : "deleted"));
                badge.textContent = kind === "change" ? "changed" : (kind === "insert" ? "inserted" : "deleted");

                item.appendChild(titleDiv);
                item.appendChild(metaDiv);
                item.appendChild(badge);
                item.addEventListener("click", function () {
                    var firstIndex = diffEntries.findIndex(function (d) {
                        return d.rowIndex === rowIndex;
                    });
                    if (firstIndex >= 0) goToDiff(firstIndex);
                    else {
                        scrollToRow(rowIndex);
                        highlightThumbOnly(rowIndex);
                    }
                });
                thumbListEl.appendChild(item);
            })(uniqueRows[i]);
        }
    }

    function updatePageStatusBadge(pageView, diffCount, kind) {
        if (!pageView || !pageView.status) return;
        if (kind === "insert") {
            pageView.status.textContent = pageView.isMissing ? "insert gap" : "inserted";
            return;
        }
        if (kind === "delete") {
            pageView.status.textContent = pageView.isMissing ? "delete gap" : "deleted";
            return;
        }
        pageView.status.textContent = diffCount > 0 ? ("changed " + diffCount) : "same";
    }

    function scrollToRow(rowIndex, smooth) {
        smooth = smooth !== false;
        var left = pageViews1[rowIndex], right = pageViews2[rowIndex];
        if (!left || !right) return;
        navLockUntil = performance.now() + 500;
        pdf1El.scrollTo({top: Math.max(0, left.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto"});
        pdf2El.scrollTo({top: Math.max(0, right.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto"});
    }

    function getScrollTopForRect(pageWrap, rect, container) {
        var rectTop = rect ? (rect.y * viewScale) : 0;
        var targetTop = pageWrap.offsetTop + rectTop - container.clientHeight * 0.35;
        return Math.max(0, Math.min(targetTop, Math.max(0, container.scrollHeight - container.clientHeight)));
    }

    async function goToDiff(index, smooth) {
        smooth = smooth !== false;
        if (!diffEntries.length) return;
        if (index < 0) index = diffEntries.length - 1;
        if (index >= diffEntries.length) index = 0;
        currentDiffIndex = index;
        var entry = diffEntries[index];
        highlightCurrent();
        var leftView = pageViews1[entry.rowIndex], rightView = pageViews2[entry.rowIndex];
        if (!leftView || !rightView) return;
        navLockUntil = performance.now() + 500;
        pdf1El.scrollTo({top: getScrollTopForRect(leftView.pageWrap, entry.leftRect, pdf1El), behavior: smooth ? "smooth" : "auto"});
        pdf2El.scrollTo({top: getScrollTopForRect(rightView.pageWrap, entry.rightRect, pdf2El), behavior: smooth ? "smooth" : "auto"});
        flashCurrent(entry.id);
    }

    function goToNextDiff() {
        if (diffEntries.length) goToDiff(currentDiffIndex + 1);
    }

    function goToPrevDiff() {
        if (diffEntries.length) goToDiff(currentDiffIndex - 1);
    }

    function flashCurrent(diffId) {
        document.querySelectorAll('.diff-box[data-diff-id="' + diffId + '"]').forEach(function (el) {
            el.classList.remove("flash");
            void el.offsetWidth;
            el.classList.add("flash");
            setTimeout(function () {
                el.classList.remove("flash");
            }, 1000);
        });
    }

    function highlightThumbOnly(rowIndex) {
        document.querySelectorAll(".thumb-item.active").forEach(function (el) {
            el.classList.remove("active");
        });
        var item = thumbListEl.querySelector('.thumb-item[data-row-index="' + rowIndex + '"]');
        if (item) {
            item.classList.add("active");
            item.scrollIntoView({block: "nearest", behavior: "smooth"});
        }
    }

    function highlightCurrent() {
        document.querySelectorAll(".diff-box.current").forEach(function (el) {
            el.classList.remove("current");
        });
        document.querySelectorAll(".thumb-item.active").forEach(function (el) {
            el.classList.remove("active");
        });
        if (currentDiffIndex < 0 || currentDiffIndex >= diffEntries.length) return;
        var current = diffEntries[currentDiffIndex];
        document.querySelectorAll('.diff-box[data-diff-id="' + current.id + '"]').forEach(function (el) {
            el.classList.add("current");
        });
        var item = thumbListEl.querySelector('.thumb-item[data-row-index="' + current.rowIndex + '"]');
        if (item) {
            item.classList.add("active");
            item.scrollIntoView({block: "nearest", behavior: "smooth"});
        }
    }

    pdf1El.addEventListener("scroll", function () {
        syncScroll(pdf1El, pdf2El);
    });
    pdf2El.addEventListener("scroll", function () {
        syncScroll(pdf2El, pdf1El);
    });

    function syncScroll(source, target) {
        if (syncLock || performance.now() < navLockUntil) return;
        syncLock = true;
        var srcMaxY = Math.max(1, source.scrollHeight - source.clientHeight);
        var tgtMaxY = Math.max(1, target.scrollHeight - target.clientHeight);
        target.scrollTop = (source.scrollTop / srcMaxY) * tgtMaxY;
        var srcMaxX = Math.max(1, source.scrollWidth - source.clientWidth);
        var tgtMaxX = Math.max(1, target.scrollWidth - target.clientWidth);
        target.scrollLeft = (source.scrollLeft / srcMaxX) * tgtMaxX;
        requestAnimationFrame(function () {
            syncLock = false;
        });
    }
</script>
</body>
</html>
