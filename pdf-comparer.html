    async function ensureRendered(pdfDoc, pageView, generation, skipText) {
      if (generation !== renderGeneration) {
        return;
      }
      if (!pageView || pageView.isMissing || pageView.isRendered) {
        return;
      }
      pageView.renderToken++;
      var token = pageView.renderToken;
      pageView.status.textContent = "rendering";
      var page = await pdfDoc.getPage(pageView.pageNo);
      var effectiveScale  = pageView.renderScaleOverride || renderScale;
      var displayViewport = page.getViewport({ scale: effectiveScale });
      var renderViewport  = page.getViewport({ scale: effectiveScale * renderOversample });
      if (generation !== renderGeneration || token !== pageView.renderToken) {
        return;
      }
      var canvas = document.createElement("canvas");
      canvas.style.width  = displayViewport.width  + "px";
      canvas.style.height = displayViewport.height + "px";
      canvas.width  = Math.floor(renderViewport.width  * dpr);
      canvas.height = Math.floor(renderViewport.height * dpr);
      var ctx = canvas.getContext("2d", { alpha: false });
      ctx.imageSmoothingEnabled = false;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      await acquireRenderSlot();
      try {
        await page.render({ canvasContext: ctx, viewport: renderViewport }).promise;
      } finally {
        releaseRenderSlot();
      }
      var textLines = [];
      if (!skipText) {
        var tc = await page.getTextContent();
        textLines = extractTextLines(tc, displayViewport);
      }
      var contentBounds = detectCanvasContentBounds(canvas, textLines);
      if (generation !== renderGeneration || token !== pageView.renderToken) {
        return;
      }
      var existing = pageView.stage.querySelector('canvas, .canvas-placeholder');
      if (existing) {
        existing.replaceWith(canvas);
      } else {
        pageView.stage.insertBefore(canvas, pageView.overlay);
      }
      pageView.canvas = canvas;
      pageView.viewport = displayViewport;
      pageView.renderViewport = renderViewport;
      pageView.textLines = textLines;
      pageView.contentBounds = contentBounds;
      pageView.isRendered = true;
      pageView.status.textContent = "ready";
    }

    function markInsertedRow(rowIndex) {
      var right = pageViews2[rowIndex],
        left = pageViews1[rowIndex],
        row = alignmentRows[rowIndex];
      if (!right || !row) {
        return;
      }
      clearPageDiffBoxes(right.overlay);
      clearPageDiffBoxes(left.overlay);
      removeDiffEntriesForRow(rowIndex);
      var diffId = "ins-r" + rowIndex;
      var rect = { x: 0, y: 0, w: right.width, h: right.height };
      drawDiffBox(right.overlay, rect, diffId, "insert");
      drawDiffBox(left.overlay, { x: 0, y: 0, w: left.width, h: left.height }, diffId, "insert");
      diffEntries.push({
        id: diffId,
        kind: "insert",
        rowIndex: rowIndex,
        pageNo: row.rightPageNo,
        leftPageNo: null,
        rightPageNo: row.rightPageNo,
        leftRect: { x: 0, y: 0, w: left.width, h: left.height },
        rightRect: rect,
        label: "우측 페이지 " + row.rightPageNo + " 삽입"
      });
      updatePageStatusBadge(left, 1, "insert");
      updatePageStatusBadge(right, 1, "insert");
      sortDiffEntries();
    }

    function markDeletedRow(rowIndex) {
      var left = pageViews1[rowIndex],
        right = pageViews2[rowIndex],
        row = alignmentRows[rowIndex];
      if (!left || !row) {
        return;
      }
      clearPageDiffBoxes(left.overlay);
      clearPageDiffBoxes(right.overlay);
      removeDiffEntriesForRow(rowIndex);
      var diffId = "del-r" + rowIndex;
      var rect = { x: 0, y: 0, w: left.width, h: left.height };
      drawDiffBox(left.overlay, rect, diffId, "delete");
      drawDiffBox(right.overlay, { x: 0, y: 0, w: right.width, h: right.height }, diffId, "delete");
      diffEntries.push({
        id: diffId,
        kind: "delete",
        rowIndex: rowIndex,
        pageNo: row.leftPageNo,
        leftPageNo: row.leftPageNo,
        rightPageNo: null,
        leftRect: rect,
        rightRect: { x: 0, y: 0, w: right.width, h: right.height },
        label: "좌측 페이지 " + row.leftPageNo + " 삭제"
      });
      updatePageStatusBadge(left, 1, "delete");
      updatePageStatusBadge(right, 1, "delete");
      sortDiffEntries();
    }

    function acquireRenderSlot() {
      return new Promise(function (resolve) {
        if (activeRenders < MAX_CONCURRENT_RENDERS) {
          activeRenders++;
          resolve();
        } else {
          renderQueue.push(resolve);
        }
      });
    }

    function releaseRenderSlot() {
      activeRenders = Math.max(0, activeRenders - 1);
      if (renderQueue.length > 0) {
        activeRenders++;
        var next = renderQueue.shift();
        next();
      }
    }

    function setupCanvasVirtualization() {
      if (!('IntersectionObserver' in window)) return;
      if (_virtualizationObserver) _virtualizationObserver.disconnect();

      _virtualizationObserver = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          var wrap = entry.target;
          var rowIndex = parseInt(wrap.dataset.rowIndex);
          if (isNaN(rowIndex)) return;

          if (!entry.isIntersecting) {
            if (!_releaseTimers[rowIndex]) {
              _releaseTimers[rowIndex] = setTimeout(function () {
                releaseCanvasForRow(rowIndex);
                delete _releaseTimers[rowIndex];
              }, 10000);
            }
          } else {
            if (_releaseTimers[rowIndex]) {
              clearTimeout(_releaseTimers[rowIndex]);
              delete _releaseTimers[rowIndex];
            }

            var lv = pageViews1[rowIndex];
            var rv = pageViews2[rowIndex];
            if (lv && !lv.isRendered && !lv.isMissing && pdfDoc1) {
              ensureRendered(pdfDoc1, lv, renderGeneration).then(function() {
                if (lv.status) lv.status.textContent = lv.isCompared ? 'ready' : 'ready';
              });
            }
            if (rv && !rv.isRendered && !rv.isMissing && pdfDoc2) {
              ensureRendered(pdfDoc2, rv, renderGeneration).then(function() {
                if (rv.status) rv.status.textContent = rv.isCompared ? 'ready' : 'ready';
              });
            }
          }
        });
      }, {
        rootMargin: '2500px 0px 2500px 0px',
        threshold: 0
      });

      document.querySelectorAll('.page-wrap').forEach(function (wrap) {
        _virtualizationObserver.observe(wrap);
      });
    }

    function releaseCanvasForRow(rowIndex) {
      if (currentDiffIndex >= 0 && currentDiffIndex < diffEntries.length) {
        var cur = diffEntries[currentDiffIndex];
        if (Math.abs(cur.rowIndex - rowIndex) <= 2) return;
      }
      [pageViews1[rowIndex], pageViews2[rowIndex]].forEach(function (pv) {
        if (!pv || pv.isMissing || !pv.canvas) return;
        var placeholder = document.createElement('div');
        placeholder.className = 'canvas-placeholder';
        if (compareMode === "text") placeholder.classList.add("text-placeholder");
        placeholder.style.width  = pv.canvas.style.width;
        placeholder.style.height = pv.canvas.style.height;
        if (compareMode === "text") placeholder.textContent = "p" + (pv.pageNo || "");
        pv.canvas.replaceWith(placeholder);
        pv.canvas = null;
        pv.isRendered = false;
        if (pv.status) pv.status.textContent = 'unloaded';
      });
    }

    function downscaleCanvasToDisplay(pv) {
      if (!pv || !pv.canvas || !pv.viewport) return;
      var targetW = Math.floor(pv.viewport.width  * dpr);
      var targetH = Math.floor(pv.viewport.height * dpr);
      if (pv.canvas.width <= targetW && pv.canvas.height <= targetH) return;
      var small = document.createElement("canvas");
      small.width  = targetW;
      small.height = targetH;
      small.style.width  = pv.viewport.width  + "px";
      small.style.height = pv.viewport.height + "px";
      small.getContext("2d", { alpha: false }).drawImage(pv.canvas, 0, 0, targetW, targetH);
      pv.canvas.replaceWith(small);
      pv.canvas = small;
    }

    function yieldToBrowser() {
      return new Promise(function (res) {
        setTimeout(res, 0);
      });
    }

    function expandRectCss(rect, pad, maxW, maxH) {
      var x = Math.max(0, rect.x - pad), y = Math.max(0, rect.y - pad);
      return {
        x: x,
        y: y,
        w: Math.min(maxW, rect.x + rect.w + pad) - x,
        h: Math.min(maxH, rect.y + rect.h + pad) - y
      };
    }

    function normalizeTextForCompare(str) {
      return (str || "")
        .replace(/\s+/g, " ")
        .replace(/[\u2010\-\u2012\u2013\u2014\u2015]/g, "-")
        .replace(/[""]/g, '"')
        .replace(/['']/g, "'")
        .trim()
        .toLowerCase();
    }

    function detectCanvasContentBounds(canvas, textLines) {
      textLines = textLines || [];
      var ctx = canvas.getContext("2d"),
        w = canvas.width,
        h = canvas.height;
      var img = ctx.getImageData(0, 0, w, h).data;
      var step = Math.max(2, Math.round(Math.min(w, h) / 700));
      var minX = w, minY = h, maxX = -1, maxY = -1;
      for (var y = 0; y < h; y += step) {
        for (var x = 0; x < w; x += step) {
          var p = (y * w + x) * 4,
            lum = 0.299 * img[p] + 0.587 * img[p + 1] + 0.114 * img[p + 2];
          if (img[p + 3] < 250 || lum < 246) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }
      for (var i = 0; i < textLines.length; i++) {
        var ln = textLines[i];
        minX = Math.min(minX, ln.x);
        minY = Math.min(minY, ln.y);
        maxX = Math.max(maxX, ln.x + ln.w);
        maxY = Math.max(maxY, ln.y + ln.h);
      }
      if (maxX < minX || maxY < minY) {
        return { x: 0, y: 0, w: w, h: h };
      }
      var pad = Math.max(8, Math.round(Math.min(w, h) * 0.01));
      var rx = Math.max(0, Math.floor(minX - pad)), ry = Math.max(0, Math.floor(minY - pad));
      return {
        x: rx,
        y: ry,
        w: Math.max(1, Math.min(w, Math.ceil(maxX + pad)) - rx),
        h: Math.max(1, Math.min(h, Math.ceil(maxY + pad)) - ry)
      };
    }

    function unionRect(a, b) {
      var x = Math.min(a.x, b.x), y = Math.min(a.y, b.y);
      return {
        x: x,
        y: y,
        w: Math.max(a.x + a.w, b.x + b.w) - x,
        h: Math.max(a.y + a.h, b.y + b.h) - y
      };
    }

    function areRectsNear(a, b, gap) {
      // ── 1. 축별 거리: 어느 한 축이라도 gap 초과면 즉시 탈락 ─────────────────
      var xGap = Math.max(0, Math.max(a.x, b.x) - Math.min(a.x + a.w, b.x + b.w));
      var yGap = Math.max(0, Math.max(a.y, b.y) - Math.min(a.y + a.h, b.y + b.h));
      if (xGap > gap || yGap > gap) return false;

      // ── 2. 분리 방향의 반대축 겹침 비율 ───────────────────────────────────────
      // x 방향으로 떨어진 경우 → y축 겹침이 짧은 쪽 높이의 MERGE_OVERLAP_RATIO 이상이어야 함
      // y 방향으로 떨어진 경우 → x축 겹침이 짧은 쪽 너비의 MERGE_OVERLAP_RATIO 이상이어야 함
      // (두 조건 모두 분리가 있을 때만 적용 → 대각선 배치 박스의 연쇄 병합 차단)
      var minOv = DIFF_POST.MERGE_OVERLAP_RATIO;
      if (xGap > 0) {
        var yOv  = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        var yRef = Math.min(a.h, b.h);
        if (yRef > 0 && yOv / yRef < minOv) return false;
      }
      if (yGap > 0) {
        var xOv  = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        var xRef = Math.min(a.w, b.w);
        if (xRef > 0 && xOv / xRef < minOv) return false;
      }

      // ── 3. union 후 면적 증가율 ──────────────────────────────────────────────
      // .area = mergeNearbyBoxesWithType에서 누적된 실제 픽셀 수
      //         없으면 기하 면적(bounding box)으로 대체
      var aPixels = (a.area != null ? a.area : a.w * a.h);
      var bPixels = (b.area != null ? b.area : b.w * b.h);
      var u = unionRect(a, b);
      if (aPixels + bPixels > 0 &&
          u.w * u.h > DIFF_POST.MERGE_MAX_FILL_INV * (aPixels + bPixels)) return false;

      return true;
    }

    function mergeNearbyRects(rects, gap) {
      gap = typeof gap === "number" ? gap : 20;
      var merged = rects.slice(), changed = true;
      while (changed) {
        changed = false;
        var result = [], used = Array(merged.length).fill(false);
        for (var i = 0; i < merged.length; i++) {
          if (used[i]) {
            continue;
          }
          var base = Object.assign({}, merged[i]);
          for (var j = i + 1; j < merged.length; j++) {
            if (used[j]) {
              continue;
            }
            if (areRectsNear(base, merged[j], gap)) {
              base = unionRect(base, merged[j]);
              used[j] = true;
              changed = true;
            }
          }
          used[i] = true;
          result.push(base);
        }
        merged = result;
      }
      return merged;
    }

    function levenshtein(a, b) {
      var m = a.length, n = b.length;
      var dp = Array.from({ length: m + 1 }, function () {
        return new Array(n + 1).fill(0);
      });
      for (var i = 0; i <= m; i++) {
        dp[i][0] = i;
      }
      for (var j = 0; j <= n; j++) {
        dp[0][j] = j;
      }
      for (var y = 1; y <= m; y++) {
        for (var x = 1; x <= n; x++) {
          var cost = a[y - 1] === b[x - 1] ? 0 : 1;
          dp[y][x] = Math.min(dp[y - 1][x] + 1, dp[y][x - 1] + 1, dp[y - 1][x - 1] + cost);
        }
      }
      return dp[m][n];
    }

    function sampleText(s, n) {
      if (s.length <= n * 3) return s;

      var mid = Math.floor((s.length - n) / 2);
      return s.slice(0, n) + s.slice(mid, mid + n) + s.slice(s.length - n);
    }

    function textSimilarity(a, b) {
      if (a === b) return 1;
      if (!a || !b) return 0;

      var la = a.length, lb = b.length, ml = Math.max(la, lb);
      if (Math.min(la, lb) / ml < 0.5) return Math.min(la, lb) / ml;

      var sa = sampleText(a, 100), sb = sampleText(b, 100);
      if (sa === sb) return 1;

      var sml = Math.max(sa.length, sb.length);
      return sml ? 1 - levenshtein(sa, sb) / sml : 1;
    }

    function extractTextLines(textContent, viewport) {
      var LINE_MERGE_PX = 6;

      var rawItems = (textContent.items || [])
        .map(function (item) {
          var str = (item.str || "").trim();
          if (!str) {
            return null;
          }
          var tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
          var x = tx[4],
            baselineY = tx[5];
          var h = Math.max(1, Math.abs(tx[3]) || Math.abs(item.height * viewport.scale) || 10);
          var y = baselineY - h,
            w = Math.max(1, item.width * viewport.scale);
          return { text: str, x: x, y: y, w: w, h: h, baselineY: baselineY };
        })
        .filter(Boolean)
        .sort(function (a, b) {
          if (Math.abs(a.baselineY - b.baselineY) > LINE_MERGE_PX) {
            return a.baselineY - b.baselineY;
          }
          return a.x - b.x;
        });
      var lines = [];
      for (var i = 0; i < rawItems.length; i++) {
        var item = rawItems[i], tgt = null;
        for (var j = 0; j < lines.length; j++) {
          if (Math.abs(lines[j].baselineY - item.baselineY) <= LINE_MERGE_PX) {
            tgt = lines[j];
            break;
          }
        }
        if (!tgt) {
          tgt = { baselineY: item.baselineY, items: [] };
          lines.push(tgt);
        }
        tgt.items.push(item);
      }
      return lines.map(function (line) {
        line.items.sort(function (a, b) {
          return a.x - b.x;
        });
        var text = "";
        for (var i = 0; i < line.items.length; i++) {
          if (i > 0 && line.items[i].x > line.items[i - 1].x + line.items[i - 1].w + 2) {
            text += " ";
          }
          text += line.items[i].text;
        }
        var xs = line.items.map(function (it) {
          return it.x;
        });
        var x = Math.min.apply(null, xs);
        var rights = line.items.map(function (it) {
          return it.x + it.w;
        });
        var right = Math.max.apply(null, rights);
        var hs = line.items.map(function (it) {
          return it.h;
        });
        var h = Math.max.apply(null, hs);
        return {
          text: text.trim(),
          x: x,
          y: line.baselineY - h,
          w: right - x,
          h: h,
          baselineY: line.baselineY,
          items: line.items
        };
      }).filter(function (l) {
        return l.text.length > 0;
      });
    }

    function expandRect(rect, padding, maxW, maxH) {
      var x = Math.max(0, rect.x - padding), y = Math.max(0, rect.y - padding);
      return {
        x: x,
        y: y,
        w: Math.min(maxW, rect.x + rect.w + padding) - x,
        h: Math.min(maxH, rect.y + rect.h + padding) - y
      };
    }

    function clearPageDiffBoxes(overlay) {
      overlay.querySelectorAll(".diff-box").forEach(function (el) {
        el.remove();
      });
    }

    function removeDiffEntriesForRow(ri) {
      diffEntries = diffEntries.filter(function (d) {
        return d.rowIndex !== ri;
      });
    }

    function sortDiffEntries() {
      diffEntries.sort(function (a, b) {
        if (a.rowIndex !== b.rowIndex) {
          return a.rowIndex - b.rowIndex;
        }
        var ay = a.leftRect ? a.leftRect.y : (a.rightRect ? a.rightRect.y : 0);
        var by = b.leftRect ? b.leftRect.y : (b.rightRect ? b.rightRect.y : 0);
        if (ay !== by) {
          return ay - by;
        }
        var ax = a.leftRect ? a.leftRect.x : (a.rightRect ? a.rightRect.x : 0);
        var bx = b.leftRect ? b.leftRect.x : (b.rightRect ? b.rightRect.x : 0);
        return ax - bx;
      });
    }

    function drawDiffBox(overlay, rect, diffId, kind) {
      var box = document.createElement("div");
      box.className = "diff-box";
      if (kind === "insert") {
        box.classList.add("insert-box");
      }
      if (kind === "delete") {
        box.classList.add("delete-box");
      }
      box.dataset.diffId = diffId;
      box.style.left = rect.x + "px";
      box.style.top = rect.y + "px";
      box.style.width = rect.w + "px";
      box.style.height = rect.h + "px";
      overlay.appendChild(box);
    }

    // ────────────────────────────────────────────────────────────────────────
    // diff 시각화 – type별 draw 함수
    // ────────────────────────────────────────────────────────────────────────

    function drawBox(overlay, rect, diffId, kind) {
      var box = document.createElement("div");
      box.className = "diff-box";
      if (kind === "insert") box.classList.add("insert-box");
      if (kind === "delete") box.classList.add("delete-box");
      box.dataset.diffId = diffId;
      box.style.left   = rect.x + "px";
      box.style.top    = rect.y + "px";
      box.style.width  = rect.w + "px";
      box.style.height = rect.h + "px";
      overlay.appendChild(box);
    }

    /** thin line용: 반투명 채운 바 (border 없음) */
    function drawLine(overlay, rect, diffId) {
      var box = document.createElement("div");
      box.className = "diff-box diff-line";
      box.dataset.diffId = diffId;
      box.style.left   = rect.x + "px";
      box.style.top    = rect.y + "px";
      box.style.width  = rect.w + "px";
      box.style.height = rect.h + "px";
      overlay.appendChild(box);
    }

    /** sparse 영역용: 점선 영역 */
    function drawOverlayMask(overlay, rect, diffId) {
      var box = document.createElement("div");
      box.className = "diff-box diff-overlay-mask";
      box.dataset.diffId = diffId;
      box.style.left   = rect.x + "px";
      box.style.top    = rect.y + "px";
      box.style.width  = rect.w + "px";
      box.style.height = rect.h + "px";
      overlay.appendChild(box);
    }

    /** type에 따라 적절한 draw 함수 선택 */
    function drawDiffElement(overlay, rect, diffId, kind, type) {
      if (type === "hline" || type === "vline") {
        drawLine(overlay, rect, diffId);
      } else if (type === "sparse") {
        drawOverlayMask(overlay, rect, diffId);
      } else {
        drawBox(overlay, rect, diffId, kind);
      }
    }

    // ────────────────────────────────────────────────────────────────────────
    // diff 후처리 파이프라인
    // ────────────────────────────────────────────────────────────────────────

    /**
     * CCL 컴포넌트 배열을 받아 분류·분할·병합·필터링 후
     * { left, right, type } 배열로 반환.
     */
    function postProcessDiffComponents(components, mask, roiW, roiH, roiX, roiY,
                                        canvasW, canvasH, effectiveScale, cssWidth, cssHeight) {
      var ES = Math.max(1, effectiveScale);

      // ── 1. filterNoiseBoxes (초기): bbox 너무 작거나 밀도 너무 낮은 제거 ──
      var minArea    = Math.round(DIFF_POST.MIN_AREA * ES / 3);
      var minBboxPx  = Math.max(60 * ES, 60);
      var borderX    = Math.round(canvasW * DIFF_POST.BORDER_MARGIN);
      var borderY    = Math.round(canvasH * DIFF_POST.BORDER_MARGIN);

      var items = components.filter(function (c) {
        if (c.area < minArea) return false;
        var bboxArea = c.w * c.h;
        if (bboxArea < minBboxPx) return false;
        var density = c.area / bboxArea;
        // 밀도 낮고 bbox도 작으면 노이즈
        if (density < DIFF_POST.MIN_DENSITY && bboxArea < DIFF_POST.SPARSE_MIN_BBOX * ES) return false;
        // border noise 제거
        var absX = c.x + roiX, absY = c.y + roiY;
        if (absX + c.w <= borderX || absX >= canvasW - borderX) return false;
        if (absY + c.h <= borderY || absY >= canvasH - borderY) return false;
        return true;
      });

      // ── 2. classifyDiffRegion + splitSparseBox ─────────────────────────────
      var expanded = [];
      items.forEach(function (c) {
        var density = c.area / (c.w * c.h);
        var type = classifyDiffRegion(c, density, ES);
        if (type === "sparse") {
          var splits = splitSparseBox(c, mask, roiW, roiH);
          splits.forEach(function (s) { expanded.push(s); });
        } else {
          expanded.push(Object.assign({}, c, { type: type }));
        }
      });

      // ── 3. pad 적용 후 canvas 좌표로 변환 ──────────────────────────────────
      var pad = Math.max(3, Math.round(4 * ES / 3));
      var paddedPx = expanded.map(function (c) {
        var r = expandRect({ x: c.x + roiX, y: c.y + roiY, w: c.w, h: c.h }, pad, canvasW, canvasH);
        r.type = c.type || "compact";
        r.area = c.area;
        return r;
      });

      // ── 4. mergeNearbyBoxesWithType ─────────────────────────────────────────
      var mergeGap = Math.round(DIFF_POST.BOX_MERGE_GAP * ES / 3);
      var merged = mergeNearbyBoxesWithType(paddedPx, mergeGap);
      merged     = mergeNearbyBoxesWithType(merged,   Math.round(mergeGap * 0.5));

      // ── 5. filterNoiseBoxes (최종): 병합 후 최소 면적 필터 ─────────────────
      var minFinalArea = Math.max(500 * ES, 500);
      merged = merged.filter(function (r) { return r.w * r.h >= minFinalArea; });

      // ── 6. CSS 좌표로 변환 후 반환 ─────────────────────────────────────────
      var scaleX = cssWidth / canvasW, scaleY = cssHeight / canvasH;
      return merged.map(function (r) {
        var cr = { x: r.x * scaleX, y: r.y * scaleY, w: r.w * scaleX, h: r.h * scaleY };
        return { left: cr, right: cr, type: r.type || "compact" };
      });
    }

    /**
     * 단일 컴포넌트를 타입으로 분류.
     * @param {object} c      - { w, h, area }
     * @param {number} density - c.area / (c.w * c.h)
     * @param {number} ES     - effectiveScale
     */
    function classifyDiffRegion(c, density, ES) {
      var w = c.w, h = c.h;
      var thinSide = DIFF_POST.LINE_THIN_SIDE * ES;
      var longSide = DIFF_POST.LINE_LONG_SIDE * ES;

      // thin vertical line
      if (w <= thinSide && h > longSide) return "vline";
      // thin horizontal line
      if (h <= thinSide && w > longSide) return "hline";
      // aspect ratio 기반 선 판정 (긴 쪽이 짧은 쪽의 LINE_ASPECT_RATIO 배 이상)
      if (w > 0 && h > 0) {
        var asp = Math.max(w / h, h / w);
        if (asp >= DIFF_POST.LINE_ASPECT_RATIO) {
          return (w > h) ? "hline" : "vline";
        }
      }
      // sparse 분할 대상
      var bboxArea = w * h;
      if (bboxArea >= DIFF_POST.SPARSE_MIN_BBOX * Math.max(1, ES / 2) &&
          density < DIFF_POST.SPARSE_SPLIT_THRESHOLD) {
        return "sparse";
      }
      // 작은 점
      if (bboxArea < 400 * ES) return "point";
      return "compact";
    }

    /**
     * sparse 컴포넌트를 x/y projection 기반으로 분할.
     * mask 좌표는 ROI 기준 (roiW×roiH).
     */
    function splitSparseBox(c, mask, maskW, maskH) {
      var GAP_MIN = Math.max(8, Math.round(Math.max(c.w, c.h) * 0.04));

      // x-projection (각 열의 diff 픽셀 수)
      var xProj = new Int32Array(c.w);
      var yProj = new Int32Array(c.h);
      for (var dy = 0; dy < c.h; dy++) {
        for (var dx = 0; dx < c.w; dx++) {
          var mx = c.x + dx, my = c.y + dy;
          if (mx < 0 || mx >= maskW || my < 0 || my >= maskH) continue;
          if (mask[my * maskW + mx]) { xProj[dx]++; yProj[dy]++; }
        }
      }

      var xSegs = findProjectionSegments(xProj, GAP_MIN);
      var ySegs = findProjectionSegments(yProj, GAP_MIN);

      var results = [];
      for (var yi = 0; yi < ySegs.length; yi++) {
        for (var xi = 0; xi < xSegs.length; xi++) {
          var xs = xSegs[xi], ys = ySegs[yi];
          var segW = xs[1] - xs[0] + 1;
          var segH = ys[1] - ys[0] + 1;
          // 세그먼트 내 실제 diff 픽셀 계산
          var area = 0;
          for (var sy = ys[0]; sy <= ys[1]; sy++) {
            for (var sx = xs[0]; sx <= xs[1]; sx++) {
              var mx2 = c.x + sx, my2 = c.y + sy;
              if (mx2 >= 0 && mx2 < maskW && my2 >= 0 && my2 < maskH && mask[my2 * maskW + mx2]) area++;
            }
          }
          if (area < DIFF_POST.MIN_AREA / 4) continue; // 너무 작은 세그먼트 제거
          var density2 = area / (segW * segH);
          var type2 = classifyDiffRegion({ w: segW, h: segH, area: area }, density2, 1);
          results.push({
            x: c.x + xs[0], y: c.y + ys[0],
            w: segW, h: segH,
            area: area,
            type: type2 === "sparse" ? "compact" : type2 // 재귀 방지
          });
        }
      }

      // 분할 결과가 없으면 원본을 compact로 반환
      if (results.length === 0) {
        return [Object.assign({}, c, { type: "compact" })];
      }
      return results;
    }

    /**
     * 1D projection 배열에서 연속 0 구간(gap)으로 세그먼트 분리.
     * @returns {Array<[start, end]>}
     */
    function findProjectionSegments(proj, minGap) {
      var len = proj.length;
      if (len === 0) return [[0, 0]];

      var segs = [];
      var inSeg = false, segStart = 0, gapCount = 0;

      for (var i = 0; i < len; i++) {
        if (proj[i] > 0) {
          if (!inSeg) { inSeg = true; segStart = i; }
          gapCount = 0;
        } else {
          if (inSeg) {
            gapCount++;
            if (gapCount >= minGap) {
              segs.push([segStart, i - gapCount]);
              inSeg = false;
              gapCount = 0;
            }
          }
        }
      }
      if (inSeg) segs.push([segStart, len - 1 - Math.min(gapCount, minGap - 1)]);

      if (segs.length === 0) segs = [[0, len - 1]];
      return segs;
    }

    /**
     * area 합산 및 type 결정을 포함한 nearbyBoxes 병합.
     */
    function mergeNearbyBoxesWithType(rects, gap) {
      gap = typeof gap === "number" ? gap : 20;
      var merged = rects.slice(), changed = true;
      while (changed) {
        changed = false;
        var result = [], used = new Array(merged.length).fill(false);
        for (var i = 0; i < merged.length; i++) {
          if (used[i]) continue;
          var base = Object.assign({}, merged[i]);
          for (var j = i + 1; j < merged.length; j++) {
            if (used[j]) continue;
            if (areRectsNear(base, merged[j], gap)) {
              var u = unionRect(base, merged[j]);
              u.area = (base.area || 0) + (merged[j].area || 0);
              // 병합 시 타입: compact가 하나라도 있으면 compact,
              // 같은 선 타입끼리는 유지, 그 외 compact
              var bt = base.type, jt = merged[j].type;
              if (bt === "compact" || jt === "compact" ||
                  bt === "point"   || jt === "point") {
                u.type = "compact";
              } else if (bt === jt) {
                u.type = bt;
              } else {
                u.type = "compact";
              }
              base = u;
              used[j] = true;
              changed = true;
            }
          }
          used[i] = true;
          result.push(base);
        }
        merged = result;
      }
      return merged;
    }

    function buildChangedThumbList() {
      thumbListEl.innerHTML = "";
      if (!diffEntries.length) {
        thumbListEl.innerHTML = '<div class="empty">변경된 페이지가 없습니다.</div>';
        return;
      }
      if (compareMode === "text") {
        var noteEl = document.getElementById("thumbListNote");
        if (noteEl) {
          noteEl.textContent = "변경점 목록입니다. 클릭하면 해당 위치로 이동합니다.";
        }
        buildChangedThumbList_TextOnly();
        return;
      }
      var noteEl = document.getElementById("thumbListNote");
      if (noteEl) {
        noteEl.innerHTML = "목록에는 변경이 감지된 페이지만 표시됩니다.<br>항목을 클릭하면 해당 페이지로 이동합니다.";
      }
      var uniqueRows = Array.from(new Set(diffEntries.map(function (d) {
        return d.rowIndex;
      }))).sort(function (a, b) {
        return a - b;
      });
      for (var i = 0; i < uniqueRows.length; i++) {
        (function (rowIndex) {
          var row = alignmentRows[rowIndex];
          var rowDiffs = diffEntries.filter(function (d) {
            return d.rowIndex === rowIndex;
          });
          var primary = rowDiffs[0], leftMeta = pageViews1[rowIndex] ? pageViews1[rowIndex].meta : {};
          var kind = primary ? primary.kind : "change";
          var item = document.createElement("div");
          item.className = "thumb-item";
          item.dataset.rowIndex = rowIndex;
          var titleDiv = document.createElement("div");
          titleDiv.className = "thumb-title";
          if (kind === "insert") {
            titleDiv.textContent = "삽입 - 우측 페이지 " + row.rightPageNo;
          } else if (kind === "delete") {
            titleDiv.textContent = "삭제 - 좌측 페이지 " + row.leftPageNo;
          } else {
            titleDiv.textContent = "비교 - 좌 " + row.leftPageNo + " ↔ 우 " + row.rightPageNo
              + (leftMeta.isImageHeavy ? " 🖼" : "");
          }
          var metaDiv = document.createElement("div");
          metaDiv.className = "thumb-meta";
          if (kind === "insert") {
            metaDiv.textContent = "새 버전에만 존재하는 페이지입니다.\n우측 페이지 번호: "
              + row.rightPageNo;
          } else if (kind === "delete") {
            metaDiv.textContent = "구 버전에만 존재하는 페이지입니다.\n좌측 페이지 번호: "
              + row.leftPageNo;
          } else {
            metaDiv.textContent = "변경 " + rowDiffs.length + "건\n동일 텍스트 무시 "
              + (leftMeta.ignoredTextBlocks || 0) + "줄 / 텍스트 변경 " + (leftMeta.textDiffBlocks || 0)
              + "건 / 배경색 변경 " + (leftMeta.textBgDiffBlocks || 0) + "건";
          }
          var badge = document.createElement("span");
          badge.className = "badge " + (kind === "change" ? "changed"
            : kind === "insert" ? "inserted" : "deleted");
          badge.textContent = kind === "change" ? "changed"
            : kind === "insert" ? "inserted" : "deleted";
          item.appendChild(titleDiv);
          item.appendChild(metaDiv);
          item.appendChild(badge);
          item.addEventListener("click", function () {
            var fi = diffEntries.findIndex(function (d) {
              return d.rowIndex === rowIndex;
            });
            if (fi >= 0) {
              goToDiff(fi);
            } else {
              scrollToRow(rowIndex);
              highlightThumbOnly(rowIndex);
            }
          });
          thumbListEl.appendChild(item);
        })(uniqueRows[i]);
      }
    }

    function buildChangedThumbList_TextOnly() {
      function trunc(str, max) {
        str = (str || "").trim();
        return str.length > max ? str.slice(0, max) + "…" : str;
      }

      diffEntries.forEach(function (entry, idx) {
        var item = document.createElement("div");
        item.className = "thumb-item";
        item.dataset.diffIndex = idx;

        var titleDiv = document.createElement("div");
        titleDiv.className = "thumb-title";
        var pageInfo = "";
        if (entry.leftPageNo && entry.rightPageNo) {
          pageInfo = " — 좌 p" + entry.leftPageNo + " ↔ 우 p" + entry.rightPageNo;
        } else if (entry.leftPageNo) {
          pageInfo = " — 좌 p" + entry.leftPageNo;
        } else if (entry.rightPageNo) {
          pageInfo = " — 우 p" + entry.rightPageNo;
        }
        titleDiv.textContent = "변경 #" + (idx + 1) + pageInfo;

        var snippetDiv = document.createElement("div");
        snippetDiv.className = "diff-snippet";

        if (entry.leftText) {
          var del = document.createElement("span");
          del.className = "diff-snippet-del";
          del.title = entry.leftText;
          del.textContent = "- " + trunc(entry.leftText, 55);
          snippetDiv.appendChild(del);
        }
        if (entry.rightText) {
          var ins = document.createElement("span");
          ins.className = "diff-snippet-ins";
          ins.title = entry.rightText;
          ins.textContent = "+ " + trunc(entry.rightText, 55);
          snippetDiv.appendChild(ins);
        }

        item.appendChild(titleDiv);
        item.appendChild(snippetDiv);
        item.addEventListener("click", function () {
          goToDiff(idx);
        });
        thumbListEl.appendChild(item);
      });
    }

    function updatePageStatusBadge(pv, diffCount, kind) {
      if (!pv || !pv.status) {
        return;
      }
      if (kind === "insert") {
        pv.status.textContent = pv.isMissing ? "insert gap" : "inserted";
        return;
      }
      if (kind === "delete") {
        pv.status.textContent = pv.isMissing ? "delete gap" : "deleted";
        return;
      }
      pv.status.textContent = diffCount > 0 ? ("changed " + diffCount) : "same";
    }

    function scrollToRow(rowIndex, smooth) {
      smooth = smooth !== false;
      var left = pageViews1[rowIndex], right = pageViews2[rowIndex];
      if (!left || !right) {
        return;
      }
      navLockUntil = performance.now() + 500;
      pdf1El.scrollTo(
        { top: Math.max(0, left.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto" });
      pdf2El.scrollTo(
        { top: Math.max(0, right.pageWrap.offsetTop - 20), behavior: smooth ? "smooth" : "auto" });
    }

    function scrollContainerToElement(el, container, smooth) {
      var elBCR  = el.getBoundingClientRect();
      var cntBCR = container.getBoundingClientRect();
      var elTop  = container.scrollTop  + (elBCR.top  - cntBCR.top);
      var elLeft = container.scrollLeft + (elBCR.left - cntBCR.left);
      var targetTop  = elTop  - (container.clientHeight - elBCR.height) * 0.38;
      var targetLeft = elLeft - (container.clientWidth  - elBCR.width)  * 0.5;
      container.scrollTo({
        top:  Math.max(0, Math.min(targetTop,  container.scrollHeight - container.clientHeight)),
        left: Math.max(0, Math.min(targetLeft, container.scrollWidth  - container.clientWidth)),
        behavior: smooth ? "smooth" : "auto"
      });
    }

    function scrollContainerToRect(pageWrap, rect, container, smooth) {
      var wrapBCR = pageWrap.getBoundingClientRect();
      var cntBCR  = container.getBoundingClientRect();
      var wrapTop  = container.scrollTop  + (wrapBCR.top  - cntBCR.top);
      var wrapLeft = container.scrollLeft + (wrapBCR.left - cntBCR.left);
      var labelEl  = pageWrap.querySelector('.page-label');
      var labelH   = labelEl ? labelEl.offsetHeight : 0;
      var ry = rect ? (rect.y * viewScale) : 0;
      var rx = rect ? (rect.x * viewScale) : 0;
      var rh = rect ? (rect.h * viewScale) : 0;
      var rw = rect ? (rect.w * viewScale) : 0;
      var targetTop  = wrapTop  + labelH + ry - (container.clientHeight - rh) * 0.38;
      var targetLeft = wrapLeft +          rx - (container.clientWidth  - rw) * 0.5;
      container.scrollTo({
        top:  Math.max(0, Math.min(targetTop,  container.scrollHeight - container.clientHeight)),
        left: Math.max(0, Math.min(targetLeft, container.scrollWidth  - container.clientWidth)),
        behavior: smooth ? "smooth" : "auto"
      });
    }

    async function goToDiff(index, smooth) {
      smooth = smooth !== false;
      if (!diffEntries.length) {
        return;
      }
      if (index < 0) {
        index = diffEntries.length - 1;
      }
      if (index >= diffEntries.length) {
        index = 0;
      }
      currentDiffIndex = index;
      var entry = diffEntries[index];
      highlightCurrent();
      var lv = pageViews1[entry.rowIndex];
      var rv = pageViews2[entry.rightRowIndex !== undefined ? entry.rightRowIndex : entry.rowIndex];
      if (!lv || !rv) {
        return;
      }
      navLockUntil = performance.now() + 500;
      var leftBox  = pdf1El.querySelector('.diff-box[data-diff-id="' + entry.id + '"]');
      var rightBox = pdf2El.querySelector('.diff-box[data-diff-id="' + entry.id + '"]');
      if (leftBox) {
        scrollContainerToElement(leftBox, pdf1El, smooth);
      } else {
        scrollContainerToRect(lv.pageWrap, entry.leftRect, pdf1El, smooth);
      }
      if (rightBox) {
        scrollContainerToElement(rightBox, pdf2El, smooth);
      } else {
        scrollContainerToRect(rv.pageWrap, entry.rightRect, pdf2El, smooth);
      }
      flashCurrent(entry.id);

      if (compareMode === "text") {
        await renderRowOnDemand(entry.rowIndex, renderGeneration);
        if (entry.rightRowIndex !== undefined && entry.rightRowIndex !== entry.rowIndex)
          await renderRowOnDemand(entry.rightRowIndex, renderGeneration);
      }
    }

    function goToNextDiff() {
      if (diffEntries.length) {
        goToDiff(currentDiffIndex + 1);
      }
    }

    function goToPrevDiff() {
      if (diffEntries.length) {
        goToDiff(currentDiffIndex - 1);
      }
    }

    function flashCurrent(diffId) {
      document.querySelectorAll('.diff-box[data-diff-id="' + diffId + '"]').forEach(function (el) {
        el.classList.remove("flash");
        void el.offsetWidth;
        el.classList.add("flash");
        setTimeout(function () {
          el.classList.remove("flash");
        }, 1000);
      });
    }

    function highlightThumbOnly(rowIndex) {
      document.querySelectorAll(".thumb-item.active").forEach(function (el) {
        el.classList.remove("active");
      });
      var item = thumbListEl.querySelector('.thumb-item[data-row-index="' + rowIndex + '"]');
      if (item) {
        item.classList.add("active");
        item.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    function highlightCurrent() {
      document.querySelectorAll(".diff-box.current").forEach(function (el) {
        el.classList.remove("current");
      });
      document.querySelectorAll(".thumb-item.active").forEach(function (el) {
        el.classList.remove("active");
      });
      if (currentDiffIndex < 0 || currentDiffIndex >= diffEntries.length) {
        return;
      }
      var cur = diffEntries[currentDiffIndex];
      document.querySelectorAll('.diff-box[data-diff-id="' + cur.id + '"]').forEach(function (el) {
        el.classList.add("current");
      });
      var item = compareMode === "text"
        ? thumbListEl.querySelector('.thumb-item[data-diff-index="' + currentDiffIndex + '"]')
        : thumbListEl.querySelector('.thumb-item[data-row-index="' + cur.rowIndex + '"]');
      if (item) {
        item.classList.add("active");
        item.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }

    // ── Overlay 모드 ─────────────────────────────────────────────────────────

    function enterOverlayMode() {
      overlayMode = true;
      overlayBtnEl.textContent = "Split View";
      overlayBtnEl.style.background = "var(--blue-600)";
      overlayBtnEl.style.borderColor = "var(--blue-700)";
      overlayBtnEl.style.color = "var(--white)";
      pdf1El.style.display = "none";
      pdf2El.style.display = "none";
      overlayPaneEl.style.display = "";
      var targetRow = currentViewingRowIndex >= 0 ? currentViewingRowIndex : findVisibleRowIndex();
      buildOverlayView(targetRow);
    }

    function exitOverlayMode() {
      overlayMode = false;
      overlayBtnEl.textContent = "Overlay";
      overlayBtnEl.style.background = "";
      overlayBtnEl.style.borderColor = "";
      overlayBtnEl.style.color = "";
      pdf1El.style.display = "";
      pdf2El.style.display = "";
      overlayPaneEl.style.display = "none";
      overlayPaneEl.innerHTML = "";
      overlayPageViews = [];
    }

    function buildOverlayView(rowIndex) {
      overlayPaneEl.innerHTML = "";
      overlayPageViews = [];

      var i = (typeof rowIndex === "number" && rowIndex >= 0 && rowIndex < alignmentRows.length)
        ? rowIndex : 0;

      var row = alignmentRows[i];
      var lv  = pageViews1[i];
      var rv  = pageViews2[i];
      var refView = (row.type === "delete") ? lv : rv;
      var baseW = refView.baseWidth, baseH = refView.baseHeight;

      var wrap = document.createElement("div");
      wrap.className = "page-wrap";
      wrap.dataset.rowIndex = i;

      var lbl = document.createElement("div");
      lbl.className = "page-label";
      if (row.type === "match") {
        lbl.textContent = "좌 p" + row.leftPageNo + " ↔ 우 p" + row.rightPageNo
          + "  —  Overlay  (빨강=좌, 초록=우, 검정=공통)";
      } else if (row.type === "insert") {
        lbl.textContent = "우측 p" + row.rightPageNo + " 삽입";
      } else {
        lbl.textContent = "좌측 p" + row.leftPageNo + " 삭제";
      }

      var body = document.createElement("div");
      body.className = "page-body";
      body.style.width  = Math.max(1, Math.round(baseW * viewScale)) + "px";
      body.style.height = Math.max(1, Math.round(baseH * viewScale)) + "px";

      var stage = document.createElement("div");
      stage.className = "page-stage";
      stage.style.width  = baseW + "px";
      stage.style.height = baseH + "px";
      stage.style.transformOrigin = "top left";
      stage.style.transform = "scale(" + viewScale + ")";

      var overlayCanvas = null;
      if (row.type === "match" && lv && rv && lv.canvas && rv.canvas) {
        overlayCanvas = buildOverlayCanvas(lv, rv);
      } else if (row.type === "insert" && rv && rv.canvas) {
        overlayCanvas = buildSingleColorCanvas(rv, "right");
      } else if (row.type === "delete" && lv && lv.canvas) {
        overlayCanvas = buildSingleColorCanvas(lv, "left");
      }

      if (overlayCanvas) {
        stage.appendChild(overlayCanvas);
      } else {
        var ph = document.createElement("div");
        ph.className = "canvas-placeholder";
        ph.style.width  = baseW + "px";
        ph.style.height = baseH + "px";
        ph.style.display = "flex";
        ph.style.alignItems = "center";
        ph.style.justifyContent = "center";
        ph.style.color = "#9aa1b0";
        ph.style.fontSize = "12px";
        ph.textContent = "캔버스 로드 필요 — Split View로 전환 후 해당 페이지를 스크롤하여 로드하세요";
        stage.appendChild(ph);
      }

      body.appendChild(stage);
      wrap.appendChild(lbl);
      wrap.appendChild(body);
      overlayPaneEl.appendChild(wrap);

      overlayPageViews.push({ stage: stage, body: body, baseWidth: baseW, baseHeight: baseH });
    }

    /**
     * 왼쪽(빨강) + 오른쪽(초록) 채널 합성 overlay canvas 생성.
     * - 흰 배경 → 흰색
     * - 왼쪽 → 빨간색
     * - 오른쪽 → 초록색
     * - 공통 → 검정색
     */
    function buildOverlayCanvas(leftView, rightView) {
      var lc = leftView.canvas, rc = rightView.canvas;
      var w = lc.width, h = lc.height;

      var sampledRc = rc;
      if (rc.width !== w || rc.height !== h) {
        sampledRc = document.createElement("canvas");
        sampledRc.width = w; sampledRc.height = h;
        sampledRc.getContext("2d").drawImage(rc, 0, 0, w, h);
      }

      var d1 = lc.getContext("2d").getImageData(0, 0, w, h).data;
      var d2 = sampledRc.getContext("2d").getImageData(0, 0, w, h).data;

      var outCanvas = document.createElement("canvas");
      outCanvas.width = w; outCanvas.height = h;
      outCanvas.style.width  = leftView.baseWidth  + "px";
      outCanvas.style.height = leftView.baseHeight + "px";

      var ctx = outCanvas.getContext("2d");
      var imgData = ctx.createImageData(w, h);
      var out = imgData.data;

      for (var i = 0, n = w * h; i < n; i++) {
        var p = i * 4;
        var lum1 = (d1[p] * 77 + d1[p+1] * 150 + d1[p+2] * 29) >> 8;
        var lum2 = (d2[p] * 77 + d2[p+1] * 150 + d2[p+2] * 29) >> 8;
        var inv1 = 255 - lum1, inv2 = 255 - lum2;
        var white    = lum1 < lum2 ? lum1 : lum2;           // min(lum1,lum2) — 배경 밝기
        var leftOnly  = inv1 > inv2 ? inv1 - inv2 : 0;       // 왼쪽만 있는 강도
        var rightOnly = inv2 > inv1 ? inv2 - inv1 : 0;       // 오른쪽만 있는 강도
        // 공통 부분(inv1≈inv2 모두 높음) → leftOnly=rightOnly=0 → R=G=B=0 → 검정
        out[p]   = leftOnly  + white < 255 ? leftOnly  + white : 255; // R
        out[p+1] = rightOnly + white < 255 ? rightOnly + white : 255; // G
        out[p+2] = white;  // B
        out[p+3] = 255;
      }

      ctx.putImageData(imgData, 0, 0);
      return outCanvas;
    }

    /** insert/delete 페이지용: 한쪽만 있을 때 해당 색으로 tint */
    function buildSingleColorCanvas(view, side) {
      var lc = view.canvas;
      var w = lc.width, h = lc.height;
      var data = lc.getContext("2d").getImageData(0, 0, w, h).data;

      var outCanvas = document.createElement("canvas");
      outCanvas.width = w; outCanvas.height = h;
      outCanvas.style.width  = view.baseWidth  + "px";
      outCanvas.style.height = view.baseHeight + "px";

      var ctx = outCanvas.getContext("2d");
      var imgData = ctx.createImageData(w, h);
      var out = imgData.data;

      for (var i = 0, n = w * h; i < n; i++) {
        var p = i * 4;
        var lum = (data[p] * 77 + data[p+1] * 150 + data[p+2] * 29) >> 8;
        if (side === "left") {
          out[p]   = 255;  // R = full
          out[p+1] = lum;  // G = 배경만
          out[p+2] = lum;  // B = 배경만
        } else {
          out[p]   = lum;  // R = 배경만
          out[p+1] = 255;  // G = full
          out[p+2] = lum;  // B = 배경만
        }
        out[p+3] = 255;
      }

      ctx.putImageData(imgData, 0, 0);
      return outCanvas;
    }

    pdf1El.addEventListener("scroll", function () {
      syncScroll(pdf1El, pdf2El);
      scheduleViewingUpdate();
    });
    pdf2El.addEventListener("scroll", function () {
      syncScroll(pdf2El, pdf1El);
      scheduleViewingUpdate();
    });

    // ── 현재 페이지 감지 (Pixel Only) ────────────────────────────────────────

    function findVisibleRowIndex() {
      var cTop    = pdf1El.scrollTop;
      var cBottom = cTop + pdf1El.clientHeight;
      var cCenter = (cTop + cBottom) / 2;
      var bestDist = Infinity, bestRow = 0;
      pdf1El.querySelectorAll('.page-wrap').forEach(function (wrap) {
        var ri = parseInt(wrap.dataset.rowIndex);
        if (isNaN(ri)) return;
        var mid = wrap.offsetTop + wrap.offsetHeight / 2;
        var dist = Math.abs(mid - cCenter);
        if (dist < bestDist) { bestDist = dist; bestRow = ri; }
      });
      return bestRow;
    }

    function scheduleViewingUpdate() {
      if (compareMode !== "pixel" || overlayMode || _viewingRafPending) return;
      _viewingRafPending = true;
      requestAnimationFrame(function () {
        _viewingRafPending = false;
        updateCurrentViewingRow();
      });
    }

    function updateCurrentViewingRow() {
      if (compareMode !== "pixel" || overlayMode) return;
      var newRow = findVisibleRowIndex();
      if (newRow === currentViewingRowIndex) return;

      // 이전 row 하이라이트 제거
      if (currentViewingRowIndex >= 0) {
        var oldLv = pageViews1[currentViewingRowIndex];
        var oldRv = pageViews2[currentViewingRowIndex];
        if (oldLv && oldLv.pageWrap) oldLv.pageWrap.classList.remove("viewing");
        if (oldRv && oldRv.pageWrap) oldRv.pageWrap.classList.remove("viewing");
      }

      currentViewingRowIndex = newRow;

      // 새 row 하이라이트
      var lv = pageViews1[newRow];
      var rv = pageViews2[newRow];
      if (lv && lv.pageWrap) lv.pageWrap.classList.add("viewing");
      if (rv && rv.pageWrap) rv.pageWrap.classList.add("viewing");
    }

    function syncScroll(src, tgt) {
      if (compareMode === "text") {
        return;
      }
      if (syncLock || performance.now() < navLockUntil) {
        return;
      }
      syncLock = true;
      var sy = Math.max(1, src.scrollHeight - src.clientHeight);
      var ty = Math.max(1, tgt.scrollHeight - tgt.clientHeight);
      tgt.scrollTop = (src.scrollTop / sy) * ty;
      var sx2 = Math.max(1, src.scrollWidth - src.clientWidth);
      var tx2 = Math.max(1, tgt.scrollWidth - tgt.clientWidth);
      tgt.scrollLeft = (src.scrollLeft / sx2) * tx2;
      requestAnimationFrame(function () {
        syncLock = false;
      });
    }
  </script>
</body>

</html>
