<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Visual Compare Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- OpenCV.js: cv state must be declared before async load -->
  <script>
    var cvReady = false;
    function onCvLoaded() {
      function _setReady() { cvReady = true; }
      if (typeof cv !== 'undefined' && cv.Mat) {
        _setReady();
      } else if (typeof cv !== 'undefined') {
        cv.onRuntimeInitialized = _setReady;
      } else {
        // Very rare: module object not exposed yet — retry once
        setTimeout(function () {
          if (typeof cv !== 'undefined') cv.onRuntimeInitialized = _setReady;
        }, 200);
      }
    }
  </script>
  <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onCvLoaded()"></script>
  <style>
    :root {
      --white: #ffffff;
      --gray-50: #f8f9fb;
      --gray-100: #f0f2f5;
      --gray-200: #e4e7ed;
      --gray-300: #cdd2db;
      --gray-400: #9aa1b0;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --blue-50: #eff6ff;
      --blue-100: #dbeafe;
      --blue-200: #bfdbfe;
      --blue-300: #93c5fd;
      --blue-400: #60a5fa;
      --blue-500: #3b82f6;
      --blue-600: #2563eb;
      --blue-700: #1d4ed8;
      --red-100: #fee2e2;
      --red-700: #b91c1c;
      --green-100: #dcfce7;
      --green-700: #15803d;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.07), 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.10), 0 2px 6px rgba(0, 0, 0, 0.06);
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', '맑은 고딕', sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      --toolbar-h: 56px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background: var(--gray-50);
      color: var(--gray-900);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .toolbar {
      height: var(--toolbar-h);
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 30;
      flex-wrap: nowrap;
      box-shadow: var(--shadow-xs);
    }

    .toolbar>div:not(.summary) {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--gray-400);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .toolbar select,
    .toolbar button {
      height: 32px;
    }

    .toolbar select {
      padding: 0 8px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--gray-700);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow-xs);
      flex-shrink: 0;
    }

    .toolbar button {
      padding: 0 12px;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--white);
      color: var(--gray-700);
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      box-shadow: var(--shadow-xs);
    }

    .toolbar button:hover {
      background: var(--gray-50);
      border-color: var(--gray-300);
      color: var(--gray-900);
    }

    .toolbar button:active {
      background: var(--gray-100);
      transform: translateY(1px);
      box-shadow: none;
    }

    #compareBtn {
      background: var(--blue-600);
      border-color: var(--blue-700);
      color: var(--white);
      box-shadow: var(--shadow-sm);
    }

    #compareBtn:hover {
      background: var(--blue-700);
      border-color: var(--blue-700);
      color: var(--white);
    }

    .toolbar .summary {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--gray-400);
      letter-spacing: -0.01em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 272px 1fr;
      height: calc(100vh - var(--toolbar-h));
    }

    .sidebar {
      width: 272px;
      min-width: 140px;
      max-width: 600px;
      resize: horizontal;
      flex-shrink: 0;
      background: var(--white);
      overflow: auto;
      border-right: 1px solid var(--gray-200);
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--gray-200);
      border-radius: 2px;
    }

    .sidebar h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--gray-400);
      padding: 16px 16px 12px;
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 2;
      border-bottom: 1px solid var(--gray-100);
    }

    .note {
      font-size: 12px;
      color: var(--gray-400);
      line-height: 1.55;
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--gray-100);
    }

    .thumb-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      padding: 10px;
    }

    .thumb-item {
      border: 1px solid var(--gray-100);
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.12s ease;
    }

    .thumb-item:hover {
      border-color: var(--gray-300);
      background: var(--gray-50);
      box-shadow: var(--shadow-xs);
    }

    .thumb-item.active {
      border-color: var(--blue-300);
      background: var(--blue-50);
      box-shadow: 0 0 0 3px var(--blue-100);
    }

    .thumb-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-900);
      margin-bottom: 6px;
    }

    .thumb-meta {
      font-size: 11px;
      color: var(--gray-400);
      line-height: 1.6;
      white-space: pre-line;
    }

    .diff-snippet {
      margin-top: 5px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .diff-snippet-del,
    .diff-snippet-ins {
      font-size: 11px;
      font-family: monospace;
      border-radius: 3px;
      padding: 2px 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .diff-snippet-del {
      color: #b91c1c;
      background: #fef2f2;
    }

    .diff-snippet-ins {
      color: #15803d;
      background: #f0fdf4;
    }

    .badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge.same {
      background: var(--green-100);
      color: var(--green-700);
    }

    .badge.changed {
      background: var(--red-100);
      color: var(--red-700);
    }

    .badge.inserted,
    .badge.deleted {
      background: var(--red-100);
      color: var(--red-700);
    }

    .empty {
      font-size: 13px;
      color: var(--gray-400);
      padding: 20px 6px;
      text-align: center;
      line-height: 1.6;
    }

    .main {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    .pdf-pane {
      width: 50%;
      overflow: auto;
      border-right: 1px solid var(--gray-200);
      background: var(--gray-100);
      padding: 20px 16px;
    }

    .pdf-pane:last-child {
      border-right: none;
    }

    .pdf-pane::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .pdf-pane::-webkit-scrollbar-track {
      background: transparent;
    }

    .pdf-pane::-webkit-scrollbar-thumb {
      background: var(--gray-300);
      border-radius: 3px;
    }

    .pdf-pane::-webkit-scrollbar-thumb:hover {
      background: var(--blue-400);
    }

    .page-wrap {
      position: relative;
      margin: 0 auto 20px;
      width: fit-content;
      background: var(--white);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      overflow: hidden;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    .page-wrap.viewing {
      border-color: var(--blue-400);
      box-shadow: 0 0 0 3px var(--blue-100), 0 8px 24px rgba(0,0,0,0.10);
    }

    .page-wrap:hover {
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      border-color: var(--gray-300);
    }

    .page-label {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gray-400);
      padding: 7px 12px;
    }

    .page-body {
      position: relative;
      overflow: hidden;
      background: white;
    }

    .page-stage {
      position: absolute;
      left: 0;
      top: 0;
      background: white;
      transform-origin: top left;
    }

    canvas {
      display: block;
      background: white;
    }

    .canvas-placeholder {
      display: block;
      background: #fafafa;
    }

    /* TEXT-ONLY: 렌더링 전 플레이스홀더 */
    .text-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gray-50);
      color: var(--gray-400);
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .diff-box {
      position: absolute;
      border-radius: 3px;
      border: 1.5px solid rgba(239, 68, 68, 0.80);
      background: rgba(239, 68, 68, 0.08);
      transition: 0.2s ease;
    }

    .diff-box.current {
      border-color: rgba(37, 99, 235, 0.95) !important;
      background: rgba(59, 130, 246, 0.18) !important;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }

    .diff-box.flash {
      animation: flashBox 0.9s ease-in-out 2;
    }

    .diff-box.diff-line {
      border-radius: 0;
      border: none;
      background: rgba(239, 68, 68, 0.45);
    }
    .diff-box.diff-line.current {
      background: rgba(37, 99, 235, 0.55) !important;
      box-shadow: none;
    }

    .diff-box.diff-overlay-mask {
      border-radius: 2px;
      border: 1.5px dashed rgba(239, 68, 68, 0.55);
      background: rgba(239, 68, 68, 0.04);
    }
    .diff-box.diff-overlay-mask.current {
      border-color: rgba(37, 99, 235, 0.75) !important;
      background: rgba(59, 130, 246, 0.08) !important;
      box-shadow: none;
    }

    @keyframes flashBox {
      0% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.03)
      }

      100% {
        transform: scale(1)
      }
    }

    .page-status {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 3;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      color: var(--white);
      background: rgba(31, 41, 55, 0.75);
      padding: 3px 8px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
    }

    .missing-stage {
      background: linear-gradient(180deg, #fafafa, #f4f4f5);
    }

    .missing-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: var(--gray-500);
      font-size: 14px;
      padding: 20px;
      line-height: 1.6;
    }

    .missing-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 8px;
    }

    #loadingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(15, 23, 42, 0.50);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }

    #loadingOverlay.visible {
      display: flex;
    }

    .ld-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18), 0 4px 16px rgba(0, 0, 0, 0.10);
      padding: 28px 32px 24px;
      min-width: 400px;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: ldSlideIn 0.2s ease-out;
    }

    @keyframes ldSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98)
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1)
      }
    }

    .ld-header {
      display: flex;
      align-items: center;
      gap: 11px;
    }

    .ld-spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid var(--blue-100);
      border-top-color: var(--blue-600);
      border-radius: 50%;
      flex-shrink: 0;
      animation: ldSpin 0.75s linear infinite;
    }

    @keyframes ldSpin {
      to {
        transform: rotate(360deg)
      }
    }

    .ld-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-900);
    }

    .ld-cancel {
      margin-left: auto;
      font-size: 12px;
      color: var(--gray-400);
      background: none;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      padding: 3px 10px;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: all 0.12s;
    }

    .ld-cancel:hover {
      color: var(--red-700);
      border-color: var(--red-700);
      background: var(--red-100);
    }

    .ld-steps {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px 0;
    }

    .ld-step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--gray-300);
      transition: color 0.2s;
      line-height: 1.4;
    }

    .ld-step.active {
      color: var(--gray-900);
      font-weight: 600;
    }

    .ld-step.done {
      color: var(--green-700);
    }

    .ld-step-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--gray-200);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.2s;
      background: var(--white);
    }

    .ld-step.active .ld-step-icon {
      border-color: var(--blue-600);
      background: var(--blue-600);
      animation: ldPulseRing 1.2s ease-in-out infinite;
    }

    @keyframes ldPulseRing {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.35)
      }

      50% {
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0)
      }
    }

    .ld-step.active .ld-step-icon::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      animation: ldDot 1s ease-in-out infinite;
    }

    @keyframes ldDot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7)
      }
    }

    .ld-step.done .ld-step-icon {
      border-color: var(--green-700);
      background: var(--green-700);
    }

    .ld-step.done .ld-step-icon::after {
      content: '✓';
      color: white;
      font-size: 11px;
      line-height: 1;
    }

    .ld-step-label {
      flex: 1;
    }

    .ld-step-sub {
      font-size: 11px;
      color: var(--gray-400);
      font-weight: 400;
      margin-top: 1px;
    }

    .ld-step.active .ld-step-sub {
      color: var(--blue-600);
      font-weight: 500;
    }

    .ld-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ld-progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--gray-400);
      font-family: var(--font-mono);
    }

    .ld-bar-bg {
      height: 5px;
      background: var(--gray-100);
      border-radius: 999px;
      overflow: hidden;
    }

    .ld-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue-600), var(--blue-400));
      border-radius: 999px;
      transition: width 0.35s ease;
      width: 0%;
    }

    .ld-log {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--gray-400);
      background: var(--gray-50);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      min-height: 28px;
      line-height: 1.5;
      word-break: break-all;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <div id="loadingOverlay">
    <div class="ld-card">
      <div class="ld-header">
        <div class="ld-spinner"></div>
        <div class="ld-title">PDF 비교 중...</div>
        <button class="ld-cancel" id="ldCancelBtn">✕ 취소</button>
      </div>
      <div class="ld-steps">
        <div class="ld-step" id="ldStep0">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>좌측 PDF 시그니처 생성</div>
            <div class="ld-step-sub" id="ldStep0sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep1">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>우측 PDF 시그니처 생성</div>
            <div class="ld-step-sub" id="ldStep1sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep2">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>페이지 순서 정렬 분석</div>
            <div class="ld-step-sub" id="ldStep2sub">대기 중...</div>
          </div>
        </div>
        <div class="ld-step" id="ldStep3">
          <div class="ld-step-icon"></div>
          <div class="ld-step-label">
            <div>페이지 렌더링 &amp; 차이점 검출</div>
            <div class="ld-step-sub" id="ldStep3sub">대기 중...</div>
          </div>
        </div>
      </div>
      <div class="ld-progress-wrap">
        <div class="ld-progress-labels">
          <span id="ldProgressLabel">준비 중...</span>
          <span id="ldProgressPct">0%</span>
        </div>
        <div class="ld-bar-bg">
          <div class="ld-bar-fill" id="ldBarFill"></div>
        </div>
      </div>
      <div class="ld-log" id="ldLog">잠시만 기다려 주세요.</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="file" id="file1" accept="application/pdf" />
    <input type="file" id="file2" accept="application/pdf" />
    <select id="compareMode" title="비교 모드">
      <option value="pixel">Pixel Only</option>
      <option value="text">Text Only</option>
    </select>
    <button id="zoomOutBtn">Zoom -</button>
    <button id="zoomInBtn">Zoom +</button>
    <button id="prevBtn">이전 변경</button>
    <button id="nextBtn">다음 변경</button>
    <button id="overlayBtn" style="display:none;">Overlay</button>
    <button id="compareBtn">다시 비교</button>
    <div class="summary" id="summaryText">PDF 2개를 선택하세요.</div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <h2>변경 페이지 목록</h2>
      <div class="note">
        전체 페이지를 한 번에 렌더링하고 비교합니다.<br>
        <span id="thumbListNote">목록에는 변경이 감지된 페이지만 표시됩니다.<br>
        항목을 클릭하면 해당 페이지로 이동합니다.</span>
      </div>
      <div id="thumbList" class="thumb-list">
        <div class="empty">비교 후 변경된 페이지 목록이 표시됩니다.</div>
      </div>
    </aside>
    <div class="main">
      <div id="pdf1" class="pdf-pane"></div>
      <div id="pdf2" class="pdf-pane"></div>
      <div id="overlayPane" class="pdf-pane" style="display:none; width:100%;"></div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    var ldOverlay = document.getElementById("loadingOverlay");
    var ldBarFill = document.getElementById("ldBarFill");
    var ldLog = document.getElementById("ldLog");
    var ldProgLabel = document.getElementById("ldProgressLabel");
    var ldProgPct = document.getElementById("ldProgressPct");
    var ldCancelBtn = document.getElementById("ldCancelBtn");
    var STEP_WEIGHTS = [25, 25, 5, 45];
    var ldCurrentStep = -1, ldStepProgress = 0;

    function ldShow() {
      ldCurrentStep = -1;
      ldStepProgress = 0;
      ldBarFill.style.width = "0%";
      ldLog.textContent = "초기화 중...";
      ldProgLabel.textContent = "준비 중...";
      ldProgPct.textContent = "0%";
      [0, 1, 2, 3].forEach(function (i) {
        document.getElementById("ldStep" + i).classList.remove("active", "done");
        document.getElementById("ldStep" + i + "sub").textContent = "대기 중...";
      });
      ldOverlay.classList.add("visible");
    }

    function ldHide() {
      ldOverlay.classList.remove("visible");
    }

    function ldActivateStep(idx, sub) {
      if (ldCurrentStep >= 0 && ldCurrentStep < idx) {
        for (var s = ldCurrentStep; s < idx; s++) {
          var p = document.getElementById("ldStep" + s);
          if (p) {
            p.classList.remove("active");
            p.classList.add("done");
          }
        }
      }
      ldCurrentStep = idx;
      ldStepProgress = 0;
      var el = document.getElementById("ldStep" + idx);
      if (el) {
        el.classList.remove("done");
        el.classList.add("active");
      }
      if (sub) {
        ldUpdateSub(idx, sub);
      }
      ldRefreshBar();
    }

    function ldUpdateSub(idx, text) {
      var s = document.getElementById("ldStep" + idx + "sub");
      if (s) {
        s.textContent = text;
      }
    }

    function ldSetStepProgress(r) {
      ldStepProgress = Math.max(0, Math.min(1, r));
      ldRefreshBar();
    }

    function ldRefreshBar() {
      var done = 0;
      for (var s = 0; s < ldCurrentStep; s++) {
        done += STEP_WEIGHTS[s];
      }
      var cur = ldCurrentStep >= 0 ? STEP_WEIGHTS[ldCurrentStep] * ldStepProgress : 0;
      var total = Math.round(done + cur);
      ldBarFill.style.width = total + "%";
      ldProgPct.textContent = total + "%";
    }

    function ldSetLog(text) {
      ldLog.textContent = text;
      ldProgLabel.textContent = text;
    }

    var pdfDoc1 = null, pdfDoc2 = null;
    var renderScale = 1.15;
    var renderOversample = 2.0;
    var viewScale = 1.0;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);
    var pageViews1 = [], pageViews2 = [];
    var alignmentRows = [];
    var leftRowIndexByPageNo = {}, rightRowIndexByPageNo = {};
    var diffEntries = [];
    var currentDiffIndex = -1;
    var renderGeneration = 0;
    var syncLock = false;
    var navLockUntil = 0;

    var globalTextLines1 = [];
    var globalTextLines2 = [];

    var pageTextMeta1 = {};

    // ── diff 후처리 튜닝 상수 ────────────────────────────────────────────────
    // (모든 값은 effectiveScale=1 기준 픽셀 단위. 내부에서 effectiveScale 적용)
    var DIFF_POST = {
      // ── 공통 bbox 후처리 ─────────────────────────────────────────────────
      MIN_AREA:               200,   // CCL area (diff 픽셀 수) 최솟값
      MIN_DENSITY:            0.04,  // diffPixels/bboxArea 최솟값 (저밀도 노이즈 제거)
      LINE_THIN_SIDE:         8,     // 선 판정: 짧은 쪽 px 임계값
      LINE_LONG_SIDE:         50,    // 선 판정: 긴 쪽 px 임계값
      LINE_ASPECT_RATIO:      6,     // 추가 종횡비 임계값
      BOX_MERGE_GAP:          4,    // 이 px 이내 박스는 병합
      MERGE_OVERLAP_RATIO:    0.25, // 분리 방향 반대축 겹침 비율 최솟값 (0=없음, 1=완전겹침)
      MERGE_MAX_FILL_INV:     4.0,  // union면적 / 누적픽셀면적 최댓값 (초과 시 병합 거부)
      SPARSE_SPLIT_THRESHOLD: 0.03,  // density < 이 값이면 sparse 후보
      SPARSE_MIN_BBOX:        3000,  // sparse 판정에 필요한 최소 bbox 면적 (px²)
      BORDER_MARGIN:          0.015, // 캔버스 외곽 노이즈 제거 비율
      // ── OpenCV 파이프라인 전용 ────────────────────────────────────────────
      CV_PIX_DIFF_THR:        30,    // 픽셀 강도 차이 임계값 (0-255)
      CV_CANNY_LO:            20,    // Canny 하이스테리시스 낮은 임계값 (base scale)
      CV_CANNY_HI:            50,    // Canny 하이스테리시스 높은 임계값 (base scale)
      CV_DIST_TOL:            3,     // 에지 거리 허용 px (subpixel shift 보정)
      CV_BLUR_KSIZE:          3,     // Gaussian blur 커널 크기 (odd, base scale)
      CV_MORPH_OPEN:          3,     // Opening 커널 크기 (노이즈 제거, base scale)
      CV_MORPH_CLOSE:         3,     // Closing 커널 크기 (갭 메우기, base scale)
      CV_ALIGN_TRANSLATION:   true   // 경미한 translation 보정 활성화
    };
    var pageTextMeta2 = {};

    var MAX_CONCURRENT_RENDERS = 4;
    var activeRenders = 0;
    var renderQueue = [];

    var _virtualizationObserver = null;
    var _releaseTimers = {};

    var file1El = document.getElementById("file1");
    var file2El = document.getElementById("file2");
    var pdf1El = document.getElementById("pdf1");
    var pdf2El = document.getElementById("pdf2");
    var overlayPaneEl = document.getElementById("overlayPane");
    var overlayBtnEl = document.getElementById("overlayBtn");
    var thumbListEl = document.getElementById("thumbList");
    var summaryTextEl = document.getElementById("summaryText");
    var compareModeEl = document.getElementById("compareMode");
    var compareMode = "pixel";
    var overlayMode = false;
    var overlayPageViews = [];
    var currentViewingRowIndex = -1;
    var _viewingRafPending = false;

    file1El.addEventListener("change", loadPDF1);
    file2El.addEventListener("change", loadPDF2);
    compareModeEl.addEventListener("change", function () {
      compareMode = compareModeEl.value;
      if (compareMode !== "pixel") {
        overlayBtnEl.style.display = "none";
        if (overlayMode) exitOverlayMode();
      }
    });
    document.getElementById("zoomInBtn").addEventListener("click", function () {
      viewScale = Math.min(viewScale + 0.15, 3);
      applyViewScale();
    });
    document.getElementById("zoomOutBtn").addEventListener("click", function () {
      viewScale = Math.max(viewScale - 0.15, 0.5);
      applyViewScale();
    });
    document.getElementById("prevBtn").addEventListener("click", goToPrevDiff);
    document.getElementById("nextBtn").addEventListener("click", goToNextDiff);
    document.getElementById("compareBtn").addEventListener("click", rerenderIfReady);
    overlayBtnEl.addEventListener("click", function () {
      if (overlayMode) {
        exitOverlayMode();
      } else {
        enterOverlayMode();
      }
    });
    ldCancelBtn.addEventListener("click", function () {
      renderGeneration++;
      ldHide();
      summaryTextEl.textContent = "비교가 취소되었습니다.";
    });

    async function loadPDF1(e) {
      var file = e.target.files[0];
      if (!file) {
        return;
      }
      pdfDoc1 = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      rerenderIfReady();
    }

    async function loadPDF2(e) {
      var file = e.target.files[0];
      if (!file) {
        return;
      }
      pdfDoc2 = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
      rerenderIfReady();
    }

    async function rerenderIfReady() {
      if (!pdfDoc1 || !pdfDoc2) {
        summaryTextEl.textContent = "PDF 2개를 선택하세요.";
        return;
      }
      await renderAll();
    }

    function applyViewScale() {
      pageViews1.concat(pageViews2).forEach(applyScaleToPageView);
      overlayPageViews.forEach(function (ov) {
        if (!ov || !ov.body || !ov.stage) return;
        ov.body.style.width  = Math.max(1, Math.round(ov.baseWidth  * viewScale)) + "px";
        ov.body.style.height = Math.max(1, Math.round(ov.baseHeight * viewScale)) + "px";
        ov.stage.style.transform = "scale(" + viewScale + ")";
      });
      if (currentDiffIndex >= 0 && currentDiffIndex < diffEntries.length) {
        highlightCurrent();
      }
      updateZoomSummary();
    }

    function applyScaleToPageView(pv) {
      if (!pv || !pv.pageBody || !pv.stage) {
        return;
      }
      pv.pageBody.style.width = Math.max(1, Math.round(pv.baseWidth * viewScale)) + "px";
      pv.pageBody.style.height = Math.max(1, Math.round(pv.baseHeight * viewScale)) + "px";
      pv.stage.style.width = pv.baseWidth + "px";
      pv.stage.style.height = pv.baseHeight + "px";
      pv.stage.style.transform = "scale(" + viewScale + ")";
    }

    function updateZoomSummary() {
      var z = " / 줌 " + Math.round(viewScale * 100) + "%";
      var m = " / " + compareModeEl.options[compareModeEl.selectedIndex].text;
      if (compareMode === "text" && (pageViews1.length || pageViews2.length)) {
        summaryTextEl.textContent = "좌측 " + pageViews1.length + "p / 우측 " + pageViews2.length
          + "p / 변경 블록 " + diffEntries.length + "건" + m + z;
        return;
      }
      if (!alignmentRows.length) {
        summaryTextEl.textContent = "PDF 2개를 선택하세요." + z;
        return;
      }
      var changedRows = new Set(diffEntries.map(function (d) {
        return d.rowIndex;
      }));
      var insertedCount = diffEntries.filter(function (d) {
        return d.kind === "insert";
      }).length;
      var deletedCount = diffEntries.filter(function (d) {
        return d.kind === "delete";
      }).length;
      var changedCount = diffEntries.filter(function (d) {
        return d.kind === "change";
      }).length;
      summaryTextEl.textContent = "정렬 행 " + alignmentRows.length + "개 / 변경 " + changedCount + " / 삽입 "
        + insertedCount + " / 삭제 " + deletedCount + " / 변경 위치 " + changedRows.size + "개" + m + z;
    }

    async function renderAll() {
      renderGeneration++;
      var myGen = renderGeneration;

      if (_virtualizationObserver) {
        _virtualizationObserver.disconnect();
        _virtualizationObserver = null;
      }
      Object.keys(_releaseTimers).forEach(function(k) { clearTimeout(_releaseTimers[k]); });
      _releaseTimers = {};
      activeRenders = 0;
      renderQueue = [];

      // overlay / viewing 상태 리셋
      if (overlayMode) exitOverlayMode();
      overlayBtnEl.style.display = "none";
      currentViewingRowIndex = -1;

      pdf1El.innerHTML = "";
      pdf2El.innerHTML = "";
      thumbListEl.innerHTML = "";
      summaryTextEl.textContent = "준비 중...";
      pageViews1 = [];
      pageViews2 = [];
      alignmentRows = [];
      leftRowIndexByPageNo = {};
      rightRowIndexByPageNo = {};
      diffEntries = [];
      currentDiffIndex = -1;
      globalTextLines1 = [];
      globalTextLines2 = [];
      pageTextMeta1 = {};
      pageTextMeta2 = {};

      ldShow();

      try {
        if (compareMode === "text") {
          await renderAll_TextOnly(myGen);
        } else {
          await renderAll_Pixel(myGen);
        }
      } catch (err) {
        console.error("renderAll error:", err);
        ldSetLog("❌ 오류: " + (err && err.message ? err.message : String(err)));
        summaryTextEl.textContent = "오류: " + (err && err.message ? err.message : String(err));
      }
    }

    async function renderAll_Pixel(myGen) {
      ldActivateStep(0, "0 / " + pdfDoc1.numPages + " 페이지");
      var leftSignatures = await buildAllPageSignatures(pdfDoc1, myGen, "좌측");
      if (myGen !== renderGeneration) { ldHide(); return; }

      ldActivateStep(1, "0 / " + pdfDoc2.numPages + " 페이지");
      var rightSignatures = await buildAllPageSignatures(pdfDoc2, myGen, "우측");
      if (myGen !== renderGeneration) { ldHide(); return; }

      ldActivateStep(2, "정렬 계산 중...");
      ldSetLog("페이지 순서 정렬 계산 중... (" + leftSignatures.length + " × " + rightSignatures.length + ")");
      summaryTextEl.textContent = "페이지 정렬 계산 중...";
      alignmentRows = await alignPageSequences(leftSignatures, rightSignatures);
      if (myGen !== renderGeneration) { ldHide(); return; }

      var _ins = alignmentRows.filter(function (r) { return r.type === "insert"; }).length;
      var _del = alignmentRows.filter(function (r) { return r.type === "delete"; }).length;
      var _mat = alignmentRows.filter(function (r) { return r.type === "match";  }).length;
      ldUpdateSub(2, "매칭 " + _mat + " / 삽입 " + _ins + " / 삭제 " + _del);
      ldSetStepProgress(1);

      summaryTextEl.textContent = "페이지 껍데기 생성 중...";
      ldSetLog("페이지 레이아웃 구성 중...");
      for (var ri = 0; ri < alignmentRows.length; ri++) {
        var row = alignmentRows[ri], lv, rv;

        if (row.type === "match") {
          // 양쪽 메타를 먼저 가져와 비율·크기 비교
          var lm = await getPageMeta(pdfDoc1, row.leftPageNo);
          var rm = await getPageMeta(pdfDoc2, row.rightPageNo);

          // 비율이 같고 크기가 다를 때 → 큰 쪽 사이즈로 작은 쪽을 스케일업
          var sameAspect = Math.abs(lm.width / lm.height - rm.width / rm.height) < 0.02;
          var diffSize   = Math.abs(lm.width - rm.width) > 1 || Math.abs(lm.height - rm.height) > 1;
          if (sameAspect && diffSize) {
            if (rm.width < lm.width) {
              rm = { width: lm.width, height: lm.height,
                     renderScaleOverride: renderScale * lm.width / rm.width };
            } else {
              lm = { width: rm.width, height: rm.height,
                     renderScaleOverride: renderScale * rm.width / lm.width };
            }
          }

          lv = createPageShell(pdf1El, row.leftPageNo, "좌측", lm.width, lm.height, ri);
          if (lm.renderScaleOverride) lv.renderScaleOverride = lm.renderScaleOverride;
          leftRowIndexByPageNo[row.leftPageNo] = ri;

          rv = createPageShell(pdf2El, row.rightPageNo, "우측", rm.width, rm.height, ri);
          if (rm.renderScaleOverride) rv.renderScaleOverride = rm.renderScaleOverride;
          rightRowIndexByPageNo[row.rightPageNo] = ri;

        } else if (row.type === "delete") {
          var lm = await getPageMeta(pdfDoc1, row.leftPageNo);
          lv = createPageShell(pdf1El, row.leftPageNo, "좌측", lm.width, lm.height, ri);
          leftRowIndexByPageNo[row.leftPageNo] = ri;
          rv = createMissingPageShell(pdf2El, "우측 PDF - 없음", lm.width, lm.height, "delete", ri);

        } else { // insert
          var rm = await getPageMeta(pdfDoc2, row.rightPageNo);
          lv = createMissingPageShell(pdf1El, "좌측 PDF - 없음", rm.width, rm.height, "insert", ri);
          rv = createPageShell(pdf2El, row.rightPageNo, "우측", rm.width, rm.height, ri);
          rightRowIndexByPageNo[row.rightPageNo] = ri;
        }

        pageViews1.push(lv); pageViews2.push(rv);
      }
      applyViewScale();

      ldActivateStep(3, "0 / " + alignmentRows.length + " 행 처리 중");
      summaryTextEl.textContent = "렌더링/비교 중...";
      var totalRows = alignmentRows.length;

      var PIXEL_CONCURRENCY = 2;

      // 행 하나를 처리하는 내부 헬퍼 (renderAll_Pixel 전용)
      async function processPixelRow(idx, gen) {
        if (gen !== renderGeneration) return;
        var row = alignmentRows[idx], left = pageViews1[idx], right = pageViews2[idx];
        if (row.type === "match") {
          await Promise.all([
            ensureRendered(pdfDoc1, left,  gen, true),
            ensureRendered(pdfDoc2, right, gen, true)
          ]);
          if (gen !== renderGeneration) return;
          await maybeCompareAlignedRow(idx, gen);
        } else if (row.type === "insert") {
          await ensureRendered(pdfDoc2, right, gen, true);
          if (gen !== renderGeneration) return;
          markInsertedRow(idx); downscaleCanvasToDisplay(right);
        } else {
          await ensureRendered(pdfDoc1, left, gen, true);
          if (gen !== renderGeneration) return;
          markDeletedRow(idx); downscaleCanvasToDisplay(left);
        }
      }

      for (var i = 0; i < totalRows; i += PIXEL_CONCURRENCY) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        var batchEnd = Math.min(i + PIXEL_CONCURRENCY, totalRows);
        var tasks = [];
        for (var j = i; j < batchEnd; j++) {
          var rj = alignmentRows[j];
          ldSetStepProgress(j / totalRows);
          var pl = (j+1) + " / " + totalRows;
          if (rj.type === "match") {
            ldUpdateSub(3, pl + " — 좌 " + rj.leftPageNo + " ↔ 우 " + rj.rightPageNo);
            ldSetLog("p" + rj.leftPageNo + " ↔ p" + rj.rightPageNo + " diff 검출 중...");
          } else if (rj.type === "insert") {
            ldUpdateSub(3, pl + " — 우측 p" + rj.rightPageNo + " 삽입");
          } else {
            ldUpdateSub(3, pl + " — 좌측 p" + rj.leftPageNo + " 삭제");
          }
          tasks.push(processPixelRow(j, myGen));
        }
        await Promise.all(tasks);
        if (myGen !== renderGeneration) { ldHide(); return; }
        summaryTextEl.textContent = "정렬 행 " + batchEnd + " / " + totalRows + " 처리 완료 / 현재 변경 " + diffEntries.length + "건";
      }

      buildChangedThumbList(); ldSetStepProgress(1); ldHide();
      updateZoomSummary();
      overlayBtnEl.style.display = "";
      setTimeout(function() { updateCurrentViewingRow(); setupCanvasVirtualization(); }, 200);
    }

    async function renderAll_TextOnly(myGen) {
      var n = pdfDoc1.numPages, m = pdfDoc2.numPages;

      // ── Step 0: 좌측 텍스트 추출 (캔버스 없음) ──────────────────────────────
      ldActivateStep(0, "0 / " + n + " 페이지");
      for (var p = 1; p <= n; p++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldUpdateSub(0, p + " / " + n); ldSetStepProgress((p-1)/n);
        ldSetLog("좌측 텍스트 추출 중... p" + p + " / " + n);
        summaryTextEl.textContent = "좌측 텍스트 추출 중... " + p + " / " + n;
        pageTextMeta1[p] = await extractPageTextMeta(pdfDoc1, p);
        await yieldToBrowser();
      }
      ldUpdateSub(0, "완료 (" + n + " 페이지)"); ldSetStepProgress(1);

      // ── Step 1: 우측 텍스트 추출 (캔버스 없음) ──────────────────────────────
      ldActivateStep(1, "0 / " + m + " 페이지");
      for (var p = 1; p <= m; p++) {
        if (myGen !== renderGeneration) { ldHide(); return; }
        ldUpdateSub(1, p + " / " + m); ldSetStepProgress((p-1)/m);
        ldSetLog("우측 텍스트 추출 중... p" + p + " / " + m);
        summaryTextEl.textContent = "우측 텍스트 추출 중... " + p + " / " + m;
        pageTextMeta2[p] = await extractPageTextMeta(pdfDoc2, p);
        await yieldToBrowser();
      }
      ldUpdateSub(1, "완료 (" + m + " 페이지)"); ldSetStepProgress(1);

      // ── Step 2: 페이지 정렬 생략 (전체 문서 flat 스트림 비교) ──────────────
      ldActivateStep(2, "페이지 정렬 생략 (Text Only)");
      ldUpdateSub(2, "전체 스트림 flat 비교");
      ldSetLog("페이지 경계 무시 — 전체 문서 스트림으로 비교");

      alignmentRows = [];
      var maxPages = Math.max(n, m);
      for (var pi = 1; pi <= maxPages; pi++) {
        var hasL = pi <= n, hasR = pi <= m;
        if (hasL && hasR) {
          alignmentRows.push({ type: "match",  leftPageNo: pi, rightPageNo: pi, similarity: 1 });
        } else if (hasR) {
          alignmentRows.push({ type: "insert", leftPageNo: null, rightPageNo: pi, similarity: 0 });
        } else {
          alignmentRows.push({ type: "delete", leftPageNo: pi,  rightPageNo: null, similarity: 0 });
        }
      }
      ldUpdateSub(2, "완료 (" + alignmentRows.length + " 행)");
      ldSetStepProgress(1);

      // ── 셸 생성 (플레이스홀더, 캔버스 없음) ─────────────────────────────────
      ldSetLog("페이지 셸 구성 중...");
      summaryTextEl.textContent = "페이지 셸 구성 중...";
      for (var ri = 0; ri < alignmentRows.length; ri++) {
        var row = alignmentRows[ri];
        var lv, rv;

        if (row.type === "match") {
          var lm = pageTextMeta1[row.leftPageNo];
          var rm = pageTextMeta2[row.rightPageNo];

          // 비율이 같고 크기가 다를 때 → 큰 쪽으로 작은 쪽의 스팬 좌표를 스케일
          // (텍스트 비교 자체는 좌표 무관 → 좌표만 변환하면 diff box 위치가 맞춰짐)
          var sameAspect = Math.abs(lm.cssWidth / lm.cssHeight - rm.cssWidth / rm.cssHeight) < 0.02;
          var diffSize   = Math.abs(lm.cssWidth - rm.cssWidth) > 1 || Math.abs(lm.cssHeight - rm.cssHeight) > 1;
          if (sameAspect && diffSize) {
            if (rm.cssWidth < lm.cssWidth) {
              var sf = lm.cssWidth / rm.cssWidth;
              rm.textLines.forEach(function(s) { s.x *= sf; s.y *= sf; s.w *= sf; s.h *= sf; });
              rm.cssWidth = lm.cssWidth; rm.cssHeight = lm.cssHeight;
              rm.renderScaleOverride = renderScale * sf;
            } else {
              var sf = rm.cssWidth / lm.cssWidth;
              lm.textLines.forEach(function(s) { s.x *= sf; s.y *= sf; s.w *= sf; s.h *= sf; });
              lm.cssWidth = rm.cssWidth; lm.cssHeight = rm.cssHeight;
              lm.renderScaleOverride = renderScale * sf;
            }
          }

          lv = createPageShell_TextOnly(pdf1El, row.leftPageNo, "좌측", lm.cssWidth, lm.cssHeight, ri);
          if (lm.renderScaleOverride) lv.renderScaleOverride = lm.renderScaleOverride;
          leftRowIndexByPageNo[row.leftPageNo] = ri;
          rv = createPageShell_TextOnly(pdf2El, row.rightPageNo, "우측", rm.cssWidth, rm.cssHeight, ri);
          if (rm.renderScaleOverride) rv.renderScaleOverride = rm.renderScaleOverride;
          rightRowIndexByPageNo[row.rightPageNo] = ri;

        } else if (row.type === "delete") {
          var lm = pageTextMeta1[row.leftPageNo];
          lv = createPageShell_TextOnly(pdf1El, row.leftPageNo, "좌측", lm.cssWidth, lm.cssHeight, ri);
          leftRowIndexByPageNo[row.leftPageNo] = ri;
          rv = createMissingPageShell(pdf2El, "우측 PDF - 없음", lm.cssWidth, lm.cssHeight, "delete", ri);

        } else { // insert
          var rm = pageTextMeta2[row.rightPageNo];
          lv = createMissingPageShell(pdf1El, "좌측 PDF - 없음", rm.cssWidth, rm.cssHeight, "insert", ri);
          rv = createPageShell_TextOnly(pdf2El, row.rightPageNo, "우측", rm.cssWidth, rm.cssHeight, ri);
          rightRowIndexByPageNo[row.rightPageNo] = ri;
        }

        pageViews1.push(lv);
        pageViews2.push(rv);
      }
      applyViewScale();

      // ── Step 3: Myers diff ───────────────────────────────────────────────────
      ldActivateStep(3, "Myers diff 계산 중...");
      ldSetLog("전체 토큰 수집 중...");
      summaryTextEl.textContent = "Myers diff 계산 중...";

      globalTextLines1 = collectAllRowItems_TextOnly(pageTextMeta1);
      globalTextLines2 = collectAllRowItems_TextOnly(pageTextMeta2);

      ldSetLog("Myers diff 준비 중... (" + globalTextLines1.length + " vs " + globalTextLines2.length + " 토큰)");

      (function pruneItems(metaMap) {
        Object.keys(metaMap).forEach(function(p) {
          var lines = metaMap[p] && metaMap[p].textLines;
          if (!lines) return;
          lines.forEach(function(ln) { ln.items = null; });
        });
      })(pageTextMeta1);
      (function pruneItems(metaMap) {
        Object.keys(metaMap).forEach(function(p) {
          var lines = metaMap[p] && metaMap[p].textLines;
          if (!lines) return;
          lines.forEach(function(ln) { ln.items = null; });
        });
      })(pageTextMeta2);

      // GC 기회 최대화
      await yieldToBrowser();
      await yieldToBrowser();
      if (myGen !== renderGeneration) { ldHide(); return; }

      ldSetLog("Myers diff 계산 중... (" + globalTextLines1.length + " vs " + globalTextLines2.length + " 토큰)");
      var diffOps = postProcessDiffOps(computeWordsDiff(globalTextLines1, globalTextLines2));

      // diff 완료 후 토큰 배열 참조 해제
      globalTextLines1 = null;
      globalTextLines2 = null;

      if (myGen !== renderGeneration) { ldHide(); return; }

      ldSetLog("diff 결과 적용 중...");
      buildTextOnlyDiffEntries(diffOps);

      // 페이지 수 차이(insert/delete) 표시
      for (var ri = 0; ri < alignmentRows.length; ri++) {
        var row = alignmentRows[ri];
        if (row.type === "insert") {
          updatePageStatusBadge(pageViews1[ri], 0, "insert");
          updatePageStatusBadge(pageViews2[ri], 0, "insert");
        } else if (row.type === "delete") {
          updatePageStatusBadge(pageViews1[ri], 0, "delete");
          updatePageStatusBadge(pageViews2[ri], 0, "delete");
        }
      }

      buildChangedThumbList();
      ldSetStepProgress(1);
      ldHide();
      updateZoomSummary();

      setTimeout(function(){ setupTextOnlyVirtualization(myGen); }, 200);
    }

    async function extractPageTextMeta(pdfDoc, pageNo) {
      var page = await pdfDoc.getPage(pageNo);
        var vp = page.getViewport({scale: renderScale});
        var tc = await page.getTextContent();

        var rawItems = (tc.items || []).map(function(item) {
            var str = (item.str || "");
            if (!str) return null;
            var tx = pdfjsLib.Util.transform(vp.transform, item.transform);
            var ih = Math.max(1, Math.abs(tx[3]) || 10);
            return {
                str: str,
                ix: tx[4],
                iy: tx[5] - ih,
                iw: Math.max(1, item.width * renderScale),
                ih: ih,
                baselineY: tx[5],
                hasEOL: !!item.hasEOL
            };
        }).filter(Boolean);

        var avgH = rawItems.length
            ? rawItems.reduce(function(s, i) { return s + i.ih; }, 0) / rawItems.length
            : 10;

        rawItems.sort(function(a, b) {
            var dy = a.baselineY - b.baselineY;
            if (Math.abs(dy) > avgH * 0.5) return dy;
            return a.ix - b.ix;
        });

        var mergedItems = [];
        rawItems.forEach(function(item) {
            if (!item.str.trim()) {
                if (mergedItems.length) mergedItems[mergedItems.length - 1].hasSpace = true;
                return;
            }

            var last = mergedItems.length ? mergedItems[mergedItems.length - 1] : null;

            var canMerge = last
                && !last.hasSpace
                && !last.hasEOL
                && Math.abs(item.baselineY - last.baselineY) < avgH * 0.3
                && (item.ix - (last.ix + last.iw)) < avgH * 0.3
                && !item.str.startsWith(" ")
                && !last.str.endsWith(" ");

            if (canMerge) {
                last.str += item.str;
                last.iw = (item.ix + item.iw) - last.ix;
                last.hasEOL = item.hasEOL;
            } else {
                mergedItems.push(Object.assign({}, item, { hasSpace: false }));
            }
        });

        var spans = [];
        mergedItems.forEach(function(item) {
            item.str.trim().split(/\s+/).filter(Boolean).forEach(function(word) {
                if (/^[.,!?;:()\[\]\/\-"']+$/.test(word)) return;
                spans.push({ text: word, x: item.ix, y: item.iy, w: item.iw, h: item.ih });
            });
        });

        try { page.cleanup(); } catch(e) {}
        return {
            pageNo:    pageNo,
            cssWidth:  vp.width,
            cssHeight: vp.height,
            text: normalizeTextForCompare(
                mergedItems.map(function(i) { return i.str.trim(); }).filter(Boolean).join(" ")
            ),
            textLines: spans
        };
    }

    function collectAllRowItems_TextOnly(metaMap) {
        var result = [], globalRowIndex = 0;
        var pageNos = Object.keys(metaMap).map(Number).sort(function(a, b) { return a - b; });
        for (var pi = 0; pi < pageNos.length; pi++) {
            var pageNo = pageNos[pi];
            var meta = metaMap[pageNo];
            if (!meta || !meta.textLines) continue;
            var pageRowCount = meta.textLines.length;
            meta.textLines.forEach(function(span, idx) {
                if (span._normKey === undefined) {
                    span._normKey = normalizeTextForCompare(span.text)
                        .replace(/\s/g, "");
                }
                result.push({
                    pageNo:         pageNo,
                    rowIndexInPage: idx,
                    pageRowCount:   pageRowCount,
                    globalRowIndex: globalRowIndex,
                    line:           span
                });
                globalRowIndex++;
            });
        }
        return result;
    }

    function createPageShell_TextOnly(container, pageNo, sideLabel, width, height, rowIndex) {
      var wrap  = document.createElement("div");
      wrap.className = "page-wrap"; wrap.dataset.rowIndex = rowIndex;
      var lbl   = document.createElement("div");
      lbl.className = "page-label"; lbl.textContent = sideLabel + " PDF - 페이지 " + pageNo;
      var body  = document.createElement("div"); body.className = "page-body";
      var stage = document.createElement("div"); stage.className = "page-stage";
      stage.style.width = width + "px"; stage.style.height = height + "px";
      var ph = document.createElement("div");
      ph.className = "text-placeholder canvas-placeholder";
      ph.style.width  = width  + "px";
      ph.style.height = height + "px";
      ph.textContent = "p" + pageNo;
      var overlay = document.createElement("div");
      overlay.className = "overlay";
      overlay.style.width = width + "px"; overlay.style.height = height + "px";
      var status = document.createElement("div");
      status.className = "page-status"; status.textContent = "text-only";
      stage.appendChild(ph);
      stage.appendChild(overlay);
      stage.appendChild(status);
      body.appendChild(stage);
      wrap.appendChild(lbl); wrap.appendChild(body);
      container.appendChild(wrap);
      var view = {
        pageNo: pageNo, rowIndex: rowIndex,
        width: width, height: height, baseWidth: width, baseHeight: height,
        pageWrap: wrap, pageBody: body, stage: stage, overlay: overlay, status: status,
        canvas: null, viewport: null,
        textLines: (pageNo) ? (
          (container === pdf1El ? pageTextMeta1[pageNo] : pageTextMeta2[pageNo]) || {}
        ).textLines || [] : [],
        contentBounds: null,
        isRendered: false, isCompared: false, renderToken: 0, meta: {},
        isMissing: false, missingType: null
      };
      applyScaleToPageView(view);
      return view;
    }

    function setupTextOnlyVirtualization(generation) {
      if (!('IntersectionObserver' in window)) {
        renderAllPagesTextOnlyFallback(generation);
        return;
      }
      if (_virtualizationObserver) _virtualizationObserver.disconnect();
      _virtualizationObserver = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
          var wrap = entry.target;
          var rowIndex = parseInt(wrap.dataset.rowIndex);
          if (isNaN(rowIndex)) return;

          if (!entry.isIntersecting) {
            if (!_releaseTimers[rowIndex]) {
              _releaseTimers[rowIndex] = setTimeout(function(){
                releaseCanvasForRow(rowIndex);
                delete _releaseTimers[rowIndex];
              }, 8000);
            }
          } else {
            if (_releaseTimers[rowIndex]) {
              clearTimeout(_releaseTimers[rowIndex]);
              delete _releaseTimers[rowIndex];
            }
            renderRowOnDemand(rowIndex, generation);
          }
        });
      }, { rootMargin: '1500px 0px 1500px 0px', threshold: 0 });

      document.querySelectorAll('.page-wrap').forEach(function(wrap){
        _virtualizationObserver.observe(wrap);
      });
    }

    async function renderRowOnDemand(rowIndex, generation) {
      if (generation !== renderGeneration) return;
      var lv = pageViews1[rowIndex], rv = pageViews2[rowIndex];
      var row = alignmentRows[rowIndex];
      if (!row) return;

      var pLeft  = (row.leftPageNo  != null && lv && !lv.isRendered && !lv.isMissing) ? pdfDoc1 : null;
      var pRight = (row.rightPageNo != null && rv && !rv.isRendered && !rv.isMissing) ? pdfDoc2 : null;

      if (!pLeft && !pRight) return;

      var tasks = [];
      if (pLeft)  tasks.push(ensureRendered(pdfDoc1, lv, generation));
      if (pRight) tasks.push(ensureRendered(pdfDoc2, rv, generation));
      await Promise.all(tasks);
      if (lv && lv.canvas) downscaleCanvasToDisplay(lv);
      if (rv && rv.canvas) downscaleCanvasToDisplay(rv);
    }

    async function renderAllPagesTextOnlyFallback(generation) {
      for (var i = 0; i < pageViews1.length; i++) {
        if (generation !== renderGeneration) return;
        var row = alignmentRows[i];
        if (!row) continue;
        if (row.leftPageNo  != null) await ensureRendered(pdfDoc1, pageViews1[i], generation);
        if (row.rightPageNo != null) await ensureRendered(pdfDoc2, pageViews2[i], generation);
      }
    }

    function buildTextOnlyDiffEntries(diffOps) {
      var blocks = [];
      var cur = null;
      for (var i = 0; i < diffOps.length; i++) {
        var op = diffOps[i];
        if (op.op === "=") {
          if (cur) { blocks.push(cur); cur = null; }
        } else {
          if (!cur) cur = { leftLines: [], rightLines: [] };
          if (op.op === "-") cur.leftLines.push(op.leftEntry);
          else if (op.op === "+") cur.rightLines.push(op.rightEntry);
        }
      }
      if (cur) blocks.push(cur);

      for (var bi = 0; bi < blocks.length; bi++) {
        var block = blocks[bi];
        var diffId = "text-d" + bi;

        var leftByPage = {}, rightByPage = {};
        block.leftLines.forEach(function (entry) {
          var pg = entry.pageNo;
          if (!leftByPage[pg]) leftByPage[pg] = [];
          leftByPage[pg].push(entry.line);
        });
        block.rightLines.forEach(function (entry) {
          var pg = entry.pageNo;
          if (!rightByPage[pg]) rightByPage[pg] = [];
          rightByPage[pg].push(entry.line);
        });

        var leftPageNos = Object.keys(leftByPage).map(Number).sort(function (a, b) { return a - b; });
        var rightPageNos = Object.keys(rightByPage).map(Number).sort(function (a, b) { return a - b; });

        var primaryLeftPageNo = leftPageNos[0] || null;
        var primaryRightPageNo = rightPageNos[0] || null;

        var firstLeftRect = null;
        leftPageNos.forEach(function (pg) {
          var rowIdx = leftRowIndexByPageNo[pg];
          var pv = (rowIdx !== undefined) ? pageViews1[rowIdx] : null;
          if (!pv || !pv.overlay) return;
          var rects = mergeNearbyRects(leftByPage[pg].map(function (ln) {
            return expandRectCss(ln, 4, pv.width, pv.height);
          }), 8);
          rects.forEach(function (r) { drawDiffBox(pv.overlay, r, diffId, "change"); });
          if (pg === primaryLeftPageNo && rects.length) firstLeftRect = rects[0];
        });

        var firstRightRect = null;
        rightPageNos.forEach(function (pg) {
          var rowIdx = rightRowIndexByPageNo[pg];
          var pv = (rowIdx !== undefined) ? pageViews2[rowIdx] : null;
          if (!pv || !pv.overlay) return;
          var rects = mergeNearbyRects(rightByPage[pg].map(function (ln) {
            return expandRectCss(ln, 4, pv.width, pv.height);
          }), 8);
          rects.forEach(function (r) { drawDiffBox(pv.overlay, r, diffId, "change"); });
          if (pg === primaryRightPageNo && rects.length) firstRightRect = rects[0];
        });

        var leftRowIdx  = primaryLeftPageNo  != null ? (leftRowIndexByPageNo[primaryLeftPageNo]  || 0) : null;
        var rightRowIdx = primaryRightPageNo != null ? (rightRowIndexByPageNo[primaryRightPageNo] || 0) : null;
        if (leftRowIdx  === null) leftRowIdx  = rightRowIdx !== null ? Math.min(rightRowIdx,  pageViews1.length-1) : 0;
        if (rightRowIdx === null) rightRowIdx = leftRowIdx  !== null ? Math.min(leftRowIdx,   pageViews2.length-1) : 0;

        var leftText = block.leftLines.map(function (e) { return e.line.text; }).join(" / ");
        var rightText = block.rightLines.map(function (e) { return e.line.text; }).join(" / ");

        diffEntries.push({
          id: diffId,
          kind: "change",
          rowIndex: leftRowIdx,
          rightRowIndex: rightRowIdx,
          pageNo: primaryLeftPageNo || primaryRightPageNo,
          leftPageNo: primaryLeftPageNo,
          rightPageNo: primaryRightPageNo,
          leftRect: firstLeftRect,
          rightRect: firstRightRect,
          leftText: leftText,
          rightText: rightText,
          label: "변경 " + (primaryLeftPageNo ? "좌 p" + primaryLeftPageNo : "") + (primaryRightPageNo ? " ↔ 우 p" + primaryRightPageNo : "")
        });
      }
    }

    function computeWordsDiff(leftEntries, rightEntries) {
      var oldTokens = leftEntries;
      var newTokens = rightEntries;
      var oldLen = oldTokens.length;
      var newLen = newTokens.length;

      function entryEquals(a, b) {
        var ka = a.line._normKey !== undefined ? a.line._normKey
          : normalizeTextForCompare(a.line.text).replace(/\s/g, "");
        var kb = b.line._normKey !== undefined ? b.line._normKey
          : normalizeTextForCompare(b.line.text).replace(/\s/g, "");

        if (!ka || !kb) return false;
        if (ka === kb) return true;

        var isPunctOnly = function(s) { return /^[.,!?;:()\[\]\/\-"']+$/.test(s); };
        if (isPunctOnly(ka) && isPunctOnly(kb)) return true;
        if (isPunctOnly(ka) || isPunctOnly(kb)) return false;

        if (Math.abs(ka.length - kb.length) > Math.ceil(Math.max(ka.length, kb.length) * 0.15)) return false;

        return textSimilarity(ka, kb) >= 0.9;
      }

      function addToPath(path, added, removed, oldPosInc) {
        var last = path.lastComponent;
        if (last && last.added === added && last.removed === removed) {
          return {
            oldPos: path.oldPos + oldPosInc,
            lastComponent: { count: last.count + 1, added: added, removed: removed, previousComponent: last.previousComponent }
          };
        }
        return {
          oldPos: path.oldPos + oldPosInc,
          lastComponent: { count: 1, added: added, removed: removed, previousComponent: last }
        };
      }

      function extractCommon(basePath, diagonalPath) {
        var op = basePath.oldPos, np = op - diagonalPath, commonCount = 0;
        while (np + 1 < newLen && op + 1 < oldLen && entryEquals(oldTokens[op + 1], newTokens[np + 1])) {
          np++; op++; commonCount++;
        }
        if (commonCount) {
          basePath.lastComponent = { count: commonCount, previousComponent: basePath.lastComponent, added: false, removed: false };
        }
        basePath.oldPos = op;
        return np;
      }

      function buildOps(lastComponent) {
        var components = [];
        var nc;
        while (lastComponent) {
          components.push(lastComponent);
          nc = lastComponent.previousComponent;
          delete lastComponent.previousComponent;
          lastComponent = nc;
        }
        components.reverse();

        var ops = [], np = 0, op = 0;
        for (var i = 0; i < components.length; i++) {
          var c = components[i];
          if (c.removed) {
            for (var k = 0; k < c.count; k++) ops.push({ op: "-", leftEntry: oldTokens[op++], rightEntry: null });
          } else if (c.added) {
            for (var k = 0; k < c.count; k++) ops.push({ op: "+", leftEntry: null, rightEntry: newTokens[np++] });
          } else {
            for (var k = 0; k < c.count; k++) ops.push({ op: "=", leftEntry: oldTokens[op++], rightEntry: newTokens[np++] });
          }
        }
        return ops;
      }

      var bestPath = [{ oldPos: -1, lastComponent: undefined }];
      var newPos = extractCommon(bestPath[0], 0);

      if (bestPath[0].oldPos + 1 >= oldLen && newPos + 1 >= newLen) {
        return buildOps(bestPath[0].lastComponent);
      }

      var editLength = 1;
      var maxEditLength = oldLen + newLen;
      var minDiag = -Infinity, maxDiag = Infinity;

      while (editLength <= maxEditLength) {
        for (var diag = Math.max(minDiag, -editLength); diag <= Math.min(maxDiag, editLength); diag += 2) {
          var removePath = bestPath[diag - 1], addPath = bestPath[diag + 1];
          if (removePath) bestPath[diag - 1] = null;
          var canAdd = !!(addPath && (addPath.oldPos - diag) >= 0 && (addPath.oldPos - diag) < newLen);
          var canRemove = !!(removePath && removePath.oldPos + 1 < oldLen);
          if (!canAdd && !canRemove) { bestPath[diag] = null; continue; }
          var basePath;
          if (!canRemove || (canAdd && removePath.oldPos < addPath.oldPos)) {
            basePath = addToPath(addPath, true, false, 0);
          } else {
            basePath = addToPath(removePath, false, true, 1);
          }
          newPos = extractCommon(basePath, diag);
          if (basePath.oldPos + 1 >= oldLen && newPos + 1 >= newLen) {
            return buildOps(basePath.lastComponent);
          }
          bestPath[diag] = basePath;
          if (basePath.oldPos + 1 >= oldLen) maxDiag = Math.min(maxDiag, diag - 1);
          if (newPos + 1 >= newLen) minDiag = Math.max(minDiag, diag + 1);
        }
        editLength++;
      }
      return [];
    }

    function postProcessDiffOps(ops) {
      var SAME_PAGE_PROX = 2;
      var MAX_PAGE_GAP   = 1;

      var delsByText = {};
      var insByText = {};
      for (var i = 0; i < ops.length; i++) {
        var op = ops[i];
        if (op.op === "-") {
          var k = op.leftEntry.line._normKey !== undefined
            ? op.leftEntry.line._normKey
            : normalizeTextForCompare(op.leftEntry.line.text);
          if (!delsByText[k]) delsByText[k] = [];
          delsByText[k].push({ i: i, entry: op.leftEntry });
        } else if (op.op === "+") {
          var k = op.rightEntry.line._normKey !== undefined
            ? op.rightEntry.line._normKey
            : normalizeTextForCompare(op.rightEntry.line.text);
          if (!insByText[k]) insByText[k] = [];
          insByText[k].push({ i: i, entry: op.rightEntry });
        }
      }

      var rematchedDelIdx = {};
      var usedInsIdx = new Set();

      Object.keys(delsByText).forEach(function (text) {
        if (!insByText[text]) return;
        delsByText[text].forEach(function (del) {
          var bestIi = -1, bestDist = Infinity;
          insByText[text].forEach(function (ins_) {
            if (usedInsIdx.has(ins_.i)) return;
            var de = del.entry, ie = ins_.entry;
            var pageGap = Math.abs(de.pageNo - ie.pageNo);

            if (pageGap > MAX_PAGE_GAP) return;

            var rowDist      = Math.abs(de.globalRowIndex - ie.globalRowIndex);
            var samePage     = pageGap === 0;
            var nearBoundary = !samePage && (
              de.rowIndexInPage >= de.pageRowCount - 2 ||
              ie.rowIndexInPage <= 1
            );

            var eligible = samePage ? (rowDist <= SAME_PAGE_PROX) : nearBoundary;

            if (eligible && rowDist < bestDist) {
              bestDist = rowDist;
              bestIi   = ins_.i;
            }
          });
          if (bestIi >= 0) {
            rematchedDelIdx[del.i] = ops[bestIi].rightEntry;
            usedInsIdx.add(bestIi);
          }
        });
      });
      delsByText = null; insByText = null;

      var result = [];
      for (var i = 0; i < ops.length; i++) {
        if (usedInsIdx.has(i)) continue;
        if (rematchedDelIdx[i] !== undefined) {
          result.push({ op: "=", leftEntry: ops[i].leftEntry, rightEntry: rematchedDelIdx[i] });
        } else {
          result.push(ops[i]);
        }
      }
      return result;
    }

    async function maybeCompareAlignedRow(rowIndex, generation) {
      if (generation !== renderGeneration) {
        return;
      }
      var left = pageViews1[rowIndex],
        right = pageViews2[rowIndex],
        row = alignmentRows[rowIndex];
      if (!left || !right || !row || row.type !== "match") {
        return;
      }
      if (!left.isRendered || !right.isRendered) {
        return;
      }
      if (left.isCompared && right.isCompared) {
        return;
      }
      clearPageDiffBoxes(left.overlay);
      clearPageDiffBoxes(right.overlay);
      removeDiffEntriesForRow(rowIndex);

      var result = await detectDiffRects_PixelOnly(left, right, generation);

      if (generation !== renderGeneration) {
        return;
      }
      result.rects.forEach(function (rect, idx) {
        var diffId = "r" + rowIndex + "-d" + (idx + 1);
        var type = rect.type || "compact";
        drawDiffElement(left.overlay,  rect.left,  diffId, "change", type);
        drawDiffElement(right.overlay, rect.right, diffId, "change", type);
        diffEntries.push({
          id: diffId, kind: "change", rowIndex: rowIndex,
          pageNo: left.pageNo, leftPageNo: left.pageNo, rightPageNo: right.pageNo,
          leftRect: rect.left, rightRect: rect.right,
          label: "좌 " + left.pageNo + " ↔ 우 " + right.pageNo
        });
      });
      left.isCompared = right.isCompared = true;
      left.meta = right.meta = result.meta;
      updatePageStatusBadge(left, result.rects.length, "change");
      updatePageStatusBadge(right, result.rects.length, "change");
      sortDiffEntries();
      downscaleCanvasToDisplay(left);
      downscaleCanvasToDisplay(right);
    }

    async function detectDiffRects_PixelOnly(leftView, rightView, generation) {
      if (cvReady) {
        try {
          return await detectDiffRects_CV(leftView, rightView, generation);
        } catch (cvErr) {
          console.warn("[PDF Compare] OpenCV 파이프라인 오류, JS 폴백:", cvErr);
        }
      }
      return detectDiffRects_JS(leftView, rightView, generation);
    }

    async function detectDiffRects_CV(leftView, rightView, generation) {
      var canvas1 = leftView.canvas, canvas2 = rightView.canvas;
      var cssWidth = leftView.width, cssHeight = leftView.height;

      for (var start = 1; start <= total; start += CONCURRENCY) {
        if (generation !== renderGeneration) return result;

        var end = Math.min(start + CONCURRENCY - 1, total);
        var pages = [];
        for (var p = start; p <= end; p++) pages.push(p);

        var batchSigs = await Promise.all(pages.map(function (p) { return buildPageSignature(pdfDoc, p); }));
        for (var i = 0; i < batchSigs.length; i++) result.push(batchSigs[i]);
        
        summaryTextEl.textContent = sideLabel + " PDF 시그니처 생성 중... " + end + " / " + total;
        ldUpdateSub(stepIdx, end + " / " + total + " 페이지");
        ldSetLog(sideLabel + " PDF 시그니처 생성 중... " + end + " / " + total);
        ldSetStepProgress((end - 1) / total);
      }
      ldUpdateSub(stepIdx, "완료 (" + total + " 페이지)");
      return result;
    }

    async function buildPageSignature(pdfDoc, pageNo) {
      var page;
      try {
        page = await pdfDoc.getPage(pageNo);
      } catch (e) {
        return {
          pageNo: pageNo,
          width: 595,
          height: 842,
          text: "",
          textLength: 0,
          imageFingerprint: []
        };
      }
      var viewport = page.getViewport({ scale: 1.0 });
      var normalizedText = "", textLength = 0;
      try {
        var tc = await page.getTextContent();
        var rawText = (tc.items || []).map(function (it) {
          return (it.str || "").trim();
        }).filter(Boolean).join(" ");
        normalizedText = normalizeTextForCompare(rawText);
        textLength = normalizedText.length;
      } catch (e) {
      }
      var imageFingerprint = [];
      try {
        var ts = 0.12, tv = page.getViewport({ scale: ts });
        var tc2 = document.createElement("canvas");
        tc2.width = Math.max(16, Math.floor(tv.width));
        tc2.height = Math.max(16, Math.floor(tv.height));
        var tctx = tc2.getContext("2d", { alpha: false });
        await page.render({ canvasContext: tctx, viewport: tv }).promise;
        var id = tctx.getImageData(0, 0, tc2.width, tc2.height).data;
        imageFingerprint = buildImageFingerprint(id, tc2.width, tc2.height, 16, 16);
      } catch (e) {
      }
      try {
        page.cleanup();
      } catch (e) {
      }
      return {
        pageNo: pageNo,
        width: Math.round(viewport.width),
        height: Math.round(viewport.height),
        text: normalizedText,
        textLength: textLength,
        imageFingerprint: imageFingerprint
      };
    }

    function buildImageFingerprint(data, width, height, cols, rows) {
      var cellW = width / cols,
        cellH = height / rows,
        values = [];
      for (var gy = 0; gy < rows; gy++) {
        for (var gx = 0; gx < cols; gx++) {
          var sx = Math.floor(gx * cellW),
            sy = Math.floor(gy * cellH);
          var ex = Math.min(width, Math.floor((gx + 1) * cellW)),
            ey = Math.min(height, Math.floor((gy + 1) * cellH));
          var sL = 0, sR = 0, sG = 0, sB = 0,
            cnt = 0;
          for (var y = sy; y < ey; y++) {
            for (var x = sx; x < ex; x++) {
              var p = (y * width + x) * 4,
                r = data[p], g = data[p + 1], b = data[p + 2];
              sL += 0.299 * r + 0.587 * g + 0.114 * b;
              sR += r;
              sG += g;
              sB += b;
              cnt++;
            }
          }
          if (cnt) {
            values.push(sL / cnt, sR / cnt, sG / cnt, sB / cnt);
          } else {
            values.push(255, 255, 255, 255);
          }
        }
      }
      return values;
    }

    function imageFingerprintSimilarity(a, b) {
      if (!a || !b || !a.length || !b.length || a.length !== b.length) {
        return 0;
      }
      var d = 0;
      for (var i = 0; i < a.length; i++) {
        d += Math.abs(a[i] - b[i]);
      }
      return Math.max(0, 1 - (d / a.length) / 255);
    }

    function pageSimilarity(sA, sB) {
      if (!sA || !sB) {
        return 0;
      }
      var ts = textSimilarity(sA.text, sB.text),
        is = imageFingerprintSimilarity(sA.imageFingerprint, sB.imageFingerprint);
      var hA = sA.textLength > 20,
        hB = sB.textLength > 20;
      var score = (hA && hB) ? ts * 0.55 + is * 0.45 : ts * 0.20 + is * 0.80;
      var sp = 0;
      if (Math.abs(sA.width - sB.width) > 10 || Math.abs(sA.height - sB.height) > 10) {
        sp += 0.08;
      }
      sp += Math.abs(sA.textLength - sB.textLength)
        / Math.max(1, Math.max(sA.textLength, sB.textLength)) * 0.12;
      return Math.max(0, score - sp - Math.abs(sA.pageNo - sB.pageNo) * 0.008);
    }

    async function alignPageSequences(leftSigs, rightSigs) {
      var n = leftSigs.length,
        m = rightSigs.length,
        gapPenalty = 0.43,
        CHUNK = 8;
      var dp = Array.from({ length: n + 1 }, function () {
        return Array(m + 1).fill(0);
      });
      var path = Array.from({ length: n + 1 }, function () {
        return Array(m + 1).fill(null);
      });
      for (var i = 1; i <= n; i++) {
        dp[i][0] = dp[i - 1][0] - gapPenalty;
        path[i][0] = "up";
      }
      for (var j = 1; j <= m; j++) {
        dp[0][j] = dp[0][j - 1] - gapPenalty;
        path[0][j] = "left";
      }
      for (var y = 1; y <= n; y++) {
        if (y % CHUNK === 0) {
          ldSetStepProgress(y / n);
          ldUpdateSub(2, "DP 계산 중... " + y + " / " + n);
          ldSetLog("정렬 계산 중... " + y + " / " + n);
          await yieldToBrowser();
        }
        for (var x = 1; x <= m; x++) {
          var sim = pageSimilarity(leftSigs[y - 1], rightSigs[x - 1]);
          var diag = dp[y - 1][x - 1] + sim,
            up = dp[y - 1][x] - gapPenalty,
            left = dp[y][x - 1] - gapPenalty;
          var best = diag,
            dir = "diag";
          if (up > best) {
            best = up;
            dir = "up";
          }
          if (left > best) {
            best = left;
            dir = "left";
          }
          dp[y][x] = best;
          path[y][x] = dir;
        }
      }
      var result = [],
        i2 = n, j2 = m,
        thr = 0.10;
      while (i2 > 0 || j2 > 0) {
        var d2 = path[i2][j2];
        if (i2 > 0 && j2 > 0 && d2 === "diag") {
          var ls = leftSigs[i2 - 1],
            rs = rightSigs[j2 - 1],
            s2 = pageSimilarity(ls, rs);
          if (s2 >= thr) {
            result.push(
              { type: "match", leftPageNo: ls.pageNo, rightPageNo: rs.pageNo, similarity: s2 });
          } else {
            result.push({ type: "insert", leftPageNo: null, rightPageNo: rs.pageNo, similarity: 0 });
            result.push({ type: "delete", leftPageNo: ls.pageNo, rightPageNo: null, similarity: 0 });
          }
          i2--;
          j2--;
        } else if (i2 > 0 && (j2 === 0 || d2 === "up")) {
          result.push({
            type: "delete",
            leftPageNo: leftSigs[i2 - 1].pageNo,
            rightPageNo: null,
            similarity: 0
          });
          i2--;
        } else {
          result.push({
            type: "insert",
            leftPageNo: null,
            rightPageNo: rightSigs[j2 - 1].pageNo,
            similarity: 0
          });
          j2--;
        }
      }
      result.reverse();
      return result;
    }

    async function getPageMeta(pdf, pageNo) {
      var page = await pdf.getPage(pageNo);
      var vp = page.getViewport({ scale: renderScale });
      return { width: vp.width, height: vp.height };
    }
